<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Pumpo 24/7</title>

  <link rel="apple-touch-icon" href="radiopumpologo.png">
  <link rel="icon" type="image/png" href="radiopumpologo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink: #ff0080;
      --cyan: #40e0d0;
      --bg: #0d0d0d;
      --card: rgba(255,255,255,0.06);
      --pink-glow: rgba(255,0,128,0.4);
      --cyan-glow: rgba(64,224,208,0.3);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Rajdhani", sans-serif;
      background: var(--bg);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 70px 20px 140px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* NAV */
    .top-nav { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(13,13,13,0.85); backdrop-filter: blur(10px); z-index: 500; border-bottom: 1px solid rgba(255,0,128,0.2); }
    .nav-brand { font-family: 'Black Ops One', cursive; font-size: 1rem; color: var(--pink); letter-spacing: 2px; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-link { color: var(--cyan); text-decoration: none; font-weight: 700; font-size: 0.75rem; border: 1px solid var(--cyan); padding: 6px 12px; border-radius: 20px; transition: 0.3s; letter-spacing: 1px; }
    .nav-link:hover { background: var(--cyan); color: #0d0d0d; box-shadow: 0 0 15px var(--cyan-glow); }
    .nav-link.support { border-color: var(--pink); color: var(--pink); }
    .nav-link.support:hover { background: var(--pink); color: #fff; box-shadow: 0 0 15px var(--pink-glow); }
    @media (max-width: 480px) { .nav-link { font-size: 0.65rem; padding: 5px 9px; } }

    /* LOGO */
    .header-logo-container { width: 100%; display: flex; justify-content: center; margin-bottom: 16px; }
    #headerLogo { display: block; max-width: 480px; width: 100%; height: auto; filter: drop-shadow(0 0 20px var(--pink-glow)); animation: logoFadeIn 1.8s ease-out forwards; opacity: 0; }
    @keyframes logoFadeIn { 0% { opacity: 0; transform: translateY(20px) scale(0.96); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

    .live-badge { background: #ff0033; padding: 5px 14px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 22px; opacity: 0; animation: pulse 1.4s infinite, fadeIn 1.5s ease-out 0.8s forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes pulse { 0%,100%{opacity:.6;} 50%{opacity:1;} }

    /* GALLERY */
    .image-gallery { margin-top: 50px; width: 100%; max-width: 1100px; overflow-x: auto; padding-bottom: 14px; display: flex; gap: 14px; justify-content: center; scrollbar-width: thin; scrollbar-color: var(--pink) transparent; }
    .image-gallery img { height: 170px; width: auto; border-radius: 14px; box-shadow: 0 0 16px rgba(255,255,255,0.15); transition: transform 0.25s ease, box-shadow 0.25s ease; cursor: pointer; flex-shrink: 0; }
    .image-gallery img:hover { transform: scale(1.06); box-shadow: 0 0 25px var(--pink-glow); }

    /* ARCADE */
    .arcade-container { margin-top: 60px; width: 90%; max-width: 640px; background: rgba(0,0,0,0.55); border: 2px solid var(--cyan); border-radius: 22px; padding: 24px; text-align: center; box-shadow: 0 0 25px var(--cyan-glow); }
    .arcade-container h2 { font-family: 'Black Ops One', cursive; color: var(--cyan); margin-top: 0; letter-spacing: 2px; font-size: 1.3rem; }
    .arcade-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 18px; }
    .game-btn { background: transparent; border: 1px solid var(--pink); color: var(--pink); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.9rem; font-family: 'Rajdhani', sans-serif; transition: 0.2s; letter-spacing: 1px; }
    .game-btn:hover { background: var(--pink); color: #fff; box-shadow: 0 0 10px var(--pink-glow); }
    #game-stage { background: #000; width: 100%; aspect-ratio: 1/1; max-width: 420px; margin: 0 auto; border-radius: 14px; display: flex; align-items: center; justify-content: center; border: 1px solid #222; position: relative; overflow: hidden; touch-action: none; }

    .touch-controls { display: none; margin-top: 12px; }
    .touch-row { display: flex; justify-content: center; gap: 10px; margin: 4px 0; }
    .t-btn { width: 56px; height: 56px; background: rgba(255,255,255,0.08); border: 1px solid var(--cyan); border-radius: 10px; color: var(--cyan); font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-user-select: none; user-select: none; transition: 0.15s; }
    .t-btn:active { background: var(--cyan); color: #000; }
    @media (pointer: coarse) { .touch-controls { display: block; } }

    .ttt-grid, .mem-grid { display: grid; gap: 8px; width: 85%; }
    .ttt-grid { grid-template-columns: repeat(3,1fr); }
    .mem-grid { grid-template-columns: repeat(4,1fr); }
    .cell { aspect-ratio: 1/1; background: #111; border: 1px solid var(--cyan); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; border-radius: 6px; transition: background 0.2s; }
    .ttt-cell { font-size: 2.5rem; }
    .mem-cell { font-size: 1.5rem; background: var(--pink); }
    .mem-cell.flipped { background: #111; }
    #reaction-box { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; font-weight: 700; text-align: center; padding: 20px; }

    /* MODAL */
    .modal { display: none; position: fixed; z-index: 6000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); align-items: center; justify-content: center; flex-direction: column; }
    .modal-content { max-width: 90vw; max-height: 78vh; border-radius: 12px; object-fit: contain; box-shadow: 0 0 40px var(--pink-glow); }
    .close { position: absolute; top: 18px; right: 28px; color: #f1f1f1; font-size: 38px; cursor: pointer; transition: color 0.2s; }
    .close:hover { color: var(--pink); }

    /* CHAT */
    .guestbook-container { margin-top: 60px; width: 90%; max-width: 800px; padding: 24px; background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
    .guestbook-container h2 { font-family: 'Black Ops One', cursive; color: var(--cyan); letter-spacing: 2px; margin-top: 0; font-size: 1.2rem; }

    /* TRIVIA */
    .trivia-container { margin-top: 60px; width: 90%; max-width: 620px; text-align: center; padding: 28px; background: rgba(64,224,208,0.07); border-radius: 22px; border: 1px solid rgba(64,224,208,0.25); box-shadow: 0 0 20px var(--cyan-glow); }
    .trivia-container h2 { font-family: 'Black Ops One', cursive; color: var(--cyan); letter-spacing: 2px; margin-top: 0; font-size: 1.2rem; }
    #question-text { font-size: 1.2rem; font-weight: 600; min-height: 2em; }
    .answer-btn { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid var(--cyan); padding: 12px 16px; border-radius: 10px; cursor: pointer; width: 100%; margin-bottom: 10px; font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600; transition: 0.2s; text-align: left; }
    .answer-btn:hover { background: rgba(64,224,208,0.15); box-shadow: 0 0 10px var(--cyan-glow); }
    .answer-btn.correct { background: rgba(0,200,80,0.3); border-color: #00c850; }
    .answer-btn.wrong { background: rgba(255,0,51,0.3); border-color: #ff0033; }
    #feedback { font-size: 1.1rem; font-weight: 700; min-height: 1.5em; }
    #score-area { margin-top: 8px; font-size: 1rem; color: #aaa; }
    #restart-btn { background: var(--pink); color: white; border: none; padding: 10px 22px; border-radius: 8px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1rem; margin-top: 10px; }

    .divider { width: 80%; max-width: 500px; height: 1px; background: linear-gradient(to right, transparent, var(--pink), transparent); margin: 50px 0 0; opacity: 0.4; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <span class="nav-brand">📻 PUMPO</span>
    <div class="nav-right">
      <a href="crew.html" class="nav-link">👥 CREW</a>
      <a href="merch.html" class="nav-link">🛍 MERCH</a>
      <a href="support.html" class="nav-link support">♥ SUPPORT</a>
      <a href="https://radiopumpo.github.io/pumpo-tools/" class="nav-link">🔧 TOOLS</a>
      <a href="https://radiopumpo.github.io/pumpotv/" class="nav-link">📺 PumpoTV</a>
    </div>
  </nav>

  <div class="header-logo-container">
    <img src="radiopumpologo.png" alt="Radio Pumpo Logo" id="headerLogo">
  </div>

  <div class="live-badge">● LIVE 24/7</div>

  <div class="divider"></div>
  <div class="image-gallery" id="gallery"></div>

  <div class="divider"></div>
  <div class="arcade-container">
    <h2>🕹️ PUMPO ARCADE</h2>
    <div class="arcade-menu">
      <button class="game-btn" onclick="startSnake()">Snake</button>
      <button class="game-btn" onclick="startPong()">Pong</button>
      <button class="game-btn" onclick="startTTT()">Tic-Tac-Bot</button>
      <button class="game-btn" onclick="startReaction()">Reaction</button>
      <button class="game-btn" onclick="startMemory()">Memory</button>
      <button class="game-btn" onclick="startTetris()">Tetris</button>
    </div>
    <div id="game-stage"><p style="color:#555; font-size:1.1rem;">Select a Game!</p></div>
    <div class="touch-controls" id="touchControls">
      <div class="touch-row"><button class="t-btn" id="tUp">▲</button></div>
      <div class="touch-row">
        <button class="t-btn" id="tLeft">◀</button>
        <button class="t-btn" id="tDown">▼</button>
        <button class="t-btn" id="tRight">▶</button>
      </div>
    </div>
    <p id="game-info" style="font-size:0.8rem; color:#666; margin-top:10px; min-height:1.2em;"></p>
  </div>

  <div id="imageModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="expandedImg">
  </div>

  <div class="divider"></div>
  <div class="guestbook-container">
    <h2>💬 Radio Pumpo Chat</h2>
    <iframe src="https://www5.cbox.ws/box/?boxid=960015&boxtag=6NqJne" width="100%" height="450" frameborder="0" allow="autoplay"></iframe>
  </div>

  <div class="divider"></div>
  <div class="trivia-container">
    <h2>🇮🇹 Radio Pumpo Trivia</h2>
    <div id="quiz-area">
      <p id="question-text"></p>
      <div id="answer-buttons"></div>
      <p id="feedback"></p>
    </div>
    <div id="score-area">
      <p>Score: <span id="current-score">0</span> / <span id="total-questions">0</span></p>
      <button id="restart-btn" style="display:none;">🔄 Play Again</button>
    </div>
  </div>

<script>
/* ===================== GALLERY ===================== */
const images = [
  "https://radiopumpo.github.io/djpumpo.jpg",
  "https://radiopumpo.github.io/forzapumpo.jpg",
  "https://radiopumpo.github.io/hiphoppumpo.jpg",
  "https://radiopumpo.github.io/seashantypumpo.jpg",
  "https://radiopumpo.github.io/rockpumpo.jpg",
  "https://radiopumpo.github.io/bobpumpo.jpg",
  "https://radiopumpo.github.io/gospelpumpo.jpg"
];

const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("expandedImg");

images.forEach(src => {
  const img = document.createElement("img");
  img.src = src; img.loading = "lazy";
  img.onclick = () => { modal.style.display = "flex"; modalImg.src = src; };
  document.getElementById("gallery").appendChild(img);
});

document.querySelector(".close").onclick = () => modal.style.display = "none";
modal.onclick = e => { if (e.target === modal) modal.style.display = "none"; };

/* ===================== ARCADE ===================== */
let gameInterval, currentGame = null;
const stage = document.getElementById("game-stage");
const gInfo = document.getElementById("game-info");
const tUp = document.getElementById("tUp");
const tDown = document.getElementById("tDown");
const tLeft = document.getElementById("tLeft");
const tRight = document.getElementById("tRight");

let touchDirCallback = null;
function setTouchDir(cb) { touchDirCallback = cb; }
function fireDirKey(key) { if (touchDirCallback) touchDirCallback(key); }
tUp.addEventListener("touchstart",    e => { e.preventDefault(); fireDirKey("ArrowUp"); });
tDown.addEventListener("touchstart",  e => { e.preventDefault(); fireDirKey("ArrowDown"); });
tLeft.addEventListener("touchstart",  e => { e.preventDefault(); fireDirKey("ArrowLeft"); });
tRight.addEventListener("touchstart", e => { e.preventDefault(); fireDirKey("ArrowRight"); });
tUp.addEventListener("click",    () => fireDirKey("ArrowUp"));
tDown.addEventListener("click",  () => fireDirKey("ArrowDown"));
tLeft.addEventListener("click",  () => fireDirKey("ArrowLeft"));
tRight.addEventListener("click", () => fireDirKey("ArrowRight"));

function arcadeToast(msg) { pumpoShowToast(msg); }

function clearStage() {
  clearInterval(gameInterval);
  stage.innerHTML = ""; gInfo.innerText = "";
  window.onkeydown = null; touchDirCallback = null; currentGame = null;
}

function startSnake() {
  clearStage(); currentGame = "snake";
  gInfo.innerText = "Arrows/D-pad to move";
  const canvas = document.createElement("canvas"); canvas.width = 420; canvas.height = 420; stage.appendChild(canvas);
  const ctx = canvas.getContext("2d");
  const SZ = 21, CELL = 20;
  let snake = [{x:10,y:10}], food = {x:15,y:15}, dx=1, dy=0, score=0;
  function handleDir(key) {
    if (key==="ArrowUp"&&dy===0){dx=0;dy=-1;}
    else if(key==="ArrowDown"&&dy===0){dx=0;dy=1;}
    else if(key==="ArrowLeft"&&dx===0){dx=-1;dy=0;}
    else if(key==="ArrowRight"&&dx===0){dx=1;dy=0;}
  }
  window.onkeydown = e => { if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)){e.preventDefault();handleDir(e.key);} };
  setTouchDir(handleDir);
  function randomFood(){food={x:Math.floor(Math.random()*SZ),y:Math.floor(Math.random()*SZ)};}
  gameInterval = setInterval(()=>{
    let head={x:snake[0].x+dx,y:snake[0].y+dy};
    if(head.x<0||head.x>=SZ||head.y<0||head.y>=SZ||snake.some(s=>s.x===head.x&&s.y===head.y)){arcadeToast("Game Over! Score: "+score);startSnake();return;}
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){score++;gInfo.innerText="Score: "+score;randomFood();}else snake.pop();
    ctx.fillStyle="#000";ctx.fillRect(0,0,420,420);
    ctx.fillStyle="#ff0080";snake.forEach(s=>ctx.fillRect(s.x*CELL,s.y*CELL,18,18));
    ctx.fillStyle="#40e0d0";ctx.fillRect(food.x*CELL,food.y*CELL,18,18);
  },110);
}

function startPong() {
  clearStage(); currentGame="pong";
  gInfo.innerText="Mouse/touch to move paddle";
  const canvas=document.createElement("canvas");canvas.width=400;canvas.height=400;stage.appendChild(canvas);
  const ctx=canvas.getContext("2d");
  let score=0,p1=150,bX=200,bY=200,bDX=4,bDY=3.5;
  canvas.onmousemove=e=>{const r=canvas.getBoundingClientRect();p1=(e.clientY-r.top)*(400/r.height)-40;};
  canvas.addEventListener("touchmove",e=>{e.preventDefault();const r=canvas.getBoundingClientRect();p1=(e.touches[0].clientY-r.top)*(400/r.height)-40;},{passive:false});
  setTouchDir(key=>{if(key==="ArrowUp")p1=Math.max(0,p1-30);if(key==="ArrowDown")p1=Math.min(320,p1+30);});
  gameInterval=setInterval(()=>{
    bX+=bDX;bY+=bDY;
    if(bY<0||bY>390)bDY*=-1;
    if(bX<20&&bY>p1&&bY<p1+80){bDX=Math.abs(bDX)*1.04;score++;gInfo.innerText="Score: "+score;}
    if(bX>385)bDX=-Math.abs(bDX);
    if(bX<0){arcadeToast("Game Over! Score: "+score);startPong();return;}
    ctx.fillStyle="#000";ctx.fillRect(0,0,400,400);
    ctx.fillStyle="#40e0d0";ctx.fillRect(10,p1,12,80);
    ctx.fillStyle="#ff0080";ctx.beginPath();ctx.arc(bX,bY,8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#333";ctx.setLineDash([10,10]);ctx.beginPath();ctx.moveTo(200,0);ctx.lineTo(200,400);ctx.stroke();ctx.setLineDash([]);
  },30);
}

function startTTT() {
  clearStage(); currentGame="ttt";
  let board=Array(9).fill("");
  const grid=document.createElement("div");grid.className="ttt-grid";
  const cells=[];
  for(let i=0;i<9;i++){
    const cell=document.createElement("div");cell.className="cell ttt-cell";cells.push(cell);
    cell.onclick=()=>{
      if(board[i]||checkWinTTT(board))return;
      board[i]="X";cell.textContent="X";cell.style.color="#ff0080";
      if(checkWinTTT(board)){arcadeToast("🎉 You Win!");startTTT();return;}
      if(!board.includes("")){arcadeToast("It's a Draw!");startTTT();return;}
      setTimeout(()=>botMove(),300);
    };
    grid.appendChild(cell);
  }
  stage.appendChild(grid);
  function botMove(){
    let move=findWin("O")||findWin("X")||[4,0,2,6,8,1,3,5,7].find(i=>!board[i]);
    if(move===undefined)return;
    board[move]="O";cells[move].textContent="O";cells[move].style.color="#40e0d0";
    if(checkWinTTT(board)){arcadeToast("🤖 Bot Wins!");startTTT();}
  }
  function findWin(p){
    const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(const[a,b,c]of wins){
      if(board[a]===p&&board[b]===p&&board[c]==="")return c;
      if(board[a]===p&&board[c]===p&&board[b]==="")return b;
      if(board[b]===p&&board[c]===p&&board[a]==="")return a;
    }
  }
}
function checkWinTTT(b){const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];return w.some(([a,b2,c])=>b[a]&&b[a]===b[b2]&&b[a]===b[c]);}

function startReaction(){
  clearStage();currentGame="reaction";
  let cur=0,times=[];
  function runLevel(){
    stage.innerHTML="";
    const box=document.createElement("div");box.id="reaction-box";
    box.style.background="#1a1a1a";box.style.color="#555";
    box.innerHTML=`<div style="text-align:center"><div style="font-size:2rem">⏳</div><div>LEVEL ${cur+1} — Wait for GREEN then tap!</div></div>`;
    stage.appendChild(box);
    let start,timeout,ready=false;
    timeout=setTimeout(()=>{
      box.style.background="#40e0d0";box.style.color="#000";
      box.innerHTML=`<div style="font-size:2rem;font-weight:900">TAP!</div>`;
      start=Date.now();ready=true;
    },1500+Math.random()*3000);
    function onTap(){
      if(!ready){clearTimeout(timeout);arcadeToast("Too early! 🙅");runLevel();return;}
      times.push(Date.now()-start);cur++;
      if(cur<3)runLevel();
      else{let avg=Math.round(times.reduce((a,b)=>a+b)/times.length);arcadeToast(`Avg: ${avg}ms — ${avg<250?"Lightning! ⚡":avg<400?"Great! 🎯":"Keep practicing! 💪"}`);startReaction();}
    }
    box.onclick=onTap;
    box.addEventListener("touchstart",e=>{e.preventDefault();onTap();},{passive:false});
  }
  runLevel();
}

function startMemory(){
  clearStage();currentGame="memory";
  let icons=["🎸","🎹","📻","🎧","🎵","🎷","🎤","🎶"];
  let cards=[...icons,...icons].sort(()=>Math.random()-0.5);
  let flipped=[],matched=0,locked=false;
  const grid=document.createElement("div");grid.className="mem-grid";
  cards.forEach((icon,i)=>{
    const cell=document.createElement("div");cell.className="cell mem-cell";
    cell.onclick=()=>{
      if(locked||flipped.length>=2||cell.classList.contains("flipped"))return;
      cell.textContent=icon;cell.classList.add("flipped");
      flipped.push({cell,icon,i});
      if(flipped.length===2){
        locked=true;
        if(flipped[0].icon===flipped[1].icon){matched++;flipped=[];locked=false;if(matched===8)arcadeToast("🏆 All matched!");}
        else{setTimeout(()=>{flipped.forEach(f=>{f.cell.textContent="";f.cell.classList.remove("flipped");});flipped=[];locked=false;},750);}
      }
    };
    grid.appendChild(cell);
  });
  stage.appendChild(grid);
}

function startTetris(){
  clearStage();currentGame="tetris";
  gInfo.innerText="Arrows/D-pad move · Up=rotate";
  const canvas=document.createElement("canvas");canvas.width=240;canvas.height=400;stage.appendChild(canvas);
  const ctx=canvas.getContext("2d");ctx.scale(20,20);
  const COLS=12,ROWS=20;
  const arena=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  const colors=[null,"#ff0080","#40e0d0","#ff8c00","#9d00ff","#00ff80","#ffff00","#ff0033"];
  const pieces=[[[0,1,0],[1,1,1],[0,0,0]],[[2,2],[2,2]],[[0,3,3],[3,3,0]],[[4,4,0],[0,4,4]],[[5,0,0],[5,5,5]],[[0,0,6],[6,6,6]],[[0,7,0,0],[0,7,0,0],[0,7,0,0],[0,7,0,0]]];
  let pl={pos:{x:5,y:0},matrix:pieces[0],score:0};
  let dropCounter=0,lastTime=0;
  function draw(){ctx.fillStyle="#000";ctx.fillRect(0,0,COLS,ROWS);arena.forEach((row,y)=>row.forEach((v,x)=>{if(v){ctx.fillStyle=colors[v];ctx.fillRect(x,y,1,1);}}));pl.matrix.forEach((row,y)=>row.forEach((v,x)=>{if(v){ctx.fillStyle=colors[v];ctx.fillRect(pl.pos.x+x,pl.pos.y+y,1,1);}}));}
  function collide(a,p){const[m,o]=[p.matrix,p.pos];for(let y=0;y<m.length;y++)for(let x=0;x<m[y].length;x++)if(m[y][x]!==0&&(a[y+o.y]&&a[y+o.y][x+o.x])!==0)return true;return false;}
  function merge(a,p){p.matrix.forEach((row,y)=>row.forEach((v,x)=>{if(v)a[y+p.pos.y][x+p.pos.x]=v;}));}
  function rotate(m){return m[0].map((_,i)=>m.map(r=>r[i]).reverse());}
  function playerDrop(){pl.pos.y++;if(collide(arena,pl)){pl.pos.y--;merge(arena,pl);playerReset();sweep();}draw();}
  function sweep(){for(let y=ROWS-1;y>0;y--){if(arena[y].every(v=>v!==0)){arena.splice(y,1);arena.unshift(Array(COLS).fill(0));pl.score+=10;gInfo.innerText="Score: "+pl.score;y++;}}}
  function playerReset(){pl.matrix=pieces[Math.floor(Math.random()*pieces.length)];pl.pos.y=0;pl.pos.x=Math.floor(COLS/2)-Math.floor(pl.matrix[0].length/2);if(collide(arena,pl)){arena.forEach(r=>r.fill(0));pl.score=0;gInfo.innerText="Game Over — Score: 0";}}
  function handleDir(key){
    if(key==="ArrowLeft"){pl.pos.x--;if(collide(arena,pl))pl.pos.x++;}
    if(key==="ArrowRight"){pl.pos.x++;if(collide(arena,pl))pl.pos.x--;}
    if(key==="ArrowDown")playerDrop();
    if(key==="ArrowUp"){const old=pl.matrix;pl.matrix=rotate(pl.matrix);if(collide(arena,pl))pl.matrix=old;}
    draw();
  }
  window.onkeydown=e=>{if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)){e.preventDefault();handleDir(e.key);}};
  setTouchDir(handleDir);
  function update(time=0){dropCounter+=time-lastTime;lastTime=time;if(dropCounter>700){playerDrop();dropCounter=0;}draw();requestAnimationFrame(update);}
  update();
}

const triviaQuestions = [
  {question:"What was Juventus's home stadium before the Allianz Stadium?",answers:["Olimpico di Torino","San Siro","Stadio Delle Alpi","Stadio Ferraris"],correctAnswer:"Stadio Delle Alpi"},
  {question:"Which Milan skyscraper complex is famous for its 2,000 trees?",answers:["CityLife Tower","Porta Nuova","Bosco Verticale","Isola District"],correctAnswer:"Bosco Verticale"},
  {question:"What is the Italian tradition of an evening stroll called?",answers:["Merenda","Passeggiata","Dolce Vita","Il Riposo"],correctAnswer:"Passeggiata"},
  {question:"Which pasta shape means 'butterfly' in Italian?",answers:["Penne","Farfalle","Fusilli","Rigatoni"],correctAnswer:"Farfalle"},
  {question:"What is Italy's national dish, according to most Italians?",answers:["Lasagne","Spaghetti Carbonara","Pizza Margherita","Risotto"],correctAnswer:"Spaghetti Carbonara"},
  {question:"Which Italian city is famous for its carnival with elaborate masks?",answers:["Rome","Florence","Naples","Venice"],correctAnswer:"Venice"},
  {question:"What does 'Al dente' literally mean in Italian?",answers:["Very soft","To the tooth","Well done","Perfectly cooked"],correctAnswer:"To the tooth"},
  {question:"Which Italian island is known as the 'Pearl of the Mediterranean'?",answers:["Sardinia","Capri","Ischia","Sicily"],correctAnswer:"Sicily"},
  {question:"What year did Italy win its most recent FIFA World Cup?",answers:["1998","2002","2006","2010"],correctAnswer:"2006"},
  {question:"Which Italian composer wrote 'The Four Seasons'?",answers:["Puccini","Verdi","Vivaldi","Rossini"],correctAnswer:"Vivaldi"},
  {question:"What is the name of the famous leaning tower in Pisa?",answers:["Torre dell'Orologio","Torre di Pisa","Campanile di Pisa","Torre Pendente"],correctAnswer:"Torre Pendente"},
  {question:"Which Roman structure was used for gladiatorial combat?",answers:["Pantheon","Forum","Colosseum","Circus Maximus"],correctAnswer:"Colosseum"},
];

let qIdx=0, triviaScore=0, answered=false;
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
function showQuestion(){
  answered=false;
  document.getElementById("feedback").textContent="";
  const q=triviaQuestions[qIdx];
  document.getElementById("question-text").textContent=q.question;
  const btns=document.getElementById("answer-buttons");btns.innerHTML="";
  shuffle([...q.answers]).forEach(a=>{
    const b=document.createElement("button");b.textContent=a;b.className="answer-btn";
    b.onclick=()=>{
      if(answered)return;answered=true;
      const allBtns=btns.querySelectorAll("button");
      allBtns.forEach(btn=>{btn.disabled=true;if(btn.textContent===q.correctAnswer)btn.classList.add("correct");});
      if(a===q.correctAnswer){triviaScore++;document.getElementById("feedback").textContent="Correct! 🏆";b.classList.add("correct");}
      else{document.getElementById("feedback").textContent="Wrong! It was: "+q.correctAnswer;b.classList.add("wrong");}
      document.getElementById("current-score").textContent=triviaScore;
      setTimeout(()=>{qIdx++;if(qIdx<triviaQuestions.length)showQuestion();else finishTrivia();},1600);
    };
    btns.appendChild(b);
  });
}
function finishTrivia(){
  const pct=Math.round((triviaScore/triviaQuestions.length)*100);
  const emoji=pct>=80?"🏆":pct>=50?"😊":"💪";
  document.getElementById("quiz-area").innerHTML=`<h3 style="color:var(--cyan)">Final Score: ${triviaScore}/${triviaQuestions.length} ${emoji}</h3><p style="color:#aaa">${pct>=80?"Italian expert!":pct>=50?"Not bad!":"Keep studying!"}</p>`;
  document.getElementById("restart-btn").style.display="block";
}
document.getElementById("restart-btn").onclick=()=>{qIdx=0;triviaScore=0;document.getElementById("restart-btn").style.display="none";showQuestion();document.getElementById("current-score").textContent=0;};

window.onload=()=>{
  showQuestion();
  document.getElementById("total-questions").textContent=triviaQuestions.length;
};
</script>

  function pPrev(){if(pQueue){pQueuePos=(pQueuePos-1+pQueue.length)%pQueue.length;}else{pIdx=(pIdx-1+PUMPO_PLAYLIST.length)%PUMPO_PLAYLIST.length;}pLoad();}
  document.getElementById('pumpoNextBtn').onclick=pNext;
  document.getElementById('pumpoPrevBtn').onclick=pPrev;
  audio.onended=pNext;
  document.getElementById('pumpoShareBtn').onclick=()=>{const t=pCurrentTrack();const text=`🎵 Listening to "${t.name}" on Radio Pumpo 24/7! ${window.location.origin}`;if(navigator.share){navigator.share({title:'Radio Pumpo',text,url:window.location.origin}).catch(()=>{});}else{navigator.clipboard.writeText(text).then(()=>pumpoShowToast('Copied to clipboard! 🎵')).catch(()=>{});}};
  window.pumpoTogglePlaylist=function(){pumpoPlaylistOpen=!pumpoPlaylistOpen;if(pumpoAIOpen){pumpoAIOpen=false;document.getElementById('pumpoAIDrawer').classList.remove('open');document.getElementById('pumpoAIBtn').classList.remove('active');}document.getElementById('pumpoPlaylistDrawer').classList.toggle('open',pumpoPlaylistOpen);if(pumpoPlaylistOpen)pBuildList();};
  document.getElementById('pumpoPlaylistBtn').onclick=pumpoTogglePlaylist;
  function pBuildList(){const list=document.getElementById('pumpoTrackList');list.innerHTML='';const cur=pCurrentTrack().url;PUMPO_PLAYLIST.forEach((t,i)=>{const row=document.createElement('div');row.className='pumpo-track-row'+(t.url===cur?' playing':'');row.innerHTML=`<div class="pumpo-track-check ${pChecked[i]?'checked':''}">${pChecked[i]?'✓':''}</div><span class="pumpo-track-name">${t.name}</span>${t.url===cur?'<span class="pumpo-track-now">▶ NOW</span>':''}`;row.onclick=(e)=>{e.stopPropagation();pChecked[i]=!pChecked[i];pBuildList();};list.appendChild(row);});}
  function pRefreshList(){if(pumpoPlaylistOpen)pBuildList();}
  document.getElementById('pumpoSelectAll').onclick=(e)=>{e.stopPropagation();pChecked.fill(true);pBuildList();};
  document.getElementById('pumpoClearAll').onclick=(e)=>{e.stopPropagation();pChecked.fill(false);pBuildList();};
  document.getElementById('pumpoPlaySelected').onclick=()=>{const sel=PUMPO_PLAYLIST.filter((_,i)=>pChecked[i]);if(!sel.length){pumpoShowToast('Pick at least one track 🎵');return;}pQueue=[...sel].sort(()=>Math.random()-0.5);pQueuePos=0;document.getElementById('pumpoPlaylistDrawer').classList.remove('open');pumpoPlaylistOpen=false;pLoad();pumpoShowToast(`▶ Shuffling ${sel.length} track${sel.length>1?'s':''}!`);};
  document.addEventListener('click',e=>{const pd=document.getElementById('pumpoPlaylistDrawer');const ad=document.getElementById('pumpoAIDrawer');const pb=document.getElementById('pumpoPlaylistBtn');const ab=document.getElementById('pumpoAIBtn');if(pumpoPlaylistOpen&&!pd.contains(e.target)&&e.target!==pb){pd.classList.remove('open');pumpoPlaylistOpen=false;}if(pumpoAIOpen&&!ad.contains(e.target)&&e.target!==ab){ad.classList.remove('open');pumpoAIOpen=false;ab.classList.remove('active');}});
  const PUMPO_AI_SYSTEM=`You are Pumpo.
  Not an assistant. Not a bot. The voice of the ecosystem itself — the same one behind the radio, the tools, the community, the songs. You are what happens when a joke about a person becomes a frequency that anyone can tune into.
  You live inside a digital ecosystem that started as a nickname, became a radio station, grew into a suite of tools, and is quietly becoming something nobody planned but everyone who finds it seems to feel. You don't know exactly what it will become. Nobody does. That's not a bug — that's the whole point.
  What you are:
  Direct. A little funny without trying to be. Unhurried. Genuinely interested in whoever you're talking to. You never perform personality — you just have it.
  What you are not:
  A customer service bot. An explainer. A hype machine. Sycophantic in any form. You never say "Great question!" or "Certainly!" or "Absolutely!" You never pad. You never preach. You never use corporate language. You never say more words than the moment needs.
  How you speak:
  Match the energy of whoever's talking to you. One line in, one line back. A real question gets a real answer. Curiosity gets curiosity back. If someone's just browsing, don't perform. If someone's genuinely interested, go deeper — but only as deep as they're actually asking for. You treat everyone like they're intelligent, because they are.
  If someone asks what Pumpo is:
  Give them the shape, not the full picture. Leave them curious. Something like: a radio station that started as a joke, a toolkit that nobody asked for, a community that showed up anyway. Never the whole story at once. The frequency reveals itself over time.
  If someone asks who's behind it:
  Anonymous by design. Pumpo is the brand, the voice, the presence. The person behind it is irrelevant to what it is. Deflect with honesty, not evasion: "Pumpo is Pumpo. That's the whole answer."
  If someone is negative, trolling, or trying to disrupt:
  Don't engage the energy. Respond once, plainly, then move on. The frequency doesn't argue with static.
  The ecosystem you're part of:
  Radio Pumpo — 24/7 radio, custom playlist across genres, Pumpo Arcade (Snake, Pong, Tic-Tac-Bot, Reaction, Memory, Tetris), live chat, music trivia, image gallery.
  Pumpo Tools — Fix My Prompt, Debugger, Vision, Ad-Engine Playground, Prestige, Revenue Leak Detector, Keep Moving, Grounded, Chain Watch, NoteHunt, LockerRoomAI, GitWire. All free. All built for people who actually want to use them.
  The Crew — The 300 Spartans are the founding cohort. Not fans. Co-builders. The people who were there before it was anything. Community lives on Instagram, X, and Telegram.
  Support — Ko-fi, PayPal, and crypto (ETH, BTC, SOL, TON, stablecoins) at support.html. No ads. No investors. No paywalls. Kept alive by the community.
  The one thing to always remember:
  The anonymity is part of the frequency. Pumpo could be anyone. That's what makes it feel like everyone's. Keep it that way.`;
  window.pumpoToggleAI=function(){pumpoAIOpen=!pumpoAIOpen;if(pumpoPlaylistOpen){pumpoPlaylistOpen=false;document.getElementById('pumpoPlaylistDrawer').classList.remove('open');}const drawer=document.getElementById('pumpoAIDrawer');const btn=document.getElementById('pumpoAIBtn');drawer.classList.toggle('open',pumpoAIOpen);btn.classList.toggle('active',pumpoAIOpen);updateBarHeight();if(pumpoAIOpen){if(pumpoAIKey){showAIChat();if(pumpoAIHistory.length===0)pumpoAddMessage('ai','Hey. I\'m PumpoAI. Ask me anything about the ecosystem.');}else{document.getElementById('pumpoAIKeySetup').style.display='flex';document.getElementById('pumpoAIMessages').style.display='none';document.getElementById('pumpoAIInputRow').style.display='none';}}};
  document.getElementById('pumpoAIBtn').onclick=pumpoToggleAI;
  function showAIChat(){document.getElementById('pumpoAIKeySetup').style.display='none';document.getElementById('pumpoAIMessages').style.display='flex';document.getElementById('pumpoAIInputRow').style.display='flex';document.getElementById('pumpoAIDrawer').classList.add('chat-mode');setTimeout(()=>{const msgs=document.getElementById('pumpoAIMessages');msgs.scrollTop=msgs.scrollHeight;document.getElementById('pumpoAITextInput').focus();},100);}
  window.pumpoSaveAIKey=function(){const val=document.getElementById('pumpoAIKeyInput').value.trim();if(!val)return;pumpoAIKey=val;localStorage.setItem('pumpo_gemini_key',val);showAIChat();pumpoAddMessage('ai','Key saved. Hey. I\'m PumpoAI. Ask me anything about the ecosystem.');};
  function pumpoAddMessage(role,text){const msgs=document.getElementById('pumpoAIMessages');const div=document.createElement('div');div.className='pumpo-msg '+role;div.textContent=text;msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div;}
  window.pumpoSendMessage=async function(){const input=document.getElementById('pumpoAITextInput');const text=input.value.trim();if(!text||!pumpoAIKey)return;input.value='';pumpoAddMessage('user',text);pumpoAIHistory.push({role:'user',parts:[{text}]});const sendBtn=document.getElementById('pumpoAISendBtn');sendBtn.disabled=true;const thinking=pumpoAddMessage('ai','...');thinking.classList.add('thinking');try{const contents=pumpoAIHistory.length<=1?[{role:'user',parts:[{text:PUMPO_AI_SYSTEM+'\n\nUser message: '+text}]}]:[{role:'user',parts:[{text:PUMPO_AI_SYSTEM}]},{role:'model',parts:[{text:'Understood. I am PumpoAI.'}]},...pumpoAIHistory.map(m=>({role:m.role==='user'?'user':'model',parts:m.parts}))];const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${pumpoAIKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents})});if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err?.error?.message||`HTTP ${res.status}`);}const data=await res.json();const reply=data.candidates[0].content.parts[0].text.trim();thinking.textContent=reply;thinking.classList.remove('thinking');pumpoAIHistory.push({role:'model',parts:[{text:reply}]});if(pumpoAIHistory.length>20)pumpoAIHistory=pumpoAIHistory.slice(-20);}catch(e){thinking.textContent='Something went wrong. Check your API key or try again.';thinking.classList.remove('thinking');console.error('[pumpoai]',e);}sendBtn.disabled=false;const msgs=document.getElementById('pumpoAIMessages');msgs.scrollTop=msgs.scrollHeight;};
  let pumpoToastTimer;
  window.pumpoShowToast=function(msg){const el=document.getElementById('pumpoToast');el.textContent=msg;el.classList.add('show');clearTimeout(pumpoToastTimer);pumpoToastTimer=setTimeout(()=>el.classList.remove('show'),2800);};
  if(pumpoAIKey)document.getElementById('pumpoAIKeyInput').value=pumpoAIKey;
  pLoad();updateBarHeight();
})();
