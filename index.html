<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Pumpo 24/7</title>

  <link rel="apple-touch-icon" href="radiopumpologo.png">
  <link rel="icon" type="image/png" href="radiopumpologo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    /* --- GENERAL STYLES --- */
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #0d0d0d;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px 20px; /* Top padding increased for nav */
    }

    /* --- TOP NAVIGATION --- */
    .top-nav {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
    }

    .nav-link {
      color: #40e0d0;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.85rem;
      border: 1px solid #40e0d0;
      padding: 8px 16px;
      border-radius: 20px;
      transition: 0.3s;
      letter-spacing: 0.5px;
    }

    .nav-link:hover {
      background: #40e0d0;
      color: #0d0d0d;
      box-shadow: 0 0 15px rgba(64, 224, 208, 0.6);
    }

    /* --- LOGO & ANIMATIONS --- */
    .header-logo-container { width: 100%; display: flex; justify-content: center; margin-bottom: 20px; }
    #headerLogo { display: block; max-width: 500px; width: 100%; height: auto; filter: drop-shadow(0 0 15px rgba(255, 0, 128, 0.3)); animation: logoFadeIn 2s ease-out forwards; opacity: 0; }
    @keyframes logoFadeIn { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }

    .live-badge { background: #ff0033; padding: 6px 14px; border-radius: 12px; font-weight: bold; margin-bottom: 25px; opacity: 0; animation: pulse 1.4s infinite, fadeIn 1.5s ease-out 1s forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* --- PLAYER CARD --- */
    .player-card { background: rgba(255, 255, 255, 0.08); padding: 30px; border-radius: 20px; backdrop-filter: blur(14px); width: 90%; max-width: 600px; box-shadow: 0 0 25px rgba(255, 0, 120, 0.4); text-align: center; }
    #songMarquee { background: rgba(255, 0, 128, 0.15); color: #ff0080; padding: 8px 0; margin-bottom: 15px; border-radius: 4px; font-weight: bold; font-size: 1.1rem; white-space: nowrap; }
    .controls-wrapper { display: flex; align-items: center; gap: 10px; }
    .skip-btn { background: none; border: 1px solid #ff0080; color: #ff0080; font-size: 1.2rem; padding: 8px 10px; cursor: pointer; border-radius: 8px; transition: all 0.2s ease; flex-shrink: 0; }
    .skip-btn:hover { background: #ff0080; color: #0d0d0d; box-shadow: 0 0 10px rgba(255, 0, 128, 0.7); }
    audio { flex-grow: 1; margin: 10px 0; }

    /* --- GALLERY --- */
    .image-gallery { margin-top: 50px; width: 100%; max-width: 1100px; overflow-x: auto; white-space: nowrap; padding-bottom: 14px; display: flex; gap: 16px; justify-content: center; }
    .image-gallery img { height: 180px; width: auto; border-radius: 16px; box-shadow: 0 0 18px rgba(255, 255, 255, 0.25); transition: transform 0.25s ease; cursor: pointer; }
    .image-gallery img:hover { transform: scale(1.05); }

    /* --- ARCADE --- */
    .arcade-container { margin-top: 60px; width: 90%; max-width: 600px; background: rgba(0, 0, 0, 0.6); border: 2px solid #40e0d0; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 0 20px rgba(64, 224, 208, 0.2); }
    .arcade-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
    .game-btn { background: transparent; border: 1px solid #ff0080; color: #ff0080; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
    .game-btn:hover { background: #ff0080; color: white; }
    #game-stage { background: #000; width: 100%; aspect-ratio: 1/1; max-width: 400px; margin: 0 auto; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; position: relative; overflow: hidden; }
    
    .ttt-grid, .mem-grid { display: grid; gap: 8px; width: 85%; }
    .ttt-grid { grid-template-columns: repeat(3, 1fr); }
    .mem-grid { grid-template-columns: repeat(4, 1fr); }
    .cell { aspect-ratio: 1/1; background: #1a1a1a; border: 1px solid #40e0d0; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border-radius: 4px; }
    .ttt-cell { font-size: 2.5rem; }
    .mem-cell { font-size: 1.5rem; background: #ff0080; }
    .mem-cell.flipped { background: #1a1a1a; }
    #reaction-box { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; font-weight: bold; text-align: center; padding: 20px; box-sizing: border-box; }

    /* --- MODAL, CHAT, TRIVIA --- */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.94); backdrop-filter: blur(8px); align-items: center; justify-content: center; flex-direction: column; }
    .modal-content { max-width: 90vw; max-height: 75vh; border-radius: 10px; object-fit: contain; }
    .close { position: absolute; top: 20px; right: 35px; color: #f1f1f1; font-size: 40px; cursor: pointer; }
    .guestbook-container, .trivia-container { margin-top: 60px; width: 90%; max-width: 800px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; }
    .trivia-container { background: rgba(64,224,208,0.08); max-width: 600px; text-align: center; }
    .answer-btn { background: rgba(255,255,255,0.1); color: #ffffff; border: 1px solid #40e0d0; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="https://radiopumpo.github.io/pumpo-tools/" class="nav-link">⚡ PUMPO TOOLS</a>
  </nav>

  <div class="header-logo-container">
    <img src="radiopumpologo.png" alt="Radio Pumpo Logo" id="headerLogo">
  </div>

  <div class="live-badge">LIVE 24/7</div>

  <div class="player-card">
    <h2>LIVE PUMPO RADIO</h2>
    <marquee id="songMarquee" direction="left" scrollamount="4">NOW PLAYING: Initializing...</marquee>
    <div class="controls-wrapper">
      <button id="prevBtn" class="skip-btn">&#9664;&#9664;</button>
      <audio id="player" controls autoplay></audio>
      <button id="nextBtn" class="skip-btn">&#9654;&#9654;</button>
      <button id="shareSongBtn" class="skip-btn" title="Share Song">&#10150;</button>
    </div>
  </div>

  <div class="image-gallery" id="gallery"></div>

  <div class="arcade-container">
    <h2 style="color:#40e0d0; margin-top: 0;">🕹️ PUMPO ARCADE</h2>
    <div class="arcade-menu">
      <button class="game-btn" onclick="startSnake()">Snake</button>
      <button class="game-btn" onclick="startPong()">Pong</button>
      <button class="game-btn" onclick="startTTT()">Tic-Tac-Bot</button>
      <button class="game-btn" onclick="startReaction()">Reaction</button>
      <button class="game-btn" onclick="startMemory()">Memory</button>
      <button class="game-btn" onclick="startTetris()">Tetris</button>
    </div>
    <div id="game-stage"><p>Select a Game!</p></div>
    <p id="game-info" style="font-size: 0.8rem; color: #888; margin-top:10px; height: 1.2em;"></p>
  </div>

  <div id="imageModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="expandedImg">
  </div>

  <div class="guestbook-container">
    <h2>Radio Pumpo Chat</h2>
    <iframe src="https://www5.cbox.ws/box/?boxid=960015&boxtag=6NqJne" width="100%" height="450" frameborder="0"></iframe>	
  </div>

  <div class="trivia-container">
    <h2>Radio Pumpo Trivia! 🇮🇹</h2>
    <div id="quiz-area">
        <p id="question-text"></p>
        <div id="answer-buttons"></div>
        <p id="feedback"></p>
    </div>
    <div id="score-area">
        <p>Score: <span id="current-score">0</span> / <span id="total-questions">0</span></p>
        <button id="restart-btn" style="display: none; background: #ff0080; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Restart</button>
    </div>
  </div>

<script>
/* --- RADIO LOGIC --- */
const playlist = ["https://radiopumpo.github.io/forzapumpo.mp3","https://radiopumpo.github.io/dnbpumpo.mp3","https://radiopumpo.github.io/housepumpo.mp3","https://radiopumpo.github.io/hiphoppumpo.mp3","https://radiopumpo.github.io/rockpowerpumpo.mp3","https://radiopumpo.github.io/seashantypumpo.mp3","https://radiopumpo.github.io/unodinoipumpo.mp3","https://radiopumpo.github.io/gospelpumpo.mp3","https://radiopumpo.github.io/ACDCpumpo.mp3","https://radiopumpo.github.io/bobpumpo.mp3"];
const images = ["https://radiopumpo.github.io/djpumpo.jpg","https://radiopumpo.github.io/forzapumpo.jpg","https://radiopumpo.github.io/hiphoppumpo.jpg","https://radiopumpo.github.io/seashantypumpo.jpg","https://radiopumpo.github.io/rockpumpo.jpg","https://radiopumpo.github.io/bobpumpo.jpg","https://radiopumpo.github.io/gospelpumpo.jpg","https://radiopumpo.github.io/dosbrospumpo.jpg"];

let index = 0;
const player = document.getElementById("player"), marquee = document.getElementById("songMarquee"), modal = document.getElementById("imageModal"), modalImg = document.getElementById("expandedImg");

function loadAndPlayTrack() {
  player.src = playlist[index];
  marquee.innerHTML = `NOW PLAYING: ${playlist[index].split('/').pop().split('.')[0].replace(/pumpo/gi, ' Pumpo')}`;
  player.play().catch(() => {});
}

document.getElementById("nextBtn").onclick = () => { index = (index + 1) % playlist.length; loadAndPlayTrack(); };
document.getElementById("prevBtn").onclick = () => { index = (index - 1 + playlist.length) % playlist.length; loadAndPlayTrack(); };
player.onended = () => { index = (index + 1) % playlist.length; loadAndPlayTrack(); };

images.forEach((src) => {
  const img = document.createElement("img"); img.src = src; img.onclick = () => { modal.style.display="flex"; modalImg.src=src; };
  document.getElementById("gallery").appendChild(img);
});
document.querySelector(".close").onclick = () => modal.style.display = "none";

/* --- ARCADE SYSTEM (SNAKE, PONG, TTT, REACTION, MEMORY, TETRIS) --- */
let gameInterval;
const stage = document.getElementById('game-stage'), gInfo = document.getElementById('game-info');
function clearStage() { clearInterval(gameInterval); stage.innerHTML = ''; gInfo.innerText = ''; window.onkeydown = null; }

function startSnake() {
  clearStage(); gInfo.innerText = "Arrows to move.";
  const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 400; stage.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  let snake = [{x: 10, y: 10}], food = {x: 15, y: 15}, dx = 1, dy = 0;
  window.onkeydown = e => { if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault(); if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; } else if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; } else if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; } else if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; } };
  gameInterval = setInterval(() => {
    let head = { x: snake[0].x + dx, y: snake[0].y + dy };
    if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) { alert("Game Over!"); startSnake(); return; }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) food = { x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20) }; else snake.pop();
    ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
    ctx.fillStyle = "#ff0080"; snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18));
    ctx.fillStyle = "#40e0d0"; ctx.fillRect(food.x*20, food.y*20, 18, 18);
  }, 100);
}

function startPong() {
  clearStage(); let score = 0; const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 400; stage.appendChild(canvas);
  const ctx = canvas.getContext('2d'); let p1 = 150, bX = 200, bY = 200, bDX = 4, bDY = 4;
  canvas.onmousemove = e => { const rect = canvas.getBoundingClientRect(); p1 = (e.clientY - rect.top) * (400/rect.height) - 40; };
  gameInterval = setInterval(() => {
    bX += bDX; bY += bDY; if (bY < 0 || bY > 390) bDY *= -1;
    if (bX < 20 && bY > p1 && bY < p1 + 80) { bDX *= -1.05; score++; gInfo.innerText = "Score: " + score; }
    if (bX > 385) bDX *= -1; if (bX < 0) { alert("Game Over!"); startPong(); }
    ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
    ctx.fillStyle = "#40e0d0"; ctx.fillRect(10, p1, 10, 80);
    ctx.fillStyle = "#ff0080"; ctx.fillRect(bX, bY, 10, 10);
  }, 30);
}

function startTTT() {
  clearStage(); let board = ["","","","","","","","",""]; const grid = document.createElement('div'); grid.className = 'ttt-grid';
  board.forEach((_, i) => {
    const cell = document.createElement('div'); cell.className = 'cell ttt-cell';
    cell.onclick = () => { if (board[i] || checkWinTTT(board)) return; board[i] = "X"; cell.innerText = "X"; cell.style.color = "#ff0080"; if (!checkWinTTT(board) && board.includes("")) setTimeout(botMove, 300); else if (checkWinTTT(board)) { alert("You Win!"); startTTT(); } else { alert("Draw!"); startTTT(); } };
    grid.appendChild(cell);
  });
  stage.appendChild(grid);
  function botMove() { let empty = board.map((v,i) => v===""?i:null).filter(v=>v!==null); let move = empty[Math.floor(Math.random()*empty.length)]; board[move] = "O"; const cells = stage.querySelectorAll('.ttt-cell'); cells[move].innerText = "O"; cells[move].style.color = "#40e0d0"; if (checkWinTTT(board)) { alert("Bot Wins!"); startTTT(); } }
}
function checkWinTTT(b) { const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; return wins.some(w => b[w[0]] && b[w[0]] === b[w[1]] && b[w[0]] === b[w[2]]); }

function startReaction() {
  clearStage(); let levels = ["#ff0033", "#9d00ff", "#ff8c00"]; let cur = 0, times = [];
  function runLevel() {
    stage.innerHTML = ''; const box = document.createElement('div'); box.id = "reaction-box"; box.style.background = levels[cur]; box.innerText = `LEVEL ${cur+1}: Wait for GREEN`; stage.appendChild(box);
    let start; let timeout = setTimeout(() => { box.style.background = "#40e0d0"; box.innerText = "CLICK!"; start = Date.now(); }, 1500 + Math.random()*2500);
    box.onclick = () => { if (!start) { clearTimeout(timeout); alert("Too fast!"); runLevel(); } else { times.push(Date.now()-start); cur++; if (cur < 3) runLevel(); else { let avg = Math.round(times.reduce((a,b)=>a+b)/3); alert(`Average: ${avg}ms`); startReaction(); } } };
  }
  runLevel();
}

function startMemory() {
  clearStage(); let icons = ["🎸","🎹","📻","🎧","🎵","🎷","🎤","🎶"]; let cards = [...icons, ...icons].sort(() => Math.random() - 0.5); let flipped = [], matched = 0;
  const grid = document.createElement('div'); grid.className = 'mem-grid';
  cards.forEach((icon, i) => {
    const cell = document.createElement('div'); cell.className = 'cell mem-cell';
    cell.onclick = () => { if (flipped.length < 2 && !cell.classList.contains('flipped')) { cell.innerText = icon; cell.classList.add('flipped'); flipped.push({cell, icon}); if (flipped.length === 2) { if (flipped[0].icon === flipped[1].icon) { matched++; flipped = []; if(matched === 8) alert("Match Complete!"); } else { setTimeout(() => { flipped.forEach(f => { f.cell.innerText = ''; f.cell.classList.remove('flipped'); }); flipped = []; }, 700); } } } };
    grid.appendChild(cell);
  });
  stage.appendChild(grid);
}

function startTetris() {
  clearStage(); gInfo.innerText = "Arrows move/rotate."; const canvas = document.createElement('canvas'); canvas.width = 240; canvas.height = 400; stage.appendChild(canvas);
  const ctx = canvas.getContext('2d'); ctx.scale(20, 20); const arena = Array.from({length: 20}, () => Array(12).fill(0));
  const colors = [null, '#ff0080', '#40e0d0', '#ff8c00', '#9d00ff', '#00ff00', '#ffff00', '#ff0033'];
  let player = { pos: {x: 5, y: 0}, matrix: [[0,1,0],[1,1,1],[0,0,0]], score: 0 };
  function draw() { ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width, canvas.height); arena.forEach((row, y) => row.forEach((val, x) => { if(val) { ctx.fillStyle = colors[val]; ctx.fillRect(x,y,1,1); } })); player.matrix.forEach((row, y) => row.forEach((val, x) => { if(val) { ctx.fillStyle = colors[val]; ctx.fillRect(player.pos.x+x, player.pos.y+y, 1,1); } })); }
  function playerDrop() { player.pos.y++; if (collide(arena, player)) { player.pos.y--; merge(arena, player); playerReset(); arenaSweep(); } draw(); }
  function collide(a, p) { const [m, o] = [p.matrix, p.pos]; for(let y=0; y<m.length; ++y) for(let x=0; x<m[y].length; ++x) if(m[y][x] !== 0 && (a[y+o.y] && a[y+o.y][x+o.x]) !== 0) return true; return false; }
  function merge(a, p) { p.matrix.forEach((row, y) => row.forEach((v,x) => { if(v) a[y+p.pos.y][x+p.pos.x] = v; })); }
  function playerReset() { const ms = [[[0,1,0],[1,1,1],[0,0,0]], [[2,2],[2,2]], [[0,3,3],[3,3,0],[0,0,0]], [[4,4,0],[0,4,4],[0,0,0]]]; player.matrix = ms[Math.floor(Math.random()*ms.length)]; player.pos.y = 0; player.pos.x = 5; if(collide(arena, player)) { arena.forEach(r => r.fill(0)); player.score = 0; } }
  function arenaSweep() { outer: for(let y=arena.length-1; y>0; --y) { for(let x=0; x<arena[y].length; ++x) if(arena[y][x]===0) continue outer; const row = arena.splice(y,1)[0].fill(0); arena.unshift(row); ++y; player.score += 10; gInfo.innerText = "Score: " + player.score; } }
  window.onkeydown = e => { if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault(); if(e.key==="ArrowLeft") { player.pos.x--; if(collide(arena,player)) player.pos.x++; } if(e.key==="ArrowRight") { player.pos.x++; if(collide(arena,player)) player.pos.x--; } if(e.key==="ArrowDown") playerDrop(); if(e.key==="ArrowUp") { const oldM = player.matrix; player.matrix = player.matrix[0].map((_,i)=>player.matrix.map(r=>r[i]).reverse()); if(collide(arena,player)) player.matrix = oldM; } draw(); };
  gameInterval = setInterval(playerDrop, 1000);
}

/* --- TRIVIA LOGIC --- */
const triviaQuestions = [{question:"Juventus home before Allianz?", answers:["Olimpico","San Siro","Delle Alpi","Ferraris"], correctAnswer:"Delle Alpi"}, {question:"Milan towers with 2,000 trees?", answers:["CityLife","Porta Nuova","Bosco Verticale","Isola"], correctAnswer:"Bosco Verticale"}, {question:"Italian stroll?", answers:["Merenda","Passeggiata","Dolce Vita","Riposo"], correctAnswer:"Passeggiata"}, {question:"Pasta meaning butterfly?", answers:["Penne","Farfalle","Fusilli","Rigatoni"], correctAnswer:"Farfalle"}];
let qIdx=0, score=0;
function showQuestion() {
  const q = triviaQuestions[qIdx]; document.getElementById('question-text').textContent = q.question;
  const btns = document.getElementById('answer-buttons'); btns.innerHTML = '';
  q.answers.forEach(a => {
    const b = document.createElement('button'); b.textContent = a; b.className = 'answer-btn';
    b.onclick = () => {
      document.getElementById('feedback').textContent = (a===q.correctAnswer) ? "Correct! 🏆" : "Wrong! It was " + q.correctAnswer;
      if(a===q.correctAnswer) score++; document.getElementById('current-score').textContent = score;
      setTimeout(() => { qIdx++; if(qIdx < triviaQuestions.length) showQuestion(); else finishTrivia(); }, 1500);
    }; btns.appendChild(b);
  });
}
function finishTrivia() { document.getElementById('quiz-area').innerHTML=`<h3>Score: ${score}</h3>`; document.getElementById('restart-btn').style.display='block'; }
document.getElementById('restart-btn').onclick = () => location.reload();

window.onload = () => { 
  loadAndPlayTrack(); showQuestion(); 
  document.getElementById('total-questions').textContent = triviaQuestions.length;
};
</script>
</body>
</html>
