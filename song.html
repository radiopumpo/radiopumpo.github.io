<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Radio Pumpo</title>
  <link rel="icon" type="image/png" href="radiopumpologo.png">
  <link rel="apple-touch-icon" href="radiopumpologo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta property="og:title" id="ogTitle" content="Radio Pumpo">
  <meta property="og:description" content="Listen on Radio Pumpo 24/7">
  <meta property="og:image" content="https://radiopumpo.github.io/radiopumpologo.png">
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --pink:#ff0080;--cyan:#40e0d0;--amber:#ffaa00;
      --bg:#0d0d0d;--bg2:#111;--bg3:#181818;
      --text:#f0ede6;--muted:#555;
      --pink-glow:rgba(255,0,128,0.4);
      --mono:'Space Mono',monospace;--sans:'Rajdhani',sans-serif;--display:'Black Ops One',cursive;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999;}

    /* BG PARTICLES */
    #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 50%,rgba(13,13,13,0.7) 100%);}

    /* CARD */
    .song-card{
      position:relative;z-index:2;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,0,128,0.2);
      border-radius:20px;padding:2rem 2rem 1.75rem;
      max-width:460px;width:100%;
      display:flex;flex-direction:column;align-items:center;gap:1.1rem;
      box-shadow:0 0 60px rgba(255,0,128,0.08);
    }

    /* LOGO */
    .song-logo{width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 0 16px var(--pink-glow));border-radius:50%;}

    /* BADGE */
    .song-badge{font-family:var(--mono);font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--pink);border:1px solid rgba(255,0,128,0.3);padding:3px 12px;border-radius:20px;background:rgba(255,0,128,0.06);animation:badgePulse 1.8s infinite;}
    @keyframes badgePulse{0%,100%{opacity:.7}50%{opacity:1}}

    /* SONG NAME */
    .song-name{font-family:var(--display);font-size:clamp(20px,4vw,28px);color:var(--text);text-align:center;line-height:1.15;letter-spacing:.5px;}
    .song-station{font-family:var(--mono);font-size:.6rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}

    /* WAVEFORM */
    #waveCanvas{width:100%;height:80px;border-radius:10px;background:rgba(255,0,128,0.04);flex-shrink:0;}

    /* CONTROLS */
    .song-controls{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;}
    .play-btn{font-family:var(--display);font-size:.9rem;letter-spacing:1px;padding:.75rem 2rem;border-radius:8px;background:var(--pink);color:#fff;border:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 18px rgba(255,0,128,.28);position:relative;overflow:hidden;}
    .play-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);transition:left .4s;}
    .play-btn:hover::before{left:100%;}
    .play-btn:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(255,0,128,.45);}
    .share-btn{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.75rem 1.1rem;border-radius:8px;border:1px solid rgba(64,224,208,.3);color:var(--cyan);background:transparent;cursor:pointer;transition:.2s;}
    .share-btn:hover{border-color:var(--cyan);background:rgba(64,224,208,.07);}

    /* DIVIDER */
    .song-divider{width:100%;height:1px;background:linear-gradient(to right,transparent,rgba(255,0,128,.2),transparent);}

    /* BACK CTA */
    .back-cta{display:flex;flex-direction:column;align-items:center;gap:.5rem;text-align:center;}
    .back-label{font-family:var(--mono);font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
    .back-btn{font-family:var(--display);font-size:.75rem;letter-spacing:1px;padding:.6rem 1.5rem;border-radius:8px;background:transparent;color:var(--cyan);border:1px solid rgba(64,224,208,.3);cursor:pointer;text-decoration:none;transition:.2s;display:inline-block;}
    .back-btn:hover{border-color:var(--cyan);background:rgba(64,224,208,.07);}

    /* NOT FOUND */
    .not-found{text-align:center;display:none;}
    .not-found h2{font-family:var(--display);color:var(--pink);margin-bottom:.5rem;}
    .not-found p{color:var(--muted);font-size:13px;font-weight:600;}

    /* TOAST */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--cyan);color:#000;font-weight:700;padding:8px 20px;border-radius:20px;font-size:.82rem;z-index:9500;transition:transform .35s ease,opacity .35s ease;pointer-events:none;opacity:0;font-family:var(--sans);}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="vignette"></div>

<div class="song-card" id="songCard">
  <img src="radiopumpologo.png" alt="Radio Pumpo" class="song-logo">
  <div class="song-badge" id="songBadge">● Radio Pumpo</div>
  <div class="song-name" id="songName">Loading...</div>
  <div class="song-station">24/7 · Independent Radio</div>
  <canvas id="waveCanvas"></canvas>
  <div class="song-controls">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ PLAY</button>
    <button class="share-btn" onclick="shareTrack()">↗ Share</button>
  </div>
  <div class="song-divider"></div>
  <div class="back-cta">
    <div class="back-label">There's more on the frequency</div>
    <a href="index.html" class="back-btn">Tune in to Radio Pumpo →</a>
  </div>
</div>

<div class="not-found" id="notFound">
  <h2>Track not found</h2>
  <p>That frequency doesn't exist — or the link is broken.</p>
  <br>
  <a href="index.html" class="back-btn" style="margin-top:.5rem">← Back to Radio Pumpo</a>
</div>

<div class="toast" id="toastEl"></div>

<script>
// ── TRACK MAP: filename → display name ──
const TRACK_MAP = {
  'pumpofantastique':'Pumpo est Fantastique',
  'pumpoelectrolatino':'Tirate un Pumpo',
  'pumpodonomar':'Pumpo & Don Omar',
  'pumposwinghouse':'Find the Pumpo',
  'veraodopumpo':'Verao do Pumpo',
  'pumpodjcash':'Pumpo feat DJ Cash',
  'forzapumpo':'Forza Pumpo',
  'dnbpumpo':'DNB Pumpo',
  'housepumpo':'House Pumpo',
  'hiphoppumpo':'Hip Hop Pumpo',
  'rockpowerpumpo':'Rock Power Pumpo',
  'punkpumpo':'Punk Pumpo',
  'seashantypumpo':'Sea Shanty Pumpo',
  'unodinoipumpo':'Uno Di Noi Pumpo',
  'gospelpumpo':'Gospel Pumpo',
  'mon-ami-pumpo':'Pumpo Mon Ami',
  'ACDCpumpo':'AC/DC Pumpo',
  'bobpumpo':'Bob Pumpo',
  'copacabana':'Pumpo em Copacabana',
  'pumporus':'пумпо',
  'pumpolofinippon':'LoFi Nippon Pumpo',
  'pumpitup':'Pumpo Pump it up',
  'pumpoquersentir':'Pumpo Quer Sentir',
  'pumpothicthang':'Pumpo Thic Thang',
  'pumpotheninja':'Pumpo The Ninja',
  'pumpophonkbr':'A ora do Pumpo',
  'pumpophonkbr2':'A ora do Pumpo Dois',
  'ay-que-te-pego-la-mujer-del-pumpo':'Ay que te pego /La mujer del Pumpo/',
  'microfono-ahumado-pumpo':'Microfono ahumado',
  'pumpodragons':'Pumpo Dragons',
  'pumponostalgiaphonk':'Pumpo Nostalgia Phonk',
};
const BASE_URL = 'https://radiopumpo.github.io/songs/';

// ── READ PARAMS ──
const params = new URLSearchParams(window.location.search);
const trackParam = params.get('track') || '';
const trackName = TRACK_MAP[trackParam] || null;
const trackUrl = trackName ? BASE_URL + trackParam + '.mp3' : null;

let audio = null;
let isPlaying = false;
let waveAnimId = null;

function init() {
  if (!trackName || !trackUrl) {
    document.getElementById('songCard').style.display = 'none';
    document.getElementById('notFound').style.display = 'block';
    return;
  }

  document.getElementById('songName').textContent = trackName;
  document.getElementById('songBadge').textContent = '● Radio Pumpo';
  document.title = trackName + ' · Radio Pumpo';

  audio = new Audio(trackUrl);
  audio.onended = () => { isPlaying = false; document.getElementById('playBtn').textContent = '▶ PLAY'; };
  audio.onerror = () => showToast('Could not load track.');

  startWave();
  // Auto-play on user gesture not possible — wait for play button
}

// ── PLAY / PAUSE ──
function togglePlay() {
  if (!audio) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ PLAY';
  } else {
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸ PAUSE';
    }).catch(() => showToast('Tap play to start.'));
  }
}

// ── WAVEFORM ──
function startWave() {
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  const BAR_COUNT = 52;
  const phases = Array.from({length: BAR_COUNT}, () => Math.random() * Math.PI * 2);
  const speeds = Array.from({length: BAR_COUNT}, () => 0.035 + Math.random() * 0.055);

  function draw() {
    waveAnimId = requestAnimationFrame(draw);
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    if (canvas.width !== W) { canvas.width = W; canvas.height = H; }
    ctx.clearRect(0, 0, W, H);
    const barW = W / BAR_COUNT, gap = barW * 0.28;
    for (let i = 0; i < BAR_COUNT; i++) {
      phases[i] += isPlaying ? speeds[i] : speeds[i] * 0.12;
      const amp = isPlaying
        ? 0.2 + 0.8 * Math.abs(Math.sin(phases[i] + i * 0.38 + Math.sin(phases[i] * 0.5) * 0.6))
        : 0.06 + 0.08 * Math.abs(Math.sin(phases[i]));
      const bH = Math.max(3, amp * H * 0.9);
      const x = i * barW + gap / 2;
      const y = (H - bH) / 2;
      const grad = ctx.createLinearGradient(0, y, 0, y + bH);
      const a1 = isPlaying ? 0.92 : 0.28;
      const a2 = isPlaying ? 0.72 : 0.18;
      grad.addColorStop(0, `rgba(255,0,128,${a1})`);
      grad.addColorStop(0.45, `rgba(64,224,208,${a2})`);
      grad.addColorStop(1, `rgba(255,0,128,${a1})`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(x, y, barW - gap, bH, 2);
      else ctx.rect(x, y, barW - gap, bH);
      ctx.fill();
    }
  }
  draw();
}

// ── SHARE ──
function shareTrack() {
  const url = window.location.href;
  const text = '🎵 "' + trackName + '" on Radio Pumpo. Listen: ' + url;
  if (navigator.share) {
    navigator.share({ title: 'Radio Pumpo · ' + trackName, text, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url)
      .then(() => showToast('Link copied! 🎵'))
      .catch(() => showToast(url));
  }
}

// ── BG PARTICLES ──
(function() {
  const c = document.getElementById('bgCanvas'), ctx2 = c.getContext('2d');
  let W, H, pts = [];
  const COLS = ['#ff0080','#40e0d0','#ffaa00'];
  function resize() { W = c.width = c.offsetWidth; H = c.height = c.offsetHeight; }
  function sp() { return {x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.4,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,a:Math.random()*.2+.04,col:COLS[Math.floor(Math.random()*3)],ph:Math.random()*Math.PI*2}; }
  function draw() { ctx2.clearRect(0,0,W,H); pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.ph+=.012;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx2.beginPath();ctx2.arc(p.x,p.y,p.r,0,Math.PI*2);ctx2.fillStyle=p.col;ctx2.globalAlpha=p.a*(0.5+0.5*Math.sin(p.ph));ctx2.fill();}); ctx2.globalAlpha=1; requestAnimationFrame(draw); }
  window.addEventListener('resize', resize); resize(); pts = Array.from({length:50}, sp); draw();
})();

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

init();
</script>
</body>
</html>
