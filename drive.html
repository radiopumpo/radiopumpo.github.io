<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>Radio Pumpo Drive — Visual First V2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden;background:#02020a;font-family:Rajdhani,sans-serif;height:100%;touch-action:none}
canvas{position:fixed;inset:0;width:100%;height:100%}
#menu{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;background:radial-gradient(circle at center,#150022,#05000b 60%,#000)}
.logo{font-size:clamp(42px,9vw,80px);font-weight:700;color:#fff;letter-spacing:5px;text-shadow:0 0 30px #ff2d78}
.sub{letter-spacing:8px;color:#00ffe7;margin-bottom:40px}
.wrap{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
button{padding:16px 28px;border-radius:18px;background:rgba(255,255,255,.04);backdrop-filter:blur(12px);font:700 18px Rajdhani;border:1px solid rgba(255,255,255,.15);cursor:pointer;color:#fff;min-width:220px}
#cruise{box-shadow:0 0 30px rgba(255,160,80,.2);border-color:rgba(255,190,120,.35)}
#rush{box-shadow:0 0 30px rgba(255,45,120,.22);border-color:rgba(255,45,120,.4)}
.desc{font-size:12px;opacity:.7;margin-top:5px;letter-spacing:2px}
#hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:5}
#mode{position:absolute;left:20px;top:20px;color:#00ffe7;letter-spacing:3px;font-weight:700}
#dist{position:absolute;right:20px;top:20px;color:#fff;font-family:'Share Tech Mono',monospace}
#radio{position:absolute;left:20px;bottom:20px;background:rgba(0,0,0,.3);backdrop-filter:blur(16px);padding:12px 16px;border:1px solid rgba(255,255,255,.15);border-radius:18px;color:#fff;max-width:300px}
.small{font-size:11px;color:#ff2d78;letter-spacing:3px;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="menu">
<div class="logo">RADIO PUMPO</div>
<div class="sub">VISUAL FIRST V2</div>
<div class="wrap">
<div>
<button id="cruise">CRUISE MODE</button>
<div class="desc">dreamlike nostalgia phonk</div>
</div>
<div>
<button id="rush">RUSH MODE</button>
<div class="desc">premium neon arcade</div>
</div>
</div>
</div>
<div id="hud">
<div id="mode"></div>
<div id="dist">0.0 KM</div>
<div id="radio"><div class="small">♪ NOW PLAYING</div><div>Radio Pumpo — Late Night Drive</div></div>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,mode='cruise',running=false,dist=0,speed=1,curve=0,carLane=0,targetLane=0,time=0;
const hud=document.getElementById('hud');
const stars=[...Array(140)].map(()=>({x:Math.random(),y:Math.random(),s:Math.random()*2+.5,a:Math.random()}));
const skyline=[...Array(35)].map((_,i)=>({x:i/35,h:Math.random()*120+40,w:Math.random()*40+20}));
function rs(){w=c.width=innerWidth*devicePixelRatio;h=c.height=innerHeight*devicePixelRatio;c.style.width=innerWidth+'px';c.style.height=innerHeight+'px'}
addEventListener('resize',rs);rs();

function start(m){mode=m;running=true;hud.style.display='block';menu.style.display='none';document.getElementById('mode').textContent=(m==='rush'?'RUSH MODE':'CRUISE MODE');speed=m==='rush'?2.8:1.25;loop()}
cruise.onclick=()=>start('cruise'); rush.onclick=()=>start('rush');
addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')targetLane=-1;if(e.key==='ArrowRight'||e.key==='d')targetLane=1});
addEventListener('keyup',()=>targetLane=0);

function sky(){
const hy=h*.45;
const g=x.createLinearGradient(0,0,0,hy);
if(mode==='cruise'){
 g.addColorStop(0,'#090017');g.addColorStop(.45,'#2a1144');g.addColorStop(.75,'#ff7b47');g.addColorStop(1,'#2f0614');
}else{
 g.addColorStop(0,'#02030f');g.addColorStop(.5,'#140020');g.addColorStop(1,'#ff005d');
}
x.fillStyle=g;x.fillRect(0,0,w,hy);

// giant moon / sun
const mx=w*.5+Math.sin(time*.00015)*w*.12,my=hy*.35;
const mr=mode==='cruise'?w*.09:w*.06;
const rg=x.createRadialGradient(mx,my,0,mx,my,mr*2);
rg.addColorStop(0,mode==='cruise'?'rgba(255,210,180,1)':'rgba(255,100,180,.9)');
rg.addColorStop(.5,'rgba(255,120,120,.35)');
rg.addColorStop(1,'rgba(255,0,0,0)');
x.fillStyle=rg;x.beginPath();x.arc(mx,my,mr,0,7);x.fill();

// stars
for(const s of stars){x.globalAlpha=s.a*(mode==='rush'?.55:1);x.fillStyle='#fff';x.fillRect(s.x*w,s.y*hy,s.s,s.s)}

// haze
for(let i=0;i<4;i++){
 x.fillStyle=`rgba(${mode==='cruise'?'255,130,80':'255,0,140'},${mode==='cruise'?0.04:0.025})`;
 x.beginPath();x.ellipse(w*(.2+i*.22),hy-(i*10),w*.3,h*.08,0,0,7);x.fill();
}

// skyline
x.fillStyle='rgba(0,0,0,.45)';
for(const b of skyline){x.fillRect(b.x*w,hy-b.h,b.w,b.h)}

// fog overlay
const fg=x.createLinearGradient(0,hy-100,0,h);
fg.addColorStop(0,'rgba(255,100,80,.04)');
fg.addColorStop(1,'rgba(0,0,0,.22)');
x.fillStyle=fg;x.fillRect(0,hy-100,w,h);
}

function road(){
const hy=h*.45;
curve=Math.sin(time*.00035)*(mode==='cruise'?140:220);
for(let i=120;i>0;i--){
 const p=i/120;
 const y=hy+(1-p)*(h-hy);
 const scale=1+(1-p)*3.8;
 const rw=w*(mode==='rush'?.18:.22)*scale;
 const cx=w/2+curve*(1-p)*(1-p);
 const nx=w/2+curve*((1-(i-1)/120)**2);
 const py=hy+(1-(i-1)/120)*(h-hy);

 // grass
 x.fillStyle=i%2?'#071208':'#09180a';
 x.beginPath();x.moveTo(0,py);x.lineTo(nx-rw,py);x.lineTo(cx-rw,y);x.lineTo(0,y);x.fill();
 x.beginPath();x.moveTo(w,py);x.lineTo(nx+rw,py);x.lineTo(cx+rw,y);x.lineTo(w,y);x.fill();

 // asphalt
 const rg=x.createLinearGradient(0,py,0,y);
 rg.addColorStop(0,mode==='rush'?'#0f1026':'#171728');
 rg.addColorStop(1,mode==='rush'?'#070813':'#101018');
 x.fillStyle=rg;
 x.beginPath();x.moveTo(nx-rw,py);x.lineTo(nx+rw,py);x.lineTo(cx+rw,y);x.lineTo(cx-rw,y);x.fill();

 // neon glow
 x.strokeStyle=mode==='rush'?'rgba(255,45,120,.95)':'rgba(255,180,100,.55)';
 x.lineWidth=Math.max(1,6*p);
 x.shadowBlur=mode==='rush'?22:12;
 x.shadowColor=mode==='rush'?'#ff2d78':'#ff9944';
 x.beginPath();x.moveTo(nx-rw,py);x.lineTo(cx-rw,y);x.stroke();
 x.beginPath();x.moveTo(nx+rw,py);x.lineTo(cx+rw,y);x.stroke();
 x.shadowBlur=0;

 // center lane streaks
 if(i%5===0){x.strokeStyle='rgba(255,255,255,.4)';x.beginPath();x.moveTo(nx,py);x.lineTo(cx,y);x.stroke()}
 }
}

function car(){
 carLane+=(targetLane-carLane)*.09;
 const cx=w/2+carLane*160,cy=h*.82;
 const lean=carLane*8;
 x.save();x.translate(cx,cy);x.rotate(lean*Math.PI/180);

 // underglow
 const glow=x.createRadialGradient(0,10,0,0,10,120);
 glow.addColorStop(0,mode==='rush'?'rgba(255,45,120,.35)':'rgba(0,255,231,.25)');
 glow.addColorStop(1,'rgba(0,0,0,0)');
 x.fillStyle=glow;x.beginPath();x.ellipse(0,10,100,45,0,0,7);x.fill();

 // body
 const body=x.createLinearGradient(0,-50,0,30);
 body.addColorStop(0,mode==='rush'?'#ff67b0':'#2effdd');
 body.addColorStop(1,mode==='rush'?'#8d0d4d':'#008a8d');
 x.fillStyle=body;
 x.beginPath();x.roundRect(-45,-40,90,48,16);x.fill();

 // cabin
 x.fillStyle='rgba(160,220,255,.35)';
 x.beginPath();x.roundRect(-24,-62,48,28,10);x.fill();

 // headlights
 x.fillStyle='rgba(255,255,255,.95)';x.fillRect(-36,-10,12,5);x.fillRect(24,-10,12,5);
 x.restore();
}

function speedLines(){
 if(mode!=='rush') return;
 x.strokeStyle='rgba(255,255,255,.08)';
 for(let i=0;i<30;i++){
 const sx=Math.random()*w; const sy=Math.random()*h;
 x.beginPath();x.moveTo(sx,sy);x.lineTo(sx,sy+20+Math.random()*40);x.stroke();
 }
}

function loop(){
 if(!running) return;
 time+=16; dist+=speed*.012;
 document.getElementById('dist').textContent=dist.toFixed(1)+' KM';
 x.clearRect(0,0,w,h);
 sky(); road(); speedLines(); car();
 requestAnimationFrame(loop)
}
</script>
</body>
</html>
