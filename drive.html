<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Radio Pumpo Drive — Visual Upgrade</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root{

  --neon-pink:#ff2d78;

  --neon-cyan:#00ffe7;

  --neon-purple:#b24bff;

}

html,body{

  width:100%;

  height:100%;

  overflow:hidden;

  background:#000;

  font-family:'Rajdhani',sans-serif;

  user-select:none;

  touch-action:none;

}

canvas{

  position:fixed;

  inset:0;

  width:100%;

  height:100%;

}

/* ───────── HUD ───────── */

#hud{position:fixed;inset:0;pointer-events:none;z-index:10}

#mode-badge{

  position:absolute;

  top:18px;left:18px;

  color:var(--neon-cyan);

  font-weight:700;

  letter-spacing:2px;

  text-shadow:0 0 10px var(--neon-cyan);

}

#hud-top{

  position:absolute;

  top:18px;right:18px;

  text-align:right;

}

#hud-distance{

  color:var(--neon-cyan);

  font-family:'Share Tech Mono';

  text-shadow:0 0 10px var(--neon-cyan);

}

#hud-combo{

  color:var(--neon-pink);

  font-size:32px;

  text-shadow:0 0 15px var(--neon-pink);

}

.hidden{opacity:0}

/* ───────── RADIO ───────── */

#radio-hud{

  position:absolute;

  bottom:18px;

  left:14px;

}

#radio-bar{

  display:flex;

  gap:10px;

  padding:10px 12px;

  background:rgba(0,0,0,0.55);

  border:1px solid rgba(255,45,120,0.4);

  backdrop-filter:blur(10px);

  border-radius:10px;

}

#radio-dot{

  width:8px;height:8px;border-radius:50%;

  background:#444;

}

#radio-dot.live{

  background:var(--neon-pink);

  box-shadow:0 0 10px var(--neon-pink);

}

#pumpo-song-marquee{

  color:#fff;

  font-size:12px;

  white-space:nowrap;

}

/* ───────── OVERLAYS ───────── */

#scanlines{

  position:fixed;inset:0;

  pointer-events:none;

  background:repeating-linear-gradient(

    0deg,

    transparent,

    transparent 3px,

    rgba(0,0,0,0.08) 4px

  );

  z-index:9;

}

#vignette{

  position:fixed;inset:0;

  pointer-events:none;

  background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6));

  z-index:9;

}

/* MENU (unchanged visually simplified) */

#menu-screen{

  position:fixed;inset:0;

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  background:linear-gradient(180deg,#050008,#120020,#000);

  z-index:100;

}

.menu-logo{

  font-size:54px;

  color:white;

  text-shadow:0 0 30px var(--neon-pink);

}

/* TOUCH */

#touch-left,#touch-right{

  position:fixed;

  top:0;bottom:0;

  width:50%;

  z-index:5;

}

#touch-left{left:0}

#touch-right{right:0}

</style>

</head>

<body>

<canvas id="gameCanvas"></canvas>

<div id="scanlines"></div>

<div id="vignette"></div>

<div id="hud">

  <div id="mode-badge">CRUISE</div>

  <div id="hud-top">

    <div id="hud-distance">0 km</div>

    <div id="hud-combo" class="hidden">x1</div>

  </div>

  <div id="radio-hud">

    <div id="radio-bar">

      <div id="radio-dot"></div>

      <div id="pumpo-song-marquee">Radio Pumpo</div>

    </div>

  </div>

</div>

<div id="touch-left"></div>

<div id="touch-right"></div>

<div id="menu-screen">

  <div class="menu-logo">RADIO PUMPO</div>

</div>

<script>

'use strict';

/* ===================== GAME CORE (UNCHANGED LOGIC) ===================== */

const canvas = document.getElementById("gameCanvas");

const ctx = canvas.getContext("2d");

let W=0,H=0;

function resize(){

  W=canvas.width=innerWidth*devicePixelRatio;

  H=canvas.height=innerHeight*devicePixelRatio;

}

addEventListener("resize",resize);

resize();

let mode="cruise";

let speed=1;

let distance=0;

let combo=0;

const car={lane:1,x:0};

const lanes=3;

const keys={left:false,right:false};

addEventListener("keydown",e=>{

  if(e.key==="ArrowLeft")keys.left=true;

  if(e.key==="ArrowRight")keys.right=true;

});

addEventListener("keyup",e=>{

  if(e.key==="ArrowLeft")keys.left=false;

  if(e.key==="ArrowRight")keys.right=false;

});

function laneToX(l){return (l-1)*0.6}

/* ===================== ROAD ===================== */

function drawSky(){

  const g=ctx.createLinearGradient(0,0,0,H*0.5);

  g.addColorStop(0,"#050010");

  g.addColorStop(1,"#ff2d78");

  ctx.fillStyle=g;

  ctx.fillRect(0,0,W,H);

}

/* cinematic haze */

function drawHaze(){

  const g=ctx.createRadialGradient(W/2,H*0.4,50,W/2,H*0.4,H*0.8);

  g.addColorStop(0,"rgba(255,50,120,0.2)");

  g.addColorStop(1,"transparent");

  ctx.fillStyle=g;

  ctx.fillRect(0,0,W,H);

}

/* pseudo road */

function drawRoad(){

  const horizon=H*0.4;

  for(let i=0;i<120;i++){

    const t=i/120;

    const y=horizon+t*(H-horizon);

    const w=200*(1-t);

    const curve=Math.sin(i*0.05+performance.now()*0.001)*60;

    const left=W/2-w+curve;

    const right=W/2+w+curve;

    ctx.fillStyle=i%2?"#111":"#0a0a0a";

    ctx.beginPath();

    ctx.moveTo(left,y);

    ctx.lineTo(right,y);

    ctx.lineTo(right,y+10);

    ctx.lineTo(left,y+10);

    ctx.fill();

    /* neon edges */

    ctx.strokeStyle="rgba(255,45,120,0.4)";

    ctx.beginPath();

    ctx.moveTo(left,y);

    ctx.lineTo(left,y+10);

    ctx.stroke();

  }

}

/* ===================== CAR (UPGRADED VISUAL ONLY) ===================== */

function drawCar(){

  const baseX=W/2+car.x*150;

  const baseY=H*0.75;

  const bob=Math.sin(performance.now()*0.01)*3;

  /* underglow */

  const glow=ctx.createRadialGradient(baseX,baseY,5,baseX,baseY,80);

  glow.addColorStop(0,"rgba(0,255,231,0.5)");

  glow.addColorStop(1,"transparent");

  ctx.fillStyle=glow;

  ctx.beginPath();

  ctx.arc(baseX,baseY,80,0,Math.PI*2);

  ctx.fill();

  /* body */

  ctx.fillStyle="#ff2d78";

  ctx.fillRect(baseX-20,baseY-20+bob,40,20);

  /* roof */

  ctx.fillStyle="#b00050";

  ctx.fillRect(baseX-12,baseY-35+bob,24,15);

  /* headlights */

  ctx.fillStyle="#fff";

  ctx.fillRect(baseX-18,baseY-18,6,4);

  ctx.fillRect(baseX+12,baseY-18,6,4);

}

/* ===================== LOOP ===================== */

function update(){

  if(keys.left)car.x-=0.02;

  if(keys.right)car.x+=0.02;

  car.x=Math.max(-1,Math.min(1,car.x));

  distance+=speed*0.01;

}

function render(){

  ctx.clearRect(0,0,W,H);

  drawSky();

  drawHaze();

  drawRoad();

  drawCar();

  /* vignette */

  const v=ctx.createRadialGradient(W/2,H/2,100,W/2,H/2,W);

  v.addColorStop(0,"transparent");

  v.addColorStop(1,"rgba(0,0,0,0.6)");

  ctx.fillStyle=v;

  ctx.fillRect(0,0,W,H);

}

function loop(){

  update();

  render();

  requestAnimationFrame(loop);

}

loop();

</script>

</body>

</html>
