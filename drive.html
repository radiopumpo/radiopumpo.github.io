<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Pumpo Drive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --neon-pink:   #ff2d78;
    --neon-cyan:   #00ffe7;
    --neon-purple: #b24bff;
    --hud-bg:      rgba(0,0,0,0.6);
    --hud-border:  rgba(255,45,120,0.45);
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Rajdhani', sans-serif;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #gameCanvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  /* ── HUD ── */
  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  #mode-badge {
    position: absolute;
    top: env(safe-area-inset-top, 16px);
    top: max(16px, env(safe-area-inset-top));
    left: 18px;
    font-size: 11px; letter-spacing: 2px; font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
    text-transform: uppercase;
  }
  #hud-top {
    position: absolute;
    top: max(16px, env(safe-area-inset-top));
    right: 18px;
    text-align: right;
  }
  #hud-distance {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(14px, 4vw, 20px);
    color: var(--neon-cyan);
    letter-spacing: 2px;
    text-shadow: 0 0 12px var(--neon-cyan);
  }
  #hud-combo {
    font-size: clamp(24px, 7vw, 38px);
    font-weight: 700;
    color: var(--neon-pink);
    text-shadow: 0 0 16px var(--neon-pink);
    line-height: 1;
    transition: opacity 0.3s;
  }
  #hud-combo.hidden { opacity: 0; }
  /* Radio bar — bottom left, clear of safari UI */
  #radio-hud {
    position: absolute;
    bottom: max(18px, env(safe-area-inset-bottom));
    left: 14px;
    pointer-events: all;
    max-width: min(320px, calc(100vw - 28px));
  }
  #radio-bar {
    background: var(--hud-bg);
    border: 1px solid var(--hud-border);
    border-radius: 10px;
    padding: 9px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  #radio-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: #444;
  }
  #radio-dot.live {
    background: var(--neon-pink);
    box-shadow: 0 0 8px var(--neon-pink);
    animation: dotpulse 1.4s ease-in-out infinite;
  }
  @keyframes dotpulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  #radio-text { overflow: hidden; min-width: 0; flex: 1; }
  #radio-label {
    font-size: 8px; letter-spacing: 2px; color: var(--neon-pink);
    font-weight: 700; text-transform: uppercase; margin-bottom: 2px;
  }
  #pumpo-song-marquee {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 3vw, 13px);
    color: #fff; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  #pumpo-song-marquee.scrolling {
    animation: mq 14s linear infinite;
  }
  @keyframes mq {
    0%,25% { transform: translateX(0); }
    75%,100% { transform: translateX(var(--sd,-50px)); }
  }
  #pumpo-radio-toggle {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--neon-pink);
    color: var(--neon-pink);
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    padding: 6px 10px; border-radius: 5px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  #pumpo-radio-toggle.on {
    background: var(--neon-pink); color: #000;
  }
  /* Feedback overlays */
  #near-miss-flash {
    position: absolute; top: 42%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: clamp(18px, 5vw, 32px); font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan);
    letter-spacing: 3px; opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s;
    white-space: nowrap;
    text-align: center;
  }
  #crash-overlay {
    position: absolute; inset: 0;
    background: rgba(255,0,50,0.38);
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s;
  }
  #billboard-msg {
    position: absolute; top: 35%; left: 50%;
    transform: translateX(-50%);
    font-size: clamp(12px, 3vw, 16px); font-style: italic;
    color: rgba(255,210,120,0.9);
    text-shadow: 0 0 12px rgba(255,140,0,0.6);
    letter-spacing: 1px; opacity: 0;
    pointer-events: none;
    transition: opacity 0.9s;
    white-space: nowrap; text-align: center;
  }
  /* Mobile touch zones */
  #touch-left, #touch-right {
    position: fixed; top: 0; bottom: 0; width: 50%; z-index: 5;
    pointer-events: all;
  }
  #touch-left  { left: 0; }
  #touch-right { right: 0; }
  /* Scanlines */
  #scanlines {
    position: fixed; inset: 0; z-index: 8; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px
    );
  }
  /* ── MENU ── */
  #menu-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(180deg, #050008 0%, #110020 55%, #2a0010 100%);
  }
  .menu-logo {
    font-size: clamp(32px, 10vw, 58px);
    font-weight: 700; letter-spacing: 4px; color: #fff;
    text-shadow: 0 0 30px var(--neon-pink), 0 0 60px rgba(255,45,120,0.35);
    margin-bottom: 6px;
  }
  .menu-sub {
    font-size: clamp(11px, 3vw, 14px); letter-spacing: 7px;
    color: var(--neon-cyan); text-shadow: 0 0 12px var(--neon-cyan);
    margin-bottom: 52px; text-transform: uppercase;
  }
  .menu-buttons {
    display: flex; flex-direction: column; gap: 16px;
    align-items: center; width: 100%; max-width: 300px; padding: 0 20px;
  }
  .menu-btn {
    width: 100%; background: transparent;
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(15px, 4vw, 18px); font-weight: 700; letter-spacing: 3px;
    padding: 16px 24px; border-radius: 7px; cursor: pointer;
    text-transform: uppercase; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-btn.cruise {
    border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
    box-shadow: 0 0 18px rgba(0,255,231,0.08);
  }
  .menu-btn.cruise:active { background: rgba(0,255,231,0.12); }
  .menu-btn.rush {
    border: 1px solid var(--neon-pink); color: var(--neon-pink);
    text-shadow: 0 0 10px var(--neon-pink);
    box-shadow: 0 0 18px rgba(255,45,120,0.08);
  }
  .menu-btn.rush:active { background: rgba(255,45,120,0.12); }
  .menu-mode-desc {
    font-size: clamp(10px, 2.5vw, 12px); color: rgba(255,255,255,0.4);
    letter-spacing: 1px; margin-top: -8px; text-align: center;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="scanlines"></div>

<div id="hud">
  <div id="mode-badge">CRUISE MODE</div>
  <div id="hud-top">
    <div id="hud-distance">0.0 km</div>
    <div id="hud-combo" class="hidden">x1</div>
  </div>
  <div id="radio-hud">
    <div id="radio-bar">
      <div id="radio-dot"></div>
      <div id="radio-text">
        <div id="radio-label">♪ now playing</div>
        <div id="pumpo-song-marquee">Radio Pumpo — Tune In</div>
      </div>
      <button id="pumpo-radio-toggle">TUNE IN</button>
    </div>
  </div>
  <div id="near-miss-flash"></div>
  <div id="crash-overlay"></div>
  <div id="billboard-msg"></div>
</div>

<div id="touch-left"></div>
<div id="touch-right"></div>

<div id="menu-screen">
  <div class="menu-logo">RADIO PUMPO</div>
  <div class="menu-sub">Drive</div>
  <div class="menu-buttons">
    <button class="menu-btn cruise" id="btn-cruise">Cruise Mode</button>
    <div class="menu-mode-desc">meditative · no fail · long sessions</div>
    <button class="menu-btn rush" id="btn-rush">Rush Mode</button>
    <div class="menu-mode-desc">dopamine · near misses · one more run</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  RADIO PUMPO DRIVE  —  Phase 1 POC  v1.1 (mobile fix)
// ═══════════════════════════════════════════════════════════
'use strict';

(function GAME() {

// ── CANVAS ────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth  * (window.devicePixelRatio || 1);
  H = canvas.height = window.innerHeight * (window.devicePixelRatio || 1);
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── STATE ─────────────────────────────────────────────────
let gameMode   = 'cruise';   // 'cruise' | 'rush'
let inGame     = false;

// ── INPUT ─────────────────────────────────────────────────
const keys = { left: false, right: false };

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

const tl = document.getElementById('touch-left');
const tr = document.getElementById('touch-right');
tl.addEventListener('touchstart', e => { e.preventDefault(); keys.left  = true;  }, { passive: false });
tl.addEventListener('touchend',   e => { e.preventDefault(); keys.left  = false; }, { passive: false });
tl.addEventListener('touchcancel',e => { keys.left  = false; });
tr.addEventListener('touchstart', e => { e.preventDefault(); keys.right = true;  }, { passive: false });
tr.addEventListener('touchend',   e => { e.preventDefault(); keys.right = false; }, { passive: false });
tr.addEventListener('touchcancel',e => { keys.right = false; });

// ── CAR ───────────────────────────────────────────────────
const LANES = 3;
const car = {
  lane: 1,
  laneX: 0.0,        // smooth visual -1..1
  laneXTarget: 0.0,
  cooldown: 0,
  crashFlash: 0,
};

function laneToNorm(lane) { return (lane - 1); } // -1, 0, 1  (scaled by road width at draw time)

// ── ROAD PSEUDO-3D ────────────────────────────────────────
// Segments define gentle curves. We project NUM_SEGS ahead.
const ROAD_SEGS_TOTAL = 600;
const NUM_DRAW_SEGS   = 120;
const SEG_DUR         = 200; // world units per segment

let roadSegs = [];
let scrollPos = 0; // fractional segment offset

function initRoad() {
  roadSegs = [];
  for (let i = 0; i < ROAD_SEGS_TOTAL; i++) {
    let curve = 0;
    // gentle sinusoidal curves
    const phase = (i / ROAD_SEGS_TOTAL) * Math.PI * 12;
    curve = Math.sin(phase * 0.7) * 0.6 + Math.sin(phase * 0.3) * 0.4;
    roadSegs.push({ curve, alt: i % 2 });
  }
}

// Project one segment: returns screen y, road left/right x
function project(segFrac) {
  // segFrac: 0 = horizon, 1 = bottom of screen
  // Use a simple perspective: scale = 1/(1 + (1-segFrac)*depth)
  const depth = 0.96;
  const scale = 1 / (1 - segFrac * depth + 0.001);
  const horizonY = H * 0.44;
  const y = horizonY + segFrac * (H - horizonY);
  // Road width at this depth — wider near camera
  const roadHalfW = scale * W * 0.28;
  return { y, roadHalfW, scale };
}

// ── OBSTACLES ─────────────────────────────────────────────
let obstacles     = [];
let spawnTimer    = 0;
let spawnInterval = 200; // frames

function spawnObstacle() {
  // Don't spawn in same lane as car (too cheap at low speed)
  let lane;
  do { lane = Math.floor(Math.random() * LANES); }
  while (obstacles.length < 2 && lane === car.lane && gameMode === 'cruise');

  obstacles.push({
    lane,
    depth: 0.02,       // 0=horizon .. 1=camera. grows each frame
    hit: false,
    missed: false,
    col: ['#c0392b','#2471a3','#d4ac0d','#7d3c98','#1a7a5e'][Math.floor(Math.random()*5)],
  });
}

// ── METRICS ───────────────────────────────────────────────
let distance  = 0;
let combo     = 0;
let speed     = 0;
let targetSpd = 0;
let rushTime  = 0;

// ── PARTICLES (near miss burst) ───────────────────────────
let particles = [];
function burst(x, y) {
  for (let i = 0; i < 14; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: 1, decay: 0.04 + Math.random() * 0.04,
      r: 2 + Math.random() * 3,
      col: Math.random() > 0.5 ? '#00ffe7' : '#ff2d78',
    });
  }
}

// ── SHAKE ─────────────────────────────────────────────────
let shakeMag = 0;
let shakeX = 0, shakeY = 0;
function shake(m) { shakeMag = Math.max(shakeMag, m); }

// ── BILLBOARD ─────────────────────────────────────────────
const SIGNS = [
  '"You made it this far."',
  '"No destination required."',
  '"Maybe today changes everything."',
  '"Are you becoming who you imagined?"',
  '"Keep driving."',
  '"Radio Pumpo. Always on."',
  '"Still here. Still moving."',
  '"The road remembers."',
];
let signTimer = 1800;
let lastSign  = -1;
function showSign() {
  let i; do { i = Math.floor(Math.random() * SIGNS.length); } while (i === lastSign);
  lastSign = i;
  const el = document.getElementById('billboard-msg');
  el.textContent = SIGNS[i];
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 3500);
}

// ── SPEED STARS ───────────────────────────────────────────
const stars = Array.from({ length: 70 }, () => ({
  x: Math.random(), y: Math.random() * 0.44,
  s: 0.4 + Math.random() * 1.2, a: 0.2 + Math.random() * 0.55,
  spd: 0.3 + Math.random() * 0.7,
}));

// ── GAME LOOP ─────────────────────────────────────────────
let lastTs  = 0;
let animId  = null;
let crashLock = 0;

function startGame(mode) {
  gameMode  = mode;
  inGame    = true;
  distance  = 0; combo = 0; rushTime = 0;
  scrollPos = 0; obstacles = []; particles = [];
  spawnTimer = 0; crashLock = 0; shakeMag = 0;
  car.lane = 1; car.laneX = 0; car.laneXTarget = 0;
  car.cooldown = 0; car.crashFlash = 0;
  speed = targetSpd = mode === 'rush' ? 1.8 : 1.0;
  spawnInterval = mode === 'rush' ? 140 : 310;
  signTimer = 1600;

  const badge = document.getElementById('mode-badge');
  badge.textContent = mode === 'rush' ? 'RUSH MODE' : 'CRUISE MODE';
  badge.style.color = mode === 'rush' ? 'var(--neon-pink)' : 'var(--neon-cyan)';
  badge.style.textShadow = mode === 'rush'
    ? '0 0 10px var(--neon-pink)' : '0 0 10px var(--neon-cyan)';

  initRoad();
  if (animId) cancelAnimationFrame(animId);
  lastTs = performance.now();
  animId = requestAnimationFrame(loop);
}

function loop(ts) {
  const raw = Math.min((ts - lastTs) / 16.667, 3);
  lastTs = ts;
  update(raw);
  render();
  animId = requestAnimationFrame(loop);
}

// ── UPDATE ────────────────────────────────────────────────
function update(dt) {
  if (!inGame) return;

  // Lane input
  if (car.cooldown > 0) {
    car.cooldown -= dt;
  } else {
    if (keys.left  && car.lane > 0)          { car.lane--; car.cooldown = 16; }
    if (keys.right && car.lane < LANES - 1)  { car.lane++; car.cooldown = 16; }
  }
  car.laneXTarget = laneToNorm(car.lane);
  car.laneX += (car.laneXTarget - car.laneX) * 0.16 * dt;

  // Speed
  if (gameMode === 'rush') {
    rushTime += dt;
    const ramp = rushTime < 60*3.6 ? 1.8
               : rushTime < 60*3.6*3 ? 2.6
               : rushTime < 60*3.6*5 ? 3.6
               : 5.0;
    targetSpd = ramp;
    spawnInterval = Math.max(40, 140 - rushTime / 80);
  } else {
    targetSpd = 1.0 + Math.sin(Date.now() / 9000) * 0.2;
  }
  speed += (targetSpd - speed) * 0.035 * dt;

  // Scroll
  scrollPos = (scrollPos + speed * dt * 0.015) % ROAD_SEGS_TOTAL;

  // Distance
  distance += speed * dt * 0.00028;

  // Obstacle spawn
  spawnTimer += dt;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    if (gameMode === 'rush' || obstacles.length < 2) spawnObstacle();
  }

  // Move obstacles (depth grows as they approach)
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    // depth increases from 0 (horizon) toward 1 (camera)
    // rate proportional to current depth (perspective acceleration)
    o.depth += speed * dt * 0.0035 * (0.2 + o.depth * 2.8);

    // Near miss window: depth 0.75..0.88 — must be different lane
    if (!o.missed && !o.hit && o.depth > 0.75 && o.depth < 0.88) {
      if (o.lane !== car.lane) {
        o.missed = true; // safe — won't collide even if depths overlap
        if (Math.abs(o.lane - car.lane) === 1) {
          triggerNearMiss(o);
        }
      }
    }

    // Collision: depth 0.80..0.94, same lane, and not already near-missed
    if (!o.hit && !o.missed && o.depth > 0.80 && o.depth < 0.94 && o.lane === car.lane) {
      o.hit = true;
      triggerCrash();
    }

    if (o.depth > 1.1) obstacles.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Shake decay
  if (shakeMag > 0) {
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= 0.80;
    if (shakeMag < 0.3) shakeMag = 0;
  } else { shakeX = shakeY = 0; }

  if (car.crashFlash > 0) car.crashFlash -= dt;
  if (crashLock > 0) crashLock -= dt;

  // Billboard
  signTimer -= dt;
  if (signTimer <= 0) { showSign(); signTimer = 1600 + Math.random() * 700; }

  // Stars parallax
  for (const s of stars) {
    s.y += s.spd * speed * dt * 0.0003;
    if (s.y > 0.44) { s.y = 0; s.x = Math.random(); }
  }

  // HUD
  document.getElementById('hud-distance').textContent = distance.toFixed(1) + ' km';
  const cel = document.getElementById('hud-combo');
  if (combo >= 2) { cel.classList.remove('hidden'); cel.textContent = 'x' + combo; }
  else cel.classList.add('hidden');
}

// ── EVENTS ────────────────────────────────────────────────
let nmTimeout = null;
function triggerNearMiss(o) {
  combo++;
  const pts = combo >= 3 ? 100 : 50;
  const fl  = document.getElementById('near-miss-flash');
  fl.textContent = combo >= 3
    ? `NEAR MISS  ×${combo}  +${pts * combo}`
    : `NEAR MISS  +${pts}`;
  fl.style.opacity = '1';
  if (nmTimeout) clearTimeout(nmTimeout);
  nmTimeout = setTimeout(() => { fl.style.opacity = '0'; }, 900);
  shake(3);

  // particle burst at car position (screen center bottom-ish)
  burst(W / 2 + car.laneX * W * 0.18, H * 0.78);
}

function triggerCrash() {
  if (crashLock > 0) return;
  crashLock = 35;
  combo = 0;
  shake(gameMode === 'rush' ? 12 : 6);
  car.crashFlash = 20; // short blink only
  const ov = document.getElementById('crash-overlay');
  ov.style.opacity = '1';
  setTimeout(() => { ov.style.opacity = '0'; }, 220);
  if (gameMode === 'rush') {
    speed *= 0.55;
    targetSpd *= 0.75;
  } else {
    speed *= 0.75;
  }
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  ctx.save();
  if (shakeMag > 0.3) ctx.translate(shakeX, shakeY);
  ctx.clearRect(0, 0, W, H);

  const horizonY = H * 0.44;
  drawSky(horizonY);
  drawStars(horizonY);
  drawRoad(horizonY);
  drawObstacles(horizonY);
  drawCar(horizonY);
  drawParticles();

  ctx.restore();
}

// ── SKY ───────────────────────────────────────────────────
function drawSky(hy) {
  // Deep purple/indigo sky
  const g = ctx.createLinearGradient(0, 0, 0, hy);
  g.addColorStop(0,    '#0d0018');
  g.addColorStop(0.35, '#1a0035');
  g.addColorStop(0.72, '#2d0050');
  g.addColorStop(1,    '#1a0030');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, hy);

  // Big retrowave striped sun
  drawRetroSun(hy);

  // Skyline
  drawSkyline(hy);

  // Palm silhouettes
  drawPalms(hy);

  // Horizon glow (hot pink)
  const hg = ctx.createLinearGradient(0, hy - 60, 0, hy + 20);
  hg.addColorStop(0,   'rgba(255,0,120,0)');
  hg.addColorStop(0.4, 'rgba(255,0,120,0.28)');
  hg.addColorStop(1,   'rgba(255,0,80,0)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, hy - 60, W, 80);
}

function drawRetroSun(hy) {
  const cx = W * 0.5;
  const cy = hy * 0.62;
  const r  = Math.min(W, hy) * 0.22;

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();

  // Sun gradient body
  const sg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  sg.addColorStop(0,   '#ffffff');
  sg.addColorStop(0.15,'#ffaacc');
  sg.addColorStop(0.45,'#ff2d9a');
  sg.addColorStop(0.8, '#cc0066');
  sg.addColorStop(1,   '#880044');
  ctx.fillStyle = sg;
  ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

  // Horizontal stripes (retrowave signature)
  // Only in lower half of sun — thin dark bands
  const stripeCount = 8;
  for (let i = 0; i < stripeCount; i++) {
    const t   = i / stripeCount;
    const sy  = cy + t * r;           // stripe Y from center downward
    const sw  = Math.sqrt(Math.max(0, r*r - (sy-cy)*(sy-cy))) * 2; // chord width
    const sh  = r / (stripeCount * 1.8) * (1 + t * 1.2);           // thicker near bottom
    ctx.fillStyle = `rgba(10,0,20,${0.55 + t * 0.3})`;
    ctx.fillRect(cx - sw / 2, sy, sw, sh);
  }

  ctx.restore();

  // Outer glow
  const og = ctx.createRadialGradient(cx, cy, r * 0.7, cx, cy, r * 2.2);
  og.addColorStop(0,   'rgba(255,0,120,0.22)');
  og.addColorStop(0.5, 'rgba(180,0,100,0.08)');
  og.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = og;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 2.2, 0, Math.PI * 2);
  ctx.fill();
}

function drawSkyline(hy) {
  const blds = [
    // [x_frac, w_frac, h_frac]  — two layers for depth
    // Back layer (shorter, lighter)
    [0.00,0.06,0.14],[0.07,0.04,0.18],[0.12,0.05,0.12],[0.18,0.03,0.22],
    [0.22,0.05,0.16],[0.28,0.04,0.11],[0.33,0.06,0.19],[0.40,0.03,0.24],
    [0.44,0.04,0.14],[0.49,0.05,0.20],[0.55,0.03,0.17],[0.59,0.06,0.13],
    [0.66,0.04,0.21],[0.71,0.03,0.16],[0.75,0.05,0.12],[0.81,0.04,0.18],
    [0.86,0.05,0.14],[0.92,0.04,0.20],[0.97,0.03,0.15],
  ];

  // Back layer — dark purple silhouette
  ctx.fillStyle = 'rgba(15,0,30,0.88)';
  for (const [bx,bw,bh] of blds) {
    const x = bx*W, w = bw*W, h = bh*hy*0.7;
    ctx.fillRect(x, hy - h, w, h);
  }

  // Windows on back layer — tiny pink/cyan dots
  for (const [bx,bw,bh] of blds) {
    const x = bx*W, w = bw*W, h = bh*hy*0.7;
    for (let wy = hy - h + 4; wy < hy - 6; wy += 7) {
      for (let wx = x + 3; wx < x + w - 3; wx += 6) {
        if (Math.random() > 0.52) {
          ctx.fillStyle = Math.random() > 0.6
            ? 'rgba(0,220,255,0.55)'
            : 'rgba(255,60,160,0.45)';
          ctx.fillRect(wx, wy, 2, 2);
        }
      }
    }
  }

  // Front layer — closer, taller buildings, darker
  const front = [
    [0.00,0.07,0.10],[0.08,0.05,0.15],[0.14,0.08,0.09],[0.23,0.06,0.13],
    [0.30,0.07,0.08],[0.38,0.05,0.12],[0.67,0.05,0.11],[0.73,0.08,0.09],
    [0.82,0.06,0.13],[0.89,0.07,0.08],[0.97,0.03,0.11],
  ];
  ctx.fillStyle = 'rgba(6,0,15,0.96)';
  for (const [bx,bw,bh] of front) {
    ctx.fillRect(bx*W, hy - bh*hy, bw*W, bh*hy);
  }
}

function drawPalms(hy) {
  // Left palm
  drawPalm(W * 0.06, hy, hy * 0.55, -1);
  // Right palm
  drawPalm(W * 0.94, hy, hy * 0.55, 1);
  // Additional smaller ones
  drawPalm(W * 0.16, hy, hy * 0.38, -1);
  drawPalm(W * 0.84, hy, hy * 0.38, 1);
}

function drawPalm(x, groundY, h, dir) {
  ctx.save();
  ctx.strokeStyle = '#08001a';
  ctx.lineWidth   = Math.max(2, h * 0.03);
  ctx.lineCap     = 'round';

  // Trunk — slight lean away from center
  const lean = dir * h * 0.12;
  ctx.beginPath();
  ctx.moveTo(x, groundY);
  ctx.bezierCurveTo(
    x + lean * 0.3, groundY - h * 0.4,
    x + lean * 0.7, groundY - h * 0.75,
    x + lean,       groundY - h
  );
  ctx.stroke();

  // Fronds
  const tx = x + lean, ty = groundY - h;
  const fronds = [
    [-0.5,-0.3],[0.5,-0.25],[0.0,-0.55],[-0.35,-0.55],[0.35,-0.50],
    [-0.6,-0.15],[0.6,-0.12],
  ];
  ctx.lineWidth = Math.max(1.5, h * 0.018);
  for (const [fx, fy] of fronds) {
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.quadraticCurveTo(
      tx + fx * h * 0.3, ty + fy * h * 0.35,
      tx + fx * h * 0.55, ty + fy * h * 0.5 + h * 0.08
    );
    ctx.stroke();
  }
  ctx.restore();
}

function drawStars(hy) {
  ctx.save();
  for (const s of stars) {
    const alpha = s.a * Math.min(1, speed * 0.8 + 0.3);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    // Tiny cross sparkle for some stars
    if (s.s > 1.1) {
      ctx.fillRect(s.x * W - s.s, s.y * hy, s.s * 2, s.s * 0.4);
      ctx.fillRect(s.x * W - s.s * 0.2, s.y * hy - s.s * 0.8, s.s * 0.4, s.s * 1.6);
    } else {
      ctx.fillRect(s.x * W, s.y * hy, s.s, s.s);
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── ROAD (pseudo-3D retrowave) ─────────────────────────────
function drawRoad(hy) {
  const segs = [];
  let curveX = 0;

  for (let n = 0; n < NUM_DRAW_SEGS; n++) {
    const frac = n / NUM_DRAW_SEGS;
    const { y, roadHalfW } = project(frac);
    const segIdx = Math.floor(scrollPos + n * 0.5) % ROAD_SEGS_TOTAL;
    const seg    = roadSegs[segIdx < 0 ? segIdx + ROAD_SEGS_TOTAL : segIdx];
    curveX += seg.curve * (1 - frac) * speed * 0.4;
    const cx    = W / 2 + curveX;
    segs.push({ seg, y, left: cx - roadHalfW, right: cx + roadHalfW, frac, n });
  }

  // Draw far to near
  for (let i = segs.length - 1; i >= 0; i--) {
    const cur  = segs[i];
    const prev = segs[i - 1] || { y: hy, left: W/2, right: W/2 };
    drawRoadSegRetro(cur, prev, hy);
  }

  // Road reflection glow down center
  const rg = ctx.createLinearGradient(0, hy, 0, H);
  rg.addColorStop(0,   'rgba(255,0,120,0.18)');
  rg.addColorStop(0.5, 'rgba(255,0,120,0.07)');
  rg.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = rg;
  // Narrow strip down center
  const cLeft  = segs[segs.length-1].left  + (segs[segs.length-1].right - segs[segs.length-1].left) * 0.35;
  const cRight = segs[segs.length-1].left  + (segs[segs.length-1].right - segs[segs.length-1].left) * 0.65;
  ctx.beginPath();
  ctx.moveTo(W/2, hy);
  ctx.lineTo(cLeft,  H);
  ctx.lineTo(cRight, H);
  ctx.closePath();
  ctx.fill();
}

function drawRoadSegRetro(cur, prev, hy) {
  const alt = cur.seg.alt;

  // Wide shoulder / ground — deep purple
  ctx.fillStyle = alt ? '#100018' : '#0c0014';
  ctx.beginPath();
  ctx.moveTo(0, prev.y); ctx.lineTo(prev.left  - W*0.25, prev.y);
  ctx.lineTo(cur.left  - W*0.25, cur.y); ctx.lineTo(0, cur.y);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(W, prev.y); ctx.lineTo(prev.right + W*0.25, prev.y);
  ctx.lineTo(cur.right + W*0.25, cur.y); ctx.lineTo(W, cur.y);
  ctx.closePath(); ctx.fill();

  // Road surface — dark with slight blue tint
  ctx.fillStyle = alt ? '#0e0e22' : '#0a0a1c';
  ctx.beginPath();
  ctx.moveTo(prev.left, prev.y); ctx.lineTo(prev.right, prev.y);
  ctx.lineTo(cur.right,  cur.y); ctx.lineTo(cur.left,   cur.y);
  ctx.closePath(); ctx.fill();

  // Rumble strips (outer edge) — purple/pink alternating
  const stripW = (cur.right - cur.left) * 0.06;
  ctx.fillStyle = alt ? '#cc0066' : '#4400aa';
  // Left strip
  ctx.beginPath();
  ctx.moveTo(prev.left, prev.y); ctx.lineTo(prev.left + stripW, prev.y);
  ctx.lineTo(cur.left + stripW, cur.y); ctx.lineTo(cur.left, cur.y);
  ctx.closePath(); ctx.fill();
  // Right strip
  ctx.beginPath();
  ctx.moveTo(prev.right - stripW, prev.y); ctx.lineTo(prev.right, prev.y);
  ctx.lineTo(cur.right, cur.y); ctx.lineTo(cur.right - stripW, cur.y);
  ctx.closePath(); ctx.fill();

  // Neon edge lines — hot pink
  const ew = Math.max(0.5, (cur.y - prev.y) * 0.1);
  ctx.strokeStyle = 'rgba(255,0,140,0.9)';
  ctx.lineWidth   = ew;
  ctx.shadowColor = '#ff0090'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.moveTo(prev.left,  prev.y); ctx.lineTo(cur.left,  cur.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(prev.right, prev.y); ctx.lineTo(cur.right, cur.y); ctx.stroke();
  ctx.shadowBlur = 0;

  // Center dashes — bright white/cyan
  if (alt) {
    const pc = (prev.left + prev.right) / 2;
    const cc = (cur.left  + cur.right)  / 2;
    ctx.strokeStyle = 'rgba(200,240,255,0.85)';
    ctx.lineWidth   = Math.max(0.5, ew * 0.5);
    ctx.beginPath(); ctx.moveTo(pc, prev.y); ctx.lineTo(cc, cur.y); ctx.stroke();
  }

  // Lane dividers — faint cyan
  if (alt) {
    for (let l = 1; l < LANES; l++) {
      const t  = l / LANES;
      const px = prev.left + (prev.right - prev.left) * t;
      const cx2 = cur.left  + (cur.right  - cur.left)  * t;
      ctx.strokeStyle = 'rgba(0,200,255,0.12)';
      ctx.lineWidth   = Math.max(0.3, ew * 0.3);
      ctx.beginPath(); ctx.moveTo(px, prev.y); ctx.lineTo(cx2, cur.y); ctx.stroke();
    }
  }
}

// ── OBSTACLES ─────────────────────────────────────────────
function drawObstacles(hy) {
  for (const o of obstacles) {
    if (o.depth < 0.04 || o.depth > 1.05) continue;

    const frac = o.depth;
    const { y, roadHalfW } = project(frac);
    const laneT = (o.lane + 0.5) / LANES;
    const obsX  = W / 2 - roadHalfW + laneT * roadHalfW * 2;
    const scale = 0.5 + frac * 3.5;
    const ow    = Math.min(roadHalfW * 0.58, 55 * scale * (W / 800));
    const oh    = ow * 0.50;

    ctx.save();
    ctx.globalAlpha = o.hit ? 0.12 : 1;

    // Underbody neon glow (reflects on wet road)
    ctx.shadowColor = o.col; ctx.shadowBlur = ow * 0.4;
    ctx.fillStyle   = o.col + '44';
    ctx.beginPath();
    ctx.ellipse(obsX, y + oh * 0.1, ow * 0.5, oh * 0.15, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Body
    ctx.fillStyle = o.col;
    ctx.beginPath();
    ctx.roundRect(obsX - ow/2, y - oh, ow, oh, Math.max(2, oh * 0.1));
    ctx.fill();

    // Darker roof
    ctx.fillStyle = shadeColor(o.col, -40);
    ctx.beginPath();
    ctx.roundRect(obsX - ow*0.28, y - oh*1.42, ow*0.56, oh*0.45, Math.max(1, oh*0.07));
    ctx.fill();

    // Windshield — cyan tint
    ctx.fillStyle = 'rgba(80,220,255,0.4)';
    ctx.beginPath();
    ctx.roundRect(obsX - ow*0.24, y - oh*1.34, ow*0.48, oh*0.30, 2);
    ctx.fill();

    // Brake lights — hot pink glow
    ctx.shadowColor = '#ff0066'; ctx.shadowBlur = ow * 0.3;
    ctx.fillStyle = '#ff0066';
    ctx.fillRect(obsX - ow/2 + 2, y - oh*0.22, ow*0.16, oh*0.10);
    ctx.fillRect(obsX + ow/2 - ow*0.18, y - oh*0.22, ow*0.16, oh*0.10);
    ctx.shadowBlur = 0;

    // Headlights (facing us = tail lights) faint reflection on road
    const refG = ctx.createLinearGradient(obsX, y, obsX, y + oh * 0.8);
    refG.addColorStop(0, 'rgba(255,0,80,0.18)');
    refG.addColorStop(1, 'rgba(255,0,80,0)');
    ctx.fillStyle = refG;
    ctx.fillRect(obsX - ow*0.4, y, ow*0.8, oh*0.8);

    ctx.restore();
  }
}

// ── PLAYER CAR ────────────────────────────────────────────
function drawCar(hy) {
  const baseY = H * 0.80;
  const cw    = Math.min(W * 0.14, 110);
  const ch    = cw * 0.46;

  const { roadHalfW: rhw } = project(0.82);
  const laneSlotW = (rhw * 2) / LANES;
  const baseX = W / 2 + car.laneX * laneSlotW * 0.5;

  if (car.crashFlash > 0 && Math.floor(car.crashFlash / 5) % 3 === 1) return;

  ctx.save();

  const bc = gameMode === 'rush' ? '#ff1a6e' : '#00c8c0';
  const bc2 = gameMode === 'rush' ? '#cc0050' : '#009090';

  // Road reflection under car (wet road effect)
  const refG = ctx.createLinearGradient(baseX, baseY, baseX, baseY + ch * 2);
  refG.addColorStop(0, bc + '30');
  refG.addColorStop(1, 'transparent');
  ctx.fillStyle = refG;
  ctx.beginPath();
  ctx.ellipse(baseX, baseY + ch * 0.2, cw * 1.2, ch * 1.5, 0, 0, Math.PI*2);
  ctx.fill();

  // Headlight cones
  ctx.save();
  ctx.globalAlpha = 0.12;
  const lhx = baseX - cw * 0.28, rhx = baseX + cw * 0.28;
  // Left beam
  ctx.fillStyle = 'rgba(200,230,255,1)';
  ctx.beginPath();
  ctx.moveTo(lhx, baseY - ch * 0.18);
  ctx.lineTo(lhx - cw * 0.8, hy + (baseY - hy) * 0.3);
  ctx.lineTo(lhx + cw * 0.4, hy + (baseY - hy) * 0.3);
  ctx.closePath(); ctx.fill();
  // Right beam
  ctx.beginPath();
  ctx.moveTo(rhx, baseY - ch * 0.18);
  ctx.lineTo(rhx - cw * 0.4, hy + (baseY - hy) * 0.3);
  ctx.lineTo(rhx + cw * 0.8, hy + (baseY - hy) * 0.3);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // Body
  ctx.fillStyle = bc;
  ctx.beginPath();
  ctx.roundRect(baseX - cw/2, baseY - ch, cw, ch, ch * 0.09);
  ctx.fill();

  // Roof
  ctx.fillStyle = bc2;
  ctx.beginPath();
  ctx.roundRect(baseX - cw*0.3, baseY - ch*1.42, cw*0.6, ch*0.46, ch*0.07);
  ctx.fill();

  // Windshield — cyan
  ctx.fillStyle = 'rgba(100,230,255,0.48)';
  ctx.beginPath();
  ctx.roundRect(baseX - cw*0.26, baseY - ch*1.34, cw*0.52, ch*0.32, 3);
  ctx.fill();

  // Headlights
  ctx.shadowColor = 'rgba(200,240,255,0.9)'; ctx.shadowBlur = cw * 0.15;
  ctx.fillStyle   = 'rgba(220,240,255,0.95)';
  ctx.fillRect(baseX - cw/2 + 3,       baseY - ch*0.22, cw*0.18, ch*0.10);
  ctx.fillRect(baseX + cw/2 - cw*0.20, baseY - ch*0.22, cw*0.18, ch*0.10);
  ctx.shadowBlur = 0;

  // Neon underglow
  ctx.save();
  ctx.shadowColor = bc; ctx.shadowBlur = 20;
  ctx.strokeStyle = bc; ctx.lineWidth   = 2.5;
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.moveTo(baseX - cw/2 + 6, baseY + 1);
  ctx.lineTo(baseX + cw/2 - 6, baseY + 1);
  ctx.stroke();
  ctx.restore();

  ctx.restore();
}

}

// ── PARTICLES ─────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ── MENU ──────────────────────────────────────────────────
// Idle animation while menu is visible
let menuAnimId = null;
function menuIdle() {
  if (inGame) return;
  ctx.clearRect(0, 0, W, H);
  drawSky(H * 0.44);
  drawStars(H * 0.44);
  menuAnimId = requestAnimationFrame(menuIdle);
}
menuIdle();

document.getElementById('btn-cruise').addEventListener('click', () => {
  document.getElementById('menu-screen').style.display = 'none';
  if (menuAnimId) cancelAnimationFrame(menuAnimId);
  startGame('cruise');
});
document.getElementById('btn-rush').addEventListener('click', () => {
  document.getElementById('menu-screen').style.display = 'none';
  if (menuAnimId) cancelAnimationFrame(menuAnimId);
  startGame('rush');
});

})(); // END GAME IIFE

(function RADIO() {

  let playing    = false;

  ];

  // ── Clock helpers (mirror radio-player.js exactly) ──────
  function utcSec()  { const n=new Date(); return n.getUTCHours()*3600+n.getUTCMinutes()*60+n.getUTCSeconds(); }
  function utcHour() { return new Date().getUTCHours(); }
  function daypart() {
    const h = utcHour();
    if (h>=6  && h<12) return 'breakfast';
    if (h>=12 && h<19) return 'afternoons';
    return 'latenight';
  }
  function dateSeed() {
    const d=new Date();
    return parseInt(`${d.getUTCFullYear()}${String(d.getUTCMonth()+1).padStart(2,'0')}${String(d.getUTCDate()).padStart(2,'0')}`);
  }
  function seededShuffle(arr, seed) {
    const a=[...arr]; let s=seed>>>0;
    const rand=()=>{ s=(Math.imul(1664525,s)+1013904223)>>>0; return s/0x100000000; };
    for (let i=a.length-1;i>0;i--){ const j=Math.floor(rand()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
  // Mirrors radio-player.js buildSequence() exactly — tracks + segments + station IDs
  function buildSeq() {
    const dp   = daypart();
    const seed = dateSeed();
    const sf   = manifest.scheduling.segment_frequency;
    const sidf = manifest.scheduling.station_id_frequency;
    const wrap = manifest.segments.show_wrappers;
    const segs = manifest.segments[dp];
    const sids = manifest.segments.station_ids;
    const pool = manifest.tracks.filter(t => t.dayparts.includes(dp));
    const sh   = seededShuffle(pool, seed);

    const seq = [];
    let total = 0, ti = 0, segi = 0, sidi = 0, tc = 0;

    // Daypart intro wrapper
    const intro = wrap[`${dp}_intro`];
    seq.push({ type:'segment', subtype:'intro', ...intro,
               title: manifest.dayparts[dp].label });
    total += intro.duration;

    while (total < 86400) {
      const track = sh[ti % sh.length];
      seq.push({ type:'track', ...track });
      total += track.duration; ti++; tc++;

      if (tc % sf === 0) {
        const seg = segs[segi % segs.length];
        seq.push({ type:'segment', subtype:'host', ...seg,
                   title: manifest.station.host });
        total += seg.duration; segi++;
      }

      if (tc % sidf === 0 && tc % sf !== 0) {
        const sid = sids[sidi % sids.length];
        seq.push({ type:'segment', subtype:'station_id', ...sid,
                   title: 'Radio Pumpo' });

  }
  function currentPos(seq) {

    if (!marquee) return;
    const dp  = manifest ? manifest.dayparts[daypart()].label : 'Radio Pumpo';
    const ttl = (item.type === 'track' ? item.title : null) || item.label || item.title || 'Radio Pumpo';
    marquee.textContent = `${dp.toUpperCase()} — ${ttl}`;
    marquee.classList.remove('scrolling');
    requestAnimationFrame(() => {
      const parent = marquee.parentElement;
      if (parent && marquee.scrollWidth > parent.clientWidth + 4) {
        const d = -(marquee.scrollWidth - parent.clientWidth + 10);
        marquee.style.setProperty('--sd', d + 'px');
        marquee.classList.add('scrolling');
      }
    });
  }

  function setDot(on) {
    const d = document.getElementById('radio-dot');
    if (d) { d.className = on ? 'live' : ''; }
  }

  function setBtn(txt, on) {
    const b = document.getElementById('pumpo-radio-toggle');
    if (!b) return;
    b.textContent = txt;
    b.className   = on ? 'on' : '';
  }

  // ── Playback ─────────────────────────────────────────────
  function ensureAudio() {
    if (!audio) {
      audio = new Audio();
      audio.preload = 'auto';
      audio.addEventListener('ended', onEnded);
    }
  }

  function onEnded() {
    if (!playing) return;
    if (sequence) playFromPos();
    else          playFallback();
  }

  function playFromPos() {
    const {item, pos} = currentPos(sequence);
    audio.src = item.file;
    audio.currentTime = pos;
    audio.play().then(() => {
      setDot(true); setBtn('■ ON AIR', true);
      showTrack(item);
    }).catch(() => {
      setBtn('▶ TAP TO TUNE', false);
    });
  }

  function startSync() {
    if (syncTick) clearInterval(syncTick);
    syncTick = setInterval(() => {
      if (!playing || !sequence) return;
      const {item, pos} = currentPos(sequence);
      const cur = (audio.src||'').split('/').pop();
      const exp = (item.file||'').split('/').pop();
      const drift = Math.abs((audio.currentTime||0) - pos);
      if (cur !== exp) playFromPos();
      else if (drift > 8) audio.currentTime = pos;
    }, 15000);
  }

  function playFallback() {
    const t = FALLBACK[fbIdx % FALLBACK.length]; fbIdx++;
    audio.src = t.file;
    audio.play().then(() => {
      setDot(true); setBtn('■ ON AIR', true);
      const m = document.getElementById('pumpo-song-marquee');
      if (m) m.textContent = 'Radio Pumpo — ' + t.title;
    }).catch(() => { setBtn('▶ TAP TO TUNE', false); });
  }

  // ── Toggle (button click only — NO auto-play) ────────────
  async function toggle() {
    ensureAudio();

    if (playing) {
      playing = false;
      audio.pause();
      if (syncTick) { clearInterval(syncTick); syncTick = null; }
      setDot(false);
      setBtn('TUNE IN', false);
      const m = document.getElementById('pumpo-song-marquee');
      if (m) { m.textContent = 'Radio Pumpo — Tuned out'; m.classList.remove('scrolling'); }
      return;
    }

    playing = true;
    setBtn('...', false);

    // Load manifest if not yet loaded
    if (!manifest) {
      try {
        const r = await fetch(MANIFEST_URL);
        if (!r.ok) throw 0;
        manifest = await r.json();
      } catch(_) {
        manifest = null;
        console.log('[Drive Radio] No manifest — using fallback tracks.');
      }
    }

    if (manifest) {
      sequence = buildSeq();
      playFromPos();
      startSync();
    } else {
      playFallback();
    }
  }

  // ── Wire button (ONLY button, never auto) ────────────────
  const btn = document.getElementById('pumpo-radio-toggle');
  if (btn) btn.addEventListener('click', toggle);

  // Pre-fetch manifest silently — but do NOT start playback
  fetch(MANIFEST_URL)
    .then(r => r.ok ? r.json() : null)
    .then(m => { if (m) { manifest = m; console.log('[Drive Radio] Manifest cached.'); } })
    .catch(() => {});

})(); // END RADIO IIFE
</script>
</body>
