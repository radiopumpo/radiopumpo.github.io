<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Pumpo Drive</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;user-select:none;-webkit-tap-highlight-color:transparent;}
#c{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}
#sc{position:fixed;inset:0;z-index:20;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);}
#hud{position:fixed;inset:0;z-index:15;pointer-events:none;}
#near-miss{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-family:'Share Tech Mono',monospace;font-size:clamp(16px,4.5vw,28px);font-weight:700;color:#00ffe7;text-shadow:0 0 14px #00ffe7;letter-spacing:3px;opacity:0;transition:opacity 0.08s;white-space:nowrap;text-align:center;}
#crash-flash{position:absolute;inset:0;background:rgba(255,0,60,0.42);opacity:0;transition:opacity 0.1s;}
#billboard{position:absolute;top:22%;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2.5vw,15px);font-style:italic;color:rgba(255,215,120,0.90);text-shadow:0 0 12px rgba(255,120,0,0.7);letter-spacing:2px;opacity:0;transition:opacity 0.8s;white-space:nowrap;text-align:center;}
#mode-badge{position:absolute;top:max(16px,env(safe-area-inset-top));left:16px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;font-weight:700;color:#00ffe7;text-shadow:0 0 8px #00ffe7;text-transform:uppercase;}
#tl,#tr{position:fixed;top:0;bottom:0;width:50%;z-index:8;pointer-events:none;}
#tl{left:0;}#tr{right:0;}
#menu{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(4,0,10,0.5) 0%,rgba(14,0,28,0.80) 55%,rgba(32,0,18,0.96) 100%);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);transition:opacity 0.4s ease;}
.logo{font-size:clamp(34px,10vw,62px);font-weight:700;letter-spacing:5px;color:#fff;text-shadow:0 0 16px #ff2d78,0 0 40px rgba(255,45,120,0.5);margin-bottom:5px;}
.sub{font-size:clamp(11px,3vw,14px);letter-spacing:8px;color:#00ffe7;text-shadow:0 0 10px #00ffe7;margin-bottom:40px;text-transform:uppercase;}
.btns{display:flex;flex-direction:column;gap:14px;align-items:center;width:100%;max-width:300px;padding:0 20px;}
.mbtn{width:100%;background:rgba(0,0,0,0.35);font-family:'Rajdhani',sans-serif;font-size:clamp(15px,4vw,18px);font-weight:700;letter-spacing:3px;padding:14px 20px;border-radius:7px;cursor:pointer;text-transform:uppercase;transition:all 0.18s;-webkit-tap-highlight-color:transparent;}
.mbtn.cr{border:2px solid #00ffe7;color:#00ffe7;text-shadow:0 0 7px #00ffe7;}
.mbtn.ru{border:2px solid #ff2d78;color:#ff2d78;text-shadow:0 0 7px #ff2d78;}
.mbtn.cr:active{background:rgba(0,255,231,0.12);}
.mbtn.ru:active{background:rgba(255,45,120,0.12);}
.mdesc{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-top:-6px;text-align:center;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="sc"></div>
<div id="hud">
  <div id="mode-badge">IDLE</div>
  <div id="near-miss"></div>
  <div id="crash-flash"></div>
  <div id="billboard"></div>
</div>
<div id="tl"></div><div id="tr"></div>
<div id="menu">
  <div class="logo">RADIO PUMPO</div>
  <div class="sub">Drive</div>
  <div class="btns">
    <button class="mbtn cr" id="btn-cr">Start Cruise</button>
    <div class="mdesc">meditative · slow lanes · infinite glide</div>
    <button class="mbtn ru" id="btn-ru">Start Rush</button>
    <div class="mdesc">high speed · near misses · one more run</div>
  </div>
</div>
<script>
'use strict';
(function(){

// ─── CANVAS ──────────────────────────────────────────────────────────────────
var C=document.getElementById('c'), ctx=C.getContext('2d');
var W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=C.width =window.innerWidth *DPR;
  H=C.height=window.innerHeight*DPR;
  C.style.width =window.innerWidth +'px';
  C.style.height=window.innerHeight+'px';
}
resize(); window.addEventListener('resize',resize);

// ─── RRECT (Safari safe) ─────────────────────────────────────────────────────
function rr(x,y,w,h,r){
  r=Math.min(r||0,Math.abs(w)/2,Math.abs(h)/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function shade(hex,d){
  var n=parseInt((hex||'#888').replace('#',''),16)||0;
  var r=Math.max(0,Math.min(255,(n>>16)+d));
  var g=Math.max(0,Math.min(255,((n>>8)&0xff)+d));
  var b=Math.max(0,Math.min(255,(n&0xff)+d));
  return 'rgb('+r+','+g+','+b+')';
}

// ─── STATE ───────────────────────────────────────────────────────────────────
var MODE='idle', inGame=false;
var rTime=0;

// ─── RAIN ────────────────────────────────────────────────────────────────────
var rainDrops=[], rainIntensity=0, rainTarget=0;
var rainTimer=0;
function initRain(){
  rainDrops=[];
  for(var i=0;i<120;i++){
    rainDrops.push({x:Math.random(),y:Math.random(),len:0.04+Math.random()*0.06,spd:0.008+Math.random()*0.006,a:0.3+Math.random()*0.5});
  }
}
initRain();

// ─── INPUT ───────────────────────────────────────────────────────────────────
var keys={left:false,right:false};
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=true;
});
document.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=false;
});
var tl=document.getElementById('tl'),tr=document.getElementById('tr');
tl.addEventListener('touchstart',function(){if(inGame)keys.left=true;},{passive:true});
tl.addEventListener('touchend',function(){keys.left=false;},{passive:true});
tl.addEventListener('touchcancel',function(){keys.left=false;});
tr.addEventListener('touchstart',function(){if(inGame)keys.right=true;},{passive:true});
tr.addEventListener('touchend',function(){keys.right=false;},{passive:true});
tr.addEventListener('touchcancel',function(){keys.right=false;});

// Drag steering
var dragX0=null,dragLast=null,isDrag=false;
C.addEventListener('touchstart',function(e){
  dragX0=e.touches[0].clientX; dragLast=dragX0; isDrag=false;
},{passive:true});
C.addEventListener('touchmove',function(e){
  if(dragX0===null)return;
  var dx=e.touches[0].clientX-dragX0;
  if(Math.abs(dx)>5)isDrag=true;
  if(isDrag&&inGame){
    var delta=e.touches[0].clientX-dragLast;
    dragLast=e.touches[0].clientX;
    car.laneX=Math.max(-1,Math.min(1,car.laneX+delta*0.011));
    var nl=Math.round(car.laneX+1);
    car.lane=Math.max(0,Math.min(LANES-1,nl));
    car.wheelTgt=car.laneX*44;
  }
  e.preventDefault();
},{passive:false});
C.addEventListener('touchend',function(e){
  if(!isDrag&&e.changedTouches.length){
    var t=e.changedTouches[0];
    var b=window._rBtn;
    if(b){var cx=t.clientX*DPR,cy=t.clientY*DPR;if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h){if(window.radioToggle)window.radioToggle();}}
  }
  dragX0=null;isDrag=false;
},{passive:true});
C.addEventListener('mousedown',function(e){dragX0=e.clientX;dragLast=dragX0;isDrag=false;});
C.addEventListener('mousemove',function(e){
  if(e.buttons&&dragX0!==null){
    var dx=e.clientX-dragX0;
    if(Math.abs(dx)>5)isDrag=true;
    if(isDrag&&inGame){var d=e.clientX-dragLast;dragLast=e.clientX;car.laneX=Math.max(-1,Math.min(1,car.laneX+d*0.011));var nl=Math.round(car.laneX+1);car.lane=Math.max(0,Math.min(LANES-1,nl));car.wheelTgt=car.laneX*44;}
  }
});
C.addEventListener('mouseup',function(e){
  if(!isDrag){var b=window._rBtn;if(b){var cx=e.clientX*DPR,cy=e.clientY*DPR;if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h){if(window.radioToggle)window.radioToggle();}}}
  dragX0=null;isDrag=false;
});

// ─── CAR ─────────────────────────────────────────────────────────────────────
var LANES=3;
var car={lane:1,laneX:0,laneXTgt:0,wheel:0,wheelTgt:0,cooldown:0,crashFlash:0};
function laneNorm(l){return l-1;}

// ─── ROAD ─────────────────────────────────────────────────────────────────────
// OutRun-style: each segment stores curve value
// We project using a proper perspective divide
var NSEGS=600, NDRAW=100; // 100 segments — enough depth, low draw cost
var road=[], scroll=0;
function initRoad(){
  road=[];
  for(var i=0;i<NSEGS;i++){
    var p=(i/NSEGS)*Math.PI*8;
    road.push({c:Math.sin(p*0.55)*0.35+Math.sin(p*0.22)*0.18, alt:i%2});
  }
}

// PROJECTION: the key fix.
// HY = horizon Y fraction of TOTAL screen height
// Road bottom = dashY exactly (where the dashboard starts)
// We project segment n out of NDRAW:
//   depth = n/NDRAW  (0=horizon, 1=nearest)
//   screen Y = horizonY + (dashY - horizonY) * depth^0.48   — accelerating near cam
//   scale = 1/(1 - depth*0.96 + 0.001)
//   road half-width at screen = scale * BASE_HW
//   BASE_HW tuned so road fills ~90% of screen width at depth=1
var HY=0.42;
var BASE_HW=0.14; // fraction of W for road half-width at scale=1

function proj(depth){
  var hy=H*HY;
  var dashY=H*DASH_FRAC;
  var sc=1/(1-depth*0.96+0.001);
  var y=hy+(dashY-hy)*Math.pow(depth,0.48);
  var hw=sc*W*BASE_HW;
  return {y:y,hw:hw,sc:sc};
}

var DASH_FRAC=0.58; // dashboard starts at 58% of screen height

// Built segment list with accumulated curve
// Returns array of {y,l,r,seg} for use by both road draw and obstacle placement
var _segs=[];
function buildSegs(){
  _segs=[];
  var cx2=0;
  // Camera pan: vanishing point shifts with car.laneX
  var camPan=car.laneX*W*0.06;
  for(var n=0;n<NDRAW;n++){
    var depth=n/(NDRAW-1); // 0=horizon, 1=near
    var p=proj(depth);
    var idx=Math.floor(scroll+(NDRAW-1-n)*0.5)%NSEGS; // far segments = older scroll
    var seg=road[idx<0?idx+NSEGS:idx];
    cx2+=seg.c*(1-depth)*0.32;
    // Camera pan fades to 0 at horizon (1-depth), full at camera (depth=1... wait, inverted)
    // depth=0 is horizon, depth=1 is near — pan should be FULL at near, fade at horizon
    var cx=W/2+camPan*depth+cx2*W*0.038;
    _segs.push({seg:seg,y:p.y,l:cx-p.hw,r:cx+p.hw,hw:p.hw,cx:cx,depth:depth});
  }
}

// ─── OBSTACLES ───────────────────────────────────────────────────────────────
var obs=[],spawnT=0,spawnIv=220;
function spawnObs(){
  var cols=['#ff2a6d','#05d9e8','#f39c12','#9b59b6','#2ecc71','#e74c3c'];
  // Spawn at segment index 5 (near horizon)
  obs.push({lane:Math.floor(Math.random()*LANES),segN:2,hit:false,missed:false,
            color:cols[Math.floor(Math.random()*cols.length)]});
}

// ─── METRICS ─────────────────────────────────────────────────────────────────
var dist=0,combo=0,speed=0.9,tSpeed=0.9,crashLock=0;

// ─── PARTICLES ───────────────────────────────────────────────────────────────
var parts=[];
function burst(x,y,col){
  for(var i=0;i<12;i++){
    var a=Math.random()*Math.PI*2,s=1+Math.random()*3.5;
    parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.5,life:1,dec:0.035+Math.random()*0.03,r:2+Math.random()*3,col:col||'#00ffe7'});
  }
}

// ─── SHAKE ───────────────────────────────────────────────────────────────────
var shk=0,shkX=0,shkY=0;
function shake(m){shk=Math.max(shk,m);}

// ─── STARS ───────────────────────────────────────────────────────────────────
var stars=[];
for(var si=0;si<80;si++){
  stars.push({x:Math.random(),y:Math.random()*HY,s:0.4+Math.random()*1.3,a:0.25+Math.random()*0.55,tw:Math.random()*6.28,tws:0.01+Math.random()*0.025});
}

// ─── SIGNS ───────────────────────────────────────────────────────────────────
var SIGNS=['"You made it this far."','"No destination required."','"Maybe today changes everything."','"Keep driving."','"Radio Pumpo. Always on."','"The road remembers."'];
var signT=1400,lastSign=-1;
function showSign(){
  var i;do{i=Math.floor(Math.random()*SIGNS.length);}while(i===lastSign);lastSign=i;
  var el=document.getElementById('billboard');el.textContent=SIGNS[i];el.style.opacity='1';
  setTimeout(function(){el.style.opacity='0';},3000);
}

// ─── AI DRIVER ───────────────────────────────────────────────────────────────
var ai={timer:0,tgt:1,phase:0};
function aiUpdate(dt){
  ai.timer+=dt; ai.phase+=dt*0.007;
  if(ai.timer>180+Math.random()*80){
    ai.timer=0;
    var clear=[0,1,2];
    for(var i=0;i<obs.length;i++){if(obs[i].segN>NDRAW*0.35&&obs[i].segN<NDRAW*0.75)clear=clear.filter(function(l){return l!==obs[i].lane;});}
    ai.tgt=clear.length?clear[Math.floor(Math.random()*clear.length)]:Math.floor(Math.random()*LANES);
  }
  car.lane=ai.tgt;
}

// ─── START ───────────────────────────────────────────────────────────────────
function startGame(mode){
  MODE=mode; inGame=(mode!=='idle');
  dist=0;combo=0;rTime=0;scroll=0;obs=[];parts=[];spawnT=0;crashLock=0;shk=0;
  car.lane=1;car.laneX=0;car.laneXTgt=0;car.wheel=0;car.wheelTgt=0;car.cooldown=0;car.crashFlash=0;
  speed=tSpeed=(mode==='rush')?1.9:1.0;
  spawnIv=(mode==='rush')?110:240;
  ai.timer=0;ai.tgt=1;signT=1200;
  // Rain: random chance in rush mode
  rainTarget=(mode==='rush'&&Math.random()>0.4)?0.8:(Math.random()>0.7?0.4:0);

  var badge=document.getElementById('mode-badge');
  if(mode==='rush'){badge.textContent='RUSH MODE';badge.style.color='#ff2d78';badge.style.textShadow='0 0 8px #ff2d78';}
  else if(mode==='cruise'){badge.textContent='CRUISE MODE';badge.style.color='#00ffe7';badge.style.textShadow='0 0 8px #00ffe7';}
  else{badge.textContent='IDLE';badge.style.color='#b24bff';badge.style.textShadow='0 0 8px #b24bff';}

  if(inGame){tl.style.pointerEvents='all';tr.style.pointerEvents='all';}
}

// ─── LOOP ────────────────────────────────────────────────────────────────────
var lastTs=0;
function loop(ts){
  var dt=Math.min((ts-lastTs)/16.667,3);lastTs=ts;
  update(dt);render();
  requestAnimationFrame(loop);
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt){
  rTime+=dt;

  // Speed
  if(MODE==='idle') tSpeed=0.80+Math.sin(rTime*0.005)*0.10;
  else if(MODE==='cruise') tSpeed=1.05+Math.sin(rTime*0.008)*0.12;
  else{var ramp=rTime<200?1.9:rTime<600?2.6:rTime<1200?3.4:4.2;tSpeed=ramp;spawnIv=Math.max(45,110-rTime*0.035);}
  speed+=(tSpeed-speed)*0.04*dt;

  // Steering
  if(MODE==='idle'){aiUpdate(dt);}
  else{
    if(car.cooldown>0){car.cooldown-=dt;}
    else{
      if(keys.left&&car.lane>0){car.lane--;car.cooldown=(MODE==='rush')?11:20;}
      if(keys.right&&car.lane<LANES-1){car.lane++;car.cooldown=(MODE==='rush')?11:20;}
    }
  }
  car.laneXTgt=laneNorm(car.lane);
  var lf=MODE==='rush'?0.12:MODE==='cruise'?0.038:0.048;
  car.laneX+=(car.laneXTgt-car.laneX)*lf*dt;
  car.wheelTgt=(car.laneXTgt-car.laneX)*50;
  car.wheel+=(car.wheelTgt-car.wheel)*0.14*dt;

  // Road scroll
  scroll=(scroll+speed*dt*0.028)%NSEGS;
  dist+=speed*dt*0.00028;

  // Build segment list (used by both draw and collision)
  buildSegs();

  // Spawn
  spawnT+=dt;
  if(spawnT>=spawnIv){spawnT=0;if(MODE==='rush'||obs.length<3)spawnObs();}

  // Obstacle advance — they move along the segment list toward viewer
  for(var i=obs.length-1;i>=0;i--){
    var o=obs[i];
    // Advance segment index (0=horizon end, NDRAW-1=near end)
    o.segN+=speed*dt*0.14*(0.5+o.segN/NDRAW*1.5);

    // Near-miss: segN in 60-75% of NDRAW, different lane
    if(!o.missed&&!o.hit&&o.segN>NDRAW*0.60&&o.segN<NDRAW*0.76){
      if(o.lane!==car.lane){
        o.missed=true;
        if(Math.abs(o.lane-car.lane)===1&&inGame) doNearMiss(o);
      }
    }
    // Collision: segN in 68-82%, same lane
    if(!o.hit&&!o.missed&&o.segN>NDRAW*0.68&&o.segN<NDRAW*0.84&&o.lane===car.lane){
      o.hit=true;
      if(inGame) doCrash(); else car.lane=(car.lane+1)%LANES;
    }
    if(o.segN>=NDRAW)obs.splice(i,1);
  }

  // Particles
  for(var pi=parts.length-1;pi>=0;pi--){
    var p=parts[pi];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.10*dt;p.life-=p.dec*dt;
    if(p.life<=0)parts.splice(pi,1);
  }

  // Shake
  if(shk>0.2){shkX=(Math.random()-0.5)*shk*2;shkY=(Math.random()-0.5)*shk*2;shk*=0.80;}
  else{shkX=shkY=shk=0;}

  if(car.crashFlash>0) car.crashFlash-=dt;
  if(crashLock>0) crashLock-=dt;

  signT-=dt;if(signT<=0){showSign();signT=1300+Math.random()*600;}

  // Stars twinkle
  for(var sti=0;sti<stars.length;sti++) stars[sti].tw+=stars[sti].tws*dt;

  // Rain
  rainTimer+=dt;
  if(rainTimer>400){rainTimer=0;rainTarget=rainIntensity>0.1?0:(Math.random()>0.55?0.6+Math.random()*0.4:0);}
  rainIntensity+=(rainTarget-rainIntensity)*0.005*dt;

  // HUD
  document.getElementById('mode-badge');
}

var nmTO=null;
function doNearMiss(o){
  combo++;
  var el=document.getElementById('near-miss');
  el.textContent=combo>=3?'NEAR MISS  x'+combo+'  +'+(combo*100):'NEAR MISS  +50';
  el.style.opacity='1';
  if(nmTO)clearTimeout(nmTO);
  nmTO=setTimeout(function(){el.style.opacity='0';},820);
  shake(3.5);
  // Find segment for this obstacle to get screen position
  var sn=Math.min(Math.floor(o.segN),_segs.length-1);
  var seg=_segs[sn];
  if(seg){var lt=(o.lane+0.5)/LANES;var ox=seg.l+lt*(seg.r-seg.l);burst(ox,seg.y,'#00ffe7');}
}
function doCrash(){
  if(crashLock>0)return;
  crashLock=30;combo=0;
  shake(MODE==='rush'?13:7);car.crashFlash=18;
  var ov=document.getElementById('crash-flash');ov.style.opacity='1';
  setTimeout(function(){ov.style.opacity='0';},180);
  speed*=0.52;tSpeed*=0.70;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  ctx.save();
  ctx.clearRect(0,0,W,H);
  if(shk>0.2)ctx.translate(shkX,shkY);
  var hy=H*HY;
  drawSky(hy);
  drawStars(hy);
  drawSun(hy);
  drawCity(hy);
  drawPalms(hy);
  drawRoad();       // uses _segs built in update
  drawObstacles();  // uses _segs for positioning
  drawParticles();
  if(rainIntensity>0.02)drawRain(hy);
  drawCockpit();
  ctx.restore();
}

// ─── SKY ─────────────────────────────────────────────────────────────────────
function drawSky(hy){
  var g=ctx.createLinearGradient(0,0,0,hy);
  g.addColorStop(0,'#07000f');g.addColorStop(0.55,'#18002e');g.addColorStop(1,'#480040');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,hy);
  var hg=ctx.createLinearGradient(0,hy-50,0,hy+12);
  hg.addColorStop(0,'rgba(255,0,120,0)');hg.addColorStop(0.5,'rgba(255,0,120,0.20)');hg.addColorStop(1,'rgba(255,0,80,0)');
  ctx.fillStyle=hg;ctx.fillRect(0,hy-50,W,62);
}
function drawStars(hy){
  ctx.save();
  for(var i=0;i<stars.length;i++){
    var s=stars[i],tw=0.5+Math.sin(s.tw)*0.5;
    ctx.globalAlpha=s.a*tw;ctx.fillStyle='#fff';
    if(s.s>1.0){ctx.fillRect(s.x*W-s.s,s.y*hy,s.s*2,s.s*0.32);ctx.fillRect(s.x*W-s.s*0.16,s.y*hy-s.s*0.85,s.s*0.32,s.s*1.7);}
    else ctx.fillRect(s.x*W,s.y*hy,s.s,s.s);
  }
  ctx.globalAlpha=1;ctx.restore();
}
function drawSun(hy){
  var cx=W*0.5,cy=hy*0.68,r=Math.min(W*0.5,hy)*0.28;
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
  var sg=ctx.createLinearGradient(cx,cy-r,cx,cy+r);
  sg.addColorStop(0,'#fffbe0');sg.addColorStop(0.18,'#ffcc00');sg.addColorStop(0.42,'#ff2d9a');sg.addColorStop(0.75,'#cc0066');sg.addColorStop(1,'#550030');
  ctx.fillStyle=sg;ctx.fillRect(cx-r,cy-r,r*2,r*2);
  for(var i=0;i<11;i++){var t=i/11,sy=cy-r*0.05+t*r*1.05,chord=Math.sqrt(Math.max(0,r*r-(sy-cy)*(sy-cy)))*2,th=r/(11*1.6)*(1+t*1.3);ctx.fillStyle='rgba(8,0,18,'+(0.5+t*0.36)+')';ctx.fillRect(cx-chord/2,sy,chord,th);}
  ctx.restore();
  var og=ctx.createRadialGradient(cx,cy,r*0.72,cx,cy,r*2.2);
  og.addColorStop(0,'rgba(255,40,120,0.18)');og.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=og;ctx.beginPath();ctx.arc(cx,cy,r*2.2,0,Math.PI*2);ctx.fill();
}
function drawCity(hy){

function drawPalms(hy){

function dPalm(x,gy,h,dir){
  var lean=dir*h*0.14;
  ctx.save();ctx.strokeStyle='#06001a';ctx.lineCap='round';ctx.lineWidth=Math.max(2,h*0.033);
  ctx.beginPath();ctx.moveTo(x,gy);ctx.bezierCurveTo(x+lean*0.3,gy-h*0.38,x+lean*0.7,gy-h*0.72,x+lean,gy-h);ctx.stroke();
  var tx=x+lean,ty=gy-h;
  var fr=[[-0.5,-0.28],[0.5,-0.24],[0,-0.52],[-0.34,-0.52],[0.34,-0.48],[-0.62,-0.14],[0.62,-0.11]];
  ctx.lineWidth=Math.max(1.5,h*0.019);
  for(var fi=0;fi<fr.length;fi++){ctx.beginPath();ctx.moveTo(tx,ty);ctx.quadraticCurveTo(tx+fr[fi][0]*h*0.28,ty+fr[fi][1]*h*0.32,tx+fr[fi][0]*h*0.50,ty+fr[fi][1]*h*0.48+h*0.09);ctx.stroke();}
  ctx.restore();
}

// ─── ROAD ────────────────────────────────────────────────────────────────────
// Draws using pre-built _segs from buildSegs()
function drawRoad(){
  // Draw far→near
  for(var i=0;i<_segs.length-1;i++){
    var c=_segs[i],nx=_segs[i+1]; // c is farther, nx is closer
    drawRoadSeg(nx,c); // draw quad from c to nx
  }
  // Center reflection strip
  var near=_segs[_segs.length-1];
  var far=_segs[0];
  var rg=ctx.createLinearGradient(0,far.y,0,near.y);
  rg.addColorStop(0,'rgba(255,0,120,0)');
  rg.addColorStop(0.5,'rgba(255,0,120,0.14)');
  rg.addColorStop(1,'rgba(255,0,120,0)');
  ctx.fillStyle=rg;
  ctx.beginPath();
  ctx.moveTo(far.cx,far.y);
  ctx.lineTo(near.l+(near.r-near.l)*0.36,near.y);
  ctx.lineTo(near.l+(near.r-near.l)*0.64,near.y);
  ctx.closePath();ctx.fill();
}
function drawRoadSeg(near,far){
  var alt=near.seg.alt;
  // Shoulder (no shadowBlur — performance)
  ctx.fillStyle=alt?'#0d0016':'#09000f';
  ctx.beginPath();ctx.moveTo(0,far.y);ctx.lineTo(far.l-W*0.18,far.y);ctx.lineTo(near.l-W*0.18,near.y);ctx.lineTo(0,near.y);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(W,far.y);ctx.lineTo(far.r+W*0.18,far.y);ctx.lineTo(near.r+W*0.18,near.y);ctx.lineTo(W,near.y);ctx.closePath();ctx.fill();
  // Road
  ctx.fillStyle=alt?'#0c0c20':'#080818';
  ctx.beginPath();ctx.moveTo(far.l,far.y);ctx.lineTo(far.r,far.y);ctx.lineTo(near.r,near.y);ctx.lineTo(near.l,near.y);ctx.closePath();ctx.fill();
  // Rumble strips
  var sw=(near.r-near.l)*0.055,fsw=(far.r-far.l)*0.055;
  ctx.fillStyle=alt?'#cc0066':'#440099';
  ctx.beginPath();ctx.moveTo(far.l,far.y);ctx.lineTo(far.l+fsw,far.y);ctx.lineTo(near.l+sw,near.y);ctx.lineTo(near.l,near.y);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(far.r-fsw,far.y);ctx.lineTo(far.r,far.y);ctx.lineTo(near.r,near.y);ctx.lineTo(near.r-sw,near.y);ctx.closePath();ctx.fill();
  // Edge lines (no shadowBlur)
  ctx.strokeStyle='rgba(255,0,153,0.85)';ctx.lineWidth=Math.max(0.5,(near.y-far.y)*0.08);
  ctx.beginPath();ctx.moveTo(far.l,far.y);ctx.lineTo(near.l,near.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(far.r,far.y);ctx.lineTo(near.r,near.y);ctx.stroke();
  // Centre dashes
  if(alt){
    ctx.strokeStyle='rgba(190,235,255,0.75)';ctx.lineWidth=Math.max(0.4,(near.y-far.y)*0.04);
    ctx.beginPath();ctx.moveTo((far.l+far.r)/2,far.y);ctx.lineTo((near.l+near.r)/2,near.y);ctx.stroke();
  }
  // Lane dividers
  if(alt){
    for(var l=1;l<LANES;l++){
      var t=l/LANES;
      ctx.strokeStyle='rgba(0,180,255,0.09)';ctx.lineWidth=Math.max(0.3,(near.y-far.y)*0.026);
      ctx.beginPath();ctx.moveTo(far.l+(far.r-far.l)*t,far.y);ctx.lineTo(near.l+(near.r-near.l)*t,near.y);ctx.stroke();
    }
  }
}

// ─── OBSTACLES ───────────────────────────────────────────────────────────────
// Key fix: obstacle screen position is taken DIRECTLY from _segs[segN]
// so they are ALWAYS on the road surface, no separate projection
function drawObstacles(){
  for(var i=0;i<obs.length;i++){
    var o=obs[i];
    var sn=Math.min(Math.floor(o.segN),_segs.length-1);
    if(sn<0)continue;
    var seg=_segs[sn];
    var roadW=seg.r-seg.l;
    var laneW=roadW/LANES;
    var lt=(o.lane+0.5)/LANES;
    var ox=seg.l+lt*roadW;
    var oy=seg.y;
    // Size based on segment scale (near=big, far=small)
    var sc=seg.sc||1;
    var cw=Math.max(6,Math.min(laneW*0.76,sc*W*BASE_HW*0.55));
    var ch=cw*0.50;

    ctx.save();ctx.globalAlpha=o.hit?0.12:1;
    drawCarSprite(ox,oy,cw,ch,o.color);
    ctx.restore();
  }
}

function drawCarSprite(ox,oy,cw,ch,col){
  // Body gradient (no shadowBlur)
  var bg=ctx.createLinearGradient(ox,oy-ch*1.08,ox,oy);
  bg.addColorStop(0,shade(col,+22));bg.addColorStop(0.4,col);bg.addColorStop(1,shade(col,-36));
  ctx.fillStyle=bg;rr(ox-cw/2,oy-ch,cw,ch,Math.max(2,ch*0.08));ctx.fill();
  // Roof
  var rW=cw*0.60,rH=ch*0.45,rY=oy-ch-rH*0.83;
  ctx.fillStyle=shade(col,-48);
  ctx.beginPath();ctx.moveTo(ox-rW*0.50,rY+rH);ctx.lineTo(ox-rW*0.35,rY);ctx.lineTo(ox+rW*0.35,rY);ctx.lineTo(ox+rW*0.50,rY+rH);ctx.closePath();ctx.fill();
  // Rear window
  ctx.fillStyle='rgba(50,185,255,0.24)';
  ctx.beginPath();ctx.moveTo(ox-rW*0.41,rY+rH*0.93);ctx.lineTo(ox-rW*0.27,rY+rH*0.10);ctx.lineTo(ox+rW*0.27,rY+rH*0.10);ctx.lineTo(ox+rW*0.41,rY+rH*0.93);ctx.closePath();ctx.fill();
  // Side windows
  ctx.fillStyle='rgba(30,165,255,0.17)';
  ctx.beginPath();ctx.moveTo(ox-cw*0.46,oy-ch*0.68);ctx.lineTo(ox-rW*0.47,rY+rH*0.93);ctx.lineTo(ox-rW*0.29,rY+rH*0.10);ctx.lineTo(ox-cw*0.26,oy-ch*0.72);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(ox+cw*0.46,oy-ch*0.68);ctx.lineTo(ox+rW*0.47,rY+rH*0.93);ctx.lineTo(ox+rW*0.29,rY+rH*0.10);ctx.lineTo(ox+cw*0.26,oy-ch*0.72);ctx.closePath();ctx.fill();
  // Trunk
  ctx.fillStyle=shade(col,-22);rr(ox-cw*0.45,oy-ch*0.25,cw*0.90,ch*0.25,Math.max(1,ch*0.05));ctx.fill();
  // Brake lights (flat, no blur)
  ctx.fillStyle='#ff0044';
  ctx.fillRect(ox-cw/2+2,oy-ch*0.22,cw*0.17,ch*0.09);
  ctx.fillRect(ox+cw/2-cw*0.19,oy-ch*0.22,cw*0.17,ch*0.09);
  // Bumper
  ctx.fillStyle=shade(col,-52);ctx.fillRect(ox-cw*0.43,oy-ch*0.08,cw*0.86,ch*0.08);
  // Wheel arches
  ctx.fillStyle='rgba(0,0,0,0.45)';
  var wr=cw*0.14;
  ctx.beginPath();ctx.ellipse(ox-cw*0.28,oy-ch*0.06,wr,wr*0.35,0,Math.PI,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ox+cw*0.28,oy-ch*0.06,wr,wr*0.35,0,Math.PI,Math.PI*2);ctx.fill();
}

function drawParticles(){
  ctx.save();
  for(var i=0;i<parts.length;i++){var p=parts[i];ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

// ─── RAIN ────────────────────────────────────────────────────────────────────
function drawRain(hy){
  ctx.save();ctx.globalAlpha=rainIntensity*0.55;ctx.strokeStyle='rgba(160,200,255,0.6)';ctx.lineWidth=1;
  for(var i=0;i<rainDrops.length;i++){
    var d=rainDrops[i];
    d.y+=d.spd*speed*1.2;
    if(d.y>DASH_FRAC)d.y=0;
    var sx=d.x*W,sy=d.y*H,ex=sx-d.len*W*0.04,ey=sy+d.len*H;
    if(ey>H*DASH_FRAC)continue;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
  }
  ctx.restore();
  // Windshield wet sheen
  var wg=ctx.createLinearGradient(0,H*(HY-0.05),0,H*DASH_FRAC);
  wg.addColorStop(0,'rgba(100,150,255,0)');
  wg.addColorStop(1,'rgba(100,150,255,'+rainIntensity*0.06+')');
  ctx.fillStyle=wg;ctx.fillRect(0,H*(HY-0.05),W,H*(DASH_FRAC-HY+0.05));
}

// ════════════════════════════════════════════════════════════════════════════
//  COCKPIT
//  Layout (portrait mobile-first, scales to desktop):
//
//  ┌─────────────────────────────────────────────────────────────┐
//  │  [rear-view mirror]          wipers                        │  ← windshield
//  ├──────────────────────────── dashY ─────────────────────────┤
//  │ [GAUGE CLUSTER]   [CENTER CONSOLE]   [RADIO UNIT]         │
//  │                                                             │
//  │              [STEERING WHEEL — top 65% visible]            │
//  └─────────────────────────────────────────────────────────────┘
//
//  Gauge cluster: left 28% of width
//  Center console: middle 26%  (no overlap with wheel)
//  Radio: right 28%
//  Steering wheel: centered, raised so hub+airbag always visible
// ════════════════════════════════════════════════════════════════════════════
function drawCockpit(){
  ctx.save();
  var dashY=H*DASH_FRAC;
  var dashH=H-dashY;

  // ── REAR-VIEW MIRROR ─────────────────────────────────────────────────────
  var mw=W*0.13,mh=H*0.042;
  var mx=(W-mw)/2,my=H*0.018;
  ctx.fillStyle='#08010e';
  ctx.beginPath();ctx.moveTo(mx-mw*0.04,my);ctx.lineTo(mx+mw+mw*0.04,my);ctx.lineTo(mx+mw,my+mh);ctx.lineTo(mx,my+mh);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(130,50,230,0.45)';ctx.lineWidth=1;ctx.stroke();
  var mrg=ctx.createLinearGradient(mx,my,mx,my+mh);
  mrg.addColorStop(0,'rgba(35,10,65,0.88)');mrg.addColorStop(1,'rgba(8,3,20,0.95)');
  ctx.fillStyle=mrg;rr(mx+2,my+2,mw-4,mh-4,2);ctx.fill();
  // Road tint in mirror
  var mroad=ctx.createLinearGradient(mx,my+mh*0.3,mx,my+mh);
  mroad.addColorStop(0,'rgba(100,0,80,0.10)');mroad.addColorStop(1,'rgba(30,0,50,0.25)');
  ctx.fillStyle=mroad;rr(mx+2,my+mh*0.3,mw-4,mh*0.7-2,2);ctx.fill();
  // Mirror mount
  ctx.fillStyle='#0c0220';ctx.fillRect(W/2-2,my+mh,4,H*0.015);

  // ── A-PILLARS ────────────────────────────────────────────────────────────
  ctx.fillStyle='#05010b';
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(W*0.080,0);ctx.lineTo(W*0.038,dashY);ctx.lineTo(0,dashY);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(W,0);ctx.lineTo(W*0.920,0);ctx.lineTo(W*0.962,dashY);ctx.lineTo(W,dashY);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(110,38,200,0.26)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W*0.080,0);ctx.lineTo(W*0.038,dashY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W*0.920,0);ctx.lineTo(W*0.962,dashY);ctx.stroke();

  // ── WIPERS (always visible, animated only when raining) ──────────────────
  var wiperAlpha=rainIntensity>0.05?0.65:0.18;
  var wiperSweep=rainIntensity>0.05?Math.sin(rTime*0.022)*0.42-0.10:0.05;
  var wLen=W*0.20,pivY=dashY-H*0.006;
  ctx.save();ctx.globalAlpha=wiperAlpha;
  ctx.strokeStyle='rgba(90,50,140,1)';ctx.lineWidth=Math.max(1.5,W*0.004);ctx.lineCap='round';
  var lPivX=W*0.30,rPivX=W*0.70;
  ctx.beginPath();ctx.moveTo(lPivX,pivY);ctx.lineTo(lPivX+Math.cos(Math.PI*0.68+wiperSweep)*wLen,pivY-Math.sin(Math.PI*0.68+wiperSweep)*wLen*0.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(rPivX,pivY);ctx.lineTo(rPivX-Math.cos(Math.PI*0.68+wiperSweep)*wLen,pivY-Math.sin(Math.PI*0.68+wiperSweep)*wLen*0.5);ctx.stroke();
  ctx.restore();

  // ── DASHBOARD BODY ───────────────────────────────────────────────────────
  var dg=ctx.createLinearGradient(0,dashY,0,H);
  dg.addColorStop(0,'#1b0730');dg.addColorStop(0.12,'#110322');dg.addColorStop(0.55,'#0b0318');dg.addColorStop(1,'#03000e');
  ctx.fillStyle=dg;
  ctx.beginPath();ctx.moveTo(0,dashY);ctx.bezierCurveTo(W*0.25,dashY+dashH*0.050,W*0.75,dashY+dashH*0.050,W,dashY);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  // Vent lines
  ctx.save();ctx.globalAlpha=0.18;
  for(var vi=0;vi<4;vi++){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(W*0.04,dashY+dashH*0.05+vi*dashH*0.034,W*0.92,dashH*0.014);}
  ctx.restore();

  // ── NEON SEAM ────────────────────────────────────────────────────────────
  ctx.strokeStyle='#ee0077';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W*0.038,dashY);ctx.bezierCurveTo(W*0.25,dashY+dashH*0.050,W*0.75,dashY+dashH*0.050,W*0.962,dashY);ctx.stroke();

  // ── LAYOUT DIMENSIONS ────────────────────────────────────────────────────
  // Three equal panels. On narrow screens (mobile) they must not overlap the wheel.
  // Wheel center: W*0.5, H + wheelR*0.08 → top of wheel ≈ H - wheelR*0.92
  // Panels must fit above the wheel's top arc.
  var panelW=W*0.27, panelH=dashH*0.68;
  var panelY=dashY+dashH*0.06;
  var lx=W*0.018;                    // left panel X
  var rx=W-W*0.018-panelW;           // right panel X

  drawGaugeCluster(lx,panelY,panelW,panelH);
  drawRadioUnit(rx,panelY,panelW,panelH);

  // Center console — sits above wheel, narrower
  var podW=W*0.22,podH=dashH*0.50;
  var podX=(W-podW)/2,podY=dashY+dashH*0.08;
  drawCenterPod(podX,podY,podW,podH);

  // ── STEERING WHEEL ───────────────────────────────────────────────────────
  // On mobile W≈375*DPR. Wheel radius = min(W*0.36,H*0.28).
  // Center at H + wr*0.06 → top of wheel visible arc at H - wr*0.94.
  // We want top ~15% above H, showing hub fully.
  var wr=Math.min(W*0.36,H*0.26);
  drawWheel(W*0.5,H+wr*0.05,wr);

  ctx.restore();
}

// ─── GAUGE CLUSTER ───────────────────────────────────────────────────────────
function drawGaugeCluster(x,y,w,h){
  // Panel
  ctx.fillStyle='#000';rr(x-3,y-3,w+6,h+6,7);ctx.fill();
  var pg=ctx.createLinearGradient(x,y,x,y+h);pg.addColorStop(0,'#080115');pg.addColorStop(1,'#020008');
  ctx.fillStyle=pg;rr(x,y,w,h,5);ctx.fill();
  // CRT lines (no shadow)
  ctx.save();ctx.globalAlpha=0.035;ctx.fillStyle='#00ffcc';
  for(var si=0;si<h;si+=3)ctx.fillRect(x,y+si,w,1.4);
  ctx.restore();
  ctx.strokeStyle='rgba(0,170,255,0.40)';ctx.lineWidth=1.1;rr(x,y,w,h,5);ctx.stroke();

  // Two gauges side by side — upper 54% of panel height
  var gaugeH=h*0.50;
  var gR=Math.min(w*0.21,gaugeH*0.44);
  var gY=y+gR+gaugeH*0.06;
  // Speed (left)
  drawGauge(x+w*0.27,gY,gR,Math.round(speed*60),0,220,'#00ccff','#0044ff','SPD','KMH');
  // RPM (right)
  drawGauge(x+w*0.73,gY,gR,Math.min(7999,Math.round(speed*1550+350)),0,8000,'#ff7700','#ff1100','RPM','x100');

  // Odometer
  var odoY=y+gaugeH+h*0.025;
  var odoH=h*0.105;
  drawOdometer(x+w/2,odoY,w*0.90,odoH);

  // Fuel arc (left) + Temp arc (right) — lower row
  var arcR=Math.min(w*0.17,h*0.13);
  var arcY=odoY+odoH+h*0.04+arcR;
  drawArcGauge(x+w*0.26,arcY,arcR,Math.max(0.05,1-dist*0.004),['#00ff88','#ff8800','#ff2200'],'C','F','FUEL','\u26FD');

  ctx.beginPath();ctx.moveTo(-r*0.87,-r*0.074);ctx.lineTo(-r*0.54,-r*0.074);ctx.lineTo(-r*0.082,r*0.30);ctx.lineTo(-r*0.082,r*0.06);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(r*0.87,-r*0.074);ctx.lineTo(r*0.54,-r*0.074);ctx.lineTo(r*0.082,r*0.30);ctx.lineTo(r*0.082,r*0.06);ctx.closePath();ctx.fill();
  ctx.restore();
  // Spoke highlight
  ctx.fillStyle='rgba(105,38,195,0.20)';ctx.fillRect(-r*0.87,-r*0.008,r*1.74,r*0.016);ctx.fillRect(-r*0.008,0,r*0.016,r*0.80);

  function pfb(){var t=FB[fbIdx%FB.length];fbIdx++;audio.src=t.file;audio.play().catch(function(){});window.radioTrack=t.title;}
  function sSync(){if(syncT)clearInterval(syncT);syncT=setInterval(function(){if(!window.radioIsOn||!seq)return;var cp=cPos(seq);var c=(audio.src||'').split('/').pop(),ex=(cp.item.file||'').split('/').pop();if(c!==ex)pfp();else if(Math.abs((audio.currentTime||0)-cp.pos)>8)audio.currentTime=cp.pos;},15000);}
  function toggle(){ea();if(window.radioIsOn){window.radioIsOn=false;audio.pause();if(syncT){clearInterval(syncT);syncT=null;}window.radioTrack='Tuned out';return;}
    window.radioIsOn=true;
    if(manifest){seq=bSeq();pfp();sSync();}
    else{fetch(MF).then(function(r){return r.ok?r.json():null;}).then(function(m){if(m){manifest=m;seq=bSeq();pfp();sSync();}else pfb();}).catch(function(){pfb();});}
  }
  fetch(MF).then(function(r){return r.ok?r.json():null;}).then(function(m){if(m)manifest=m;}).catch(function(){});
})();
