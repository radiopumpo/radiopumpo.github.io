<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Pumpo Drive — Deep Cinematic</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');

html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#000;
  font-family:Rajdhani,sans-serif;
  touch-action:none;
}

canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
}

/* minimal HUD */
#hud{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:10;
  color:#00ffe7;
  font-weight:700;
  letter-spacing:2px;
  padding:20px;
}

#menu{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:radial-gradient(circle at center,#120018,#000);
  z-index:100;
}

button{
  margin:10px;
  padding:14px 20px;
  border:1px solid #ff2d78;
  background:transparent;
  color:#ff2d78;
  font-weight:700;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="hud">RADIO PUMPO DRIVE</div>

<div id="menu">
  <button id="c1">CRUISE</button>
  <button id="c2">RUSH</button>
</div>

<script>
'use strict';

/* ================= CANVAS ================= */

const c=document.getElementById('c');
const x=c.getContext('2d');

let W,H;
function rs(){
  W=c.width=innerWidth*devicePixelRatio;
  H=c.height=innerHeight*devicePixelRatio;
}
addEventListener('resize',rs);
rs();

/* ================= STATE ================= */

let mode="cruise";
let run=false;
let speed=1;
let carX=0;

/* ================= MENU FIX ================= */

document.getElementById('c1').onclick=()=>start('cruise');
document.getElementById('c2').onclick=()=>start('rush');

function start(m){
  mode=m;
  run=true;
  document.getElementById('menu').style.display='none';
}

/* ================= INPUT ================= */

const k={l:false,r:false};

addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')k.l=true;
  if(e.key==='ArrowRight')k.r=true;
});
addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')k.l=false;
  if(e.key==='ArrowRight')k.r=false;
});

/* ================= ATMOSPHERE SYSTEM ================= */

function sky(){
  const g=x.createLinearGradient(0,0,0,H*0.6);

  const t=performance.now()*0.0001;
  const pulse=Math.sin(t)*0.5+0.5;

  if(mode==='rush'){
    g.addColorStop(0,'#050010');
    g.addColorStop(0.5,`rgb(${80+pulse*100},0,40)`);
    g.addColorStop(1,'#ff2d78');
  }else{
    g.addColorStop(0,'#020018');
    g.addColorStop(1,'#001020');
  }

  x.fillStyle=g;
  x.fillRect(0,0,W,H);

  /* horizon fog */
  const fog=x.createRadialGradient(W/2,H*0.4,50,W/2,H*0.4,H*0.9);
  fog.addColorStop(0,'rgba(255,60,120,0.18)');
  fog.addColorStop(1,'transparent');
  x.fillStyle=fog;
  x.fillRect(0,0,W,H);
}

/* ================= CITY LAYERS ================= */

function city(){
  const baseY=H*0.5;

  for(let layer=0;layer<3;layer++){
    const depth=(layer+1)/3;
    const offset=Math.sin(performance.now()*0.0003*(layer+1))*20;

    x.fillStyle=`rgba(0,0,0,${0.6-depth*0.2})`;

    for(let i=0;i<25;i++){
      const bx=(i/25)*W + offset*(layer+1);
      const bw=30+layer*10;
      const bh=(0.1+Math.random()*0.2)*H*(1-depth);

      x.fillRect(bx,baseY-bh,bw,bh);

      /* flicker windows */
      x.fillStyle='rgba(0,255,231,0.15)';
      if(Math.random()>0.7){
        x.fillRect(bx+5,baseY-bh+10,3,3);
      }
      x.fillStyle=`rgba(0,0,0,${0.6-depth*0.2})`;
    }
  }
}

/* ================= ROAD ================= */

function road(){
  const h=H*0.42;

  for(let i=0;i<140;i++){
    const t=i/140;
    const y=h+t*(H-h);

    const wave=Math.sin(i*0.06+performance.now()*0.001)*90*speed;

    const w=280*(1-t);

    const l=W/2-w+wave;
    const r=W/2+w+wave;

    x.fillStyle=i%2?'#0a0a12':'#11111e';

    x.beginPath();
    x.moveTo(l,y);
    x.lineTo(r,y);
    x.lineTo(r,y+10);
    x.lineTo(l,y+10);
    x.fill();

    /* neon edge persistence */
    x.strokeStyle='rgba(255,45,120,0.3)';
    x.beginPath();
    x.moveTo(l,y);
    x.lineTo(l,y+10);
    x.stroke();
  }
}

/* ================= CAR ================= */

function car(){
  const cx=W/2+carX*200;
  const cy=H*0.75;

  const bob=Math.sin(performance.now()*0.01)*5;
  const tilt=carX*2;

  /* underglow */
  const g=x.createRadialGradient(cx,cy,10,cx,cy,140);
  g.addColorStop(0,'rgba(0,255,231,0.35)');
  g.addColorStop(1,'transparent');

  x.fillStyle=g;
  x.beginPath();
  x.arc(cx,cy,140,0,Math.PI*2);
  x.fill();

  x.save();
  x.translate(cx,cy+bob);
  x.rotate(tilt*0.02);

  x.fillStyle='#ff2d78';
  x.fillRect(-22,-18,44,18);

  x.fillStyle='#990040';
  x.fillRect(-12,-34,24,14);

  x.fillStyle='#fff';
  x.fillRect(-18,-16,6,4);
  x.fillRect(12,-16,6,4);

  x.restore();
}

/* ================= FX STACK ================= */

function fx(){
  /* vignette */
  const v=x.createRadialGradient(W/2,H/2,100,W/2,H/2,W);
  v.addColorStop(0,'transparent');
  v.addColorStop(1,'rgba(0,0,0,0.7)');
  x.fillStyle=v;
  x.fillRect(0,0,W,H);

  /* scanlines */
  x.fillStyle='rgba(0,0,0,0.04)';
  for(let i=0;i<H;i+=3){
    x.fillRect(0,i,W,1);
  }

  /* chromatic drift */
  x.globalAlpha=0.04;
  x.fillStyle='#ff2d78';
  x.fillRect(2,0,W,H);
  x.fillStyle='#00ffe7';
  x.fillRect(-2,0,W,H);
  x.globalAlpha=1;
}

/* ================= LOOP ================= */

function update(){
  if(!run) return;

  if(k.l)carX-=0.02;
  if(k.r)carX+=0.02;

  carX=Math.max(-1,Math.min(1,carX));

  speed=mode==='rush'?2:1.2;
}

function render(){
  x.clearRect(0,0,W,H);

  sky();
  city();
  road();
  car();
  fx();
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
