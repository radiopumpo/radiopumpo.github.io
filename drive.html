<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Pumpo Drive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --neon-pink:   #ff2d78;
    --neon-cyan:   #00ffe7;
    --neon-purple: #b24bff;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Rajdhani', sans-serif;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #gameCanvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }
  /* ── HUD OVERLAYS ── */
  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  #mode-badge {
    position: absolute;
    top: max(20px, env(safe-area-inset-top));
    left: 24px;
    font-size: 13px; letter-spacing: 3px; font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
    text-transform: uppercase;
  }
  #near-miss-flash {
    position: absolute; top: 35%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: clamp(20px, 6vw, 36px); font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan);
    letter-spacing: 4px; opacity: 0;
    transition: opacity 0.1s;
    white-space: nowrap; text-align: center;
  }
  #crash-overlay {
    position: absolute; inset: 0;
    background: rgba(255,0,80,0.4);
    opacity: 0; transition: opacity 0.1s;
  }
  #billboard-msg {
    position: absolute; top: 25%; left: 50%;
    transform: translateX(-50%);
    font-size: clamp(14px, 3.5vw, 18px); font-style: italic;
    color: rgba(255,220,150,0.95);
    text-shadow: 0 0 15px rgba(255,120,0,0.8);
    letter-spacing: 2px; opacity: 0;
    transition: opacity 0.8s;
    white-space: nowrap; text-align: center;
  }
  /* Interactive screen hitboxes matching the rendered canvas dashboard layout */
  #btn-tune-hitbox {
    position: absolute;
    bottom: 4vh;
    right: 14vw;
    width: 12vw; height: 6vh;
    min-width: 80px; min-height: 35px;
    cursor: pointer; pointer-events: all;
    z-index: 15;
    background: transparent; border: none; outline: none;
  }
  #touch-left, #touch-right {
    position: fixed; top: 0; bottom: 0; width: 50%; z-index: 5;
    pointer-events: all;
  }
  #touch-left  { left: 0; }
  #touch-right { right: 0; }
  #scanlines {
    position: fixed; inset: 0; z-index: 20; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
    );
    opacity: 0.7;
  }
  /* ── MENU OVERLAY ── */
  #menu-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(180deg, rgba(5,0,12,0.65) 0%, rgba(15,0,30,0.85) 60%, rgba(35,0,20,0.95) 100%);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    transition: opacity 0.4s ease;
  }
  .menu-logo {
    font-size: clamp(38px, 12vw, 68px);
    font-weight: 700; letter-spacing: 6px; color: #fff;
    text-shadow: 0 0 20px var(--neon-pink), 0 0 50px rgba(255,45,120,0.6);
    margin-bottom: 4px;
  }
  .menu-sub {
    font-size: clamp(12px, 3.5vw, 16px); letter-spacing: 9px;
    color: var(--neon-cyan); text-shadow: 0 0 12px var(--neon-cyan);
    margin-bottom: 48px; text-transform: uppercase;
  }
  .menu-buttons {
    display: flex; flex-direction: column; gap: 18px;
    align-items: center; width: 100%; max-width: 320px; padding: 0 20px;
  }
  .menu-btn {
    width: 100%; background: rgba(0,0,0,0.4);
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(16px, 4.5vw, 20px); font-weight: 700; letter-spacing: 3px;
    padding: 16px 24px; border-radius: 8px; cursor: pointer;
    text-transform: uppercase; transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-btn.cruise {
    border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0,255,231,0.15);
  }
  .menu-btn.cruise:hover { background: rgba(0,255,231,0.15); box-shadow: 0 0 25px rgba(0,255,231,0.3); }
  .menu-btn.rush {
    border: 2px solid var(--neon-pink); color: var(--neon-pink);
    text-shadow: 0 0 8px var(--neon-pink);
    box-shadow: 0 0 15px rgba(255,45,120,0.15);
  }
  .menu-btn.rush:hover { background: rgba(255,45,120,0.15); box-shadow: 0 0 25px rgba(255,45,120,0.3); }
  .menu-mode-desc {
    font-size: 12px; color: rgba(255,255,255,0.5);
    letter-spacing: 1.5px; margin-top: -8px; text-align: center;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="scanlines"></div>

<div id="hud">
  <div id="mode-badge">IDLE CRUISE</div>
  <div id="near-miss-flash"></div>
  <div id="crash-overlay"></div>
  <div id="billboard-msg"></div>
  <button id="btn-tune-hitbox" title="Tune Radio"></button>
</div>

<div id="touch-left"></div>
<div id="touch-right"></div>

<div id="menu-screen">
  <div class="menu-logo">RADIO PUMPO</div>
  <div class="menu-sub">Drive</div>
  <div class="menu-buttons">
    <button class="menu-btn cruise" id="btn-cruise">Start Cruise</button>
    <div class="menu-mode-desc">meditative · slow lanes · infinite glide</div>
    <button class="menu-btn rush" id="btn-rush">Start Rush</button>
    <div class="menu-mode-desc">high speed · near misses · high density</div>
  </div>
</div>

<script>
'use strict';

(function GAME() {

// Helper for curved rounded rects inside custom vector frames
function rrect(x, y, w, h, r) {
  r = Math.min(r || 0, Math.abs(w) / 2, Math.abs(h) / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

var canvas = document.getElementById('gameCanvas');
var ctx    = canvas.getContext('2d');
var W = 0, H = 0;

function resize() {
  var dpr = window.devicePixelRatio || 1;
  W = canvas.width  = window.innerWidth  * dpr;
  H = canvas.height = window.innerHeight * dpr;
}
resize();
window.addEventListener('resize', resize);

// States: System management variables
var gameMode = 'idle'; // 'idle', 'cruise', 'rush'
var inGame   = false;
var H_FRAC   = 0.46; // Custom high-positioned horizon lines to frame car cockpit views

// Controls
var keys = { left: false, right: false };
document.addEventListener('keydown', function(e) {
  if (!inGame) return;
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
});
document.addEventListener('keyup', function(e) {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

var tl = document.getElementById('touch-left');
var tr = document.getElementById('touch-right');
tl.addEventListener('touchstart', function() { if(inGame) keys.left  = true; }, { passive: true });
tl.addEventListener('touchend',   function() { keys.left  = false; }, { passive: true });
tr.addEventListener('touchstart', function() { if(inGame) keys.right = true; }, { passive: true });
tr.addEventListener('touchend',   function() { keys.right = false; }, { passive: true });

// Simulation Vehicles
var LANES = 3;
var car = { lane: 1, laneX: 0, laneXTarget: 0, speedShift: 0.05, wheelRotation: 0 };

// Auto Pilot (Idle Mode)
var idleState = { laneTimer: 0, actionCooldown: 0 };

function laneToX(lane) { return (lane - 1); }

// Horizon Map Generation
var ROAD_SEGS_TOTAL = 600;
var NUM_DRAW_SEGS   = 130;
var roadSegs = [];
var scrollPos = 0;

function initRoad() {
  roadSegs = [];
  for (var i = 0; i < ROAD_SEGS_TOTAL; i++) {
    var phase = (i / ROAD_SEGS_TOTAL) * Math.PI * 8;
    var curve = Math.sin(phase * 0.5) * 0.35 + Math.sin(phase * 0.2) * 0.15;
    roadSegs.push({ curve: curve, alt: i % 2 });
  }
}

function project(frac) {
  var depth = 0.94;
  var scale = 1 / (1 - frac * depth + 0.001);
  var horizonY = H * H_FRAC;
  var y = horizonY + frac * (H * 0.62 - horizonY); // Compress drawing floor to clear space for dashboard graphics
  var roadHalfW = scale * W * 0.32;
  return { y: y, roadHalfW: roadHalfW, scale: scale };
}

// Obstacles
var obstacles = [];
var spawnTimer = 0;
var spawnInterval = 250;

function spawnObstacle() {
  var lane = Math.floor(Math.random() * LANES);
  var colors = ['#ff2a6d', '#05d9e8', '#f39c12', '#9b59b6', '#2ecc71'];
  obstacles.push({
    lane: lane,
    depth: 0.01,
    hit: false,
    missed: false,
    color: colors[Math.floor(Math.random() * colors.length)]
  });
}

// Variables Setup
var distance  = 0;
var combo     = 0;
var speed     = 1.0;
var targetSpd = 1.0;
var runTime   = 0;
var waveOffsets = Array.from({length: 12}, () => Math.random());

// Particles FX
var particles = [];
function burst(x, y, color) {
  for (var i = 0; i < 15; i++) {
    var ang = Math.random() * Math.PI * 2;
    var spd = 1 + Math.random() * 4;
    particles.push({
      x: x, y: y,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 1,
      life: 1.0, decay: 0.03 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color: color || '#ff2d78'
    });
  }
}

// Screen Shake
var shakeMag = 0, shakeX = 0, shakeY = 0;
function shake(m) { shakeMag = Math.max(shakeMag, m); }

var SIGNS = [
  '"RIDE THE WAVE"', '"CRUISE FOREVER"', '"NEON NIGHTS AWAIT"', 
  '"RADIO PUMPO STATION"', '"INFINITE HIGHWAY"', '"DON\'T LOOK BACK"'
];
var signTimer = 1000;
function showSign() {
  var el = document.getElementById('billboard-msg');
  el.textContent = SIGNS[Math.floor(Math.random() * SIGNS.length)];
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 3000);
}

// Environment Background Coordinates
var stars = [];
for (var si = 0; si < 80; si++) {
  stars.push({ x: Math.random(), y: Math.random() * H_FRAC, size: 0.5 + Math.random() * 1.5, alpha: 0.3 + Math.random() * 0.6 });
}

function startActiveGame(mode) {
  gameMode = mode;
  inGame = true;
  distance = 0; combo = 0; runTime = 0;
  obstacles = []; particles = [];
  car.lane = 1; car.laneXTarget = laneToX(car.lane);
  
  var badge = document.getElementById('mode-badge');
  badge.textContent = mode === 'rush' ? 'RUSH MODE' : 'CRUISE MODE';
  badge.style.color = mode === 'rush' ? '#ff2d78' : '#00ffe7';
  badge.style.textShadow = '0 0 10px ' + (mode === 'rush' ? '#ff2d78' : '#00ffe7');

  document.getElementById('menu-screen').style.opacity = '0';
  setTimeout(() => document.getElementById('menu-screen').style.display = 'none', 400);
}

// Core Game Loop
var lastTs = 0;
function loop(ts) {
  var dt = Math.min((ts - lastTs) / 16.667, 3);
  lastTs = ts;

  update(dt);
  render();

  requestAnimationFrame(loop);
}

function update(dt) {
  runTime += dt;

  // Mode Speeds Config
  if (gameMode === 'idle') {
    targetSpd = 0.85;
    speed += (targetSpd - speed) * 0.05 * dt;

    // AI Driving Simulation logic
    idleState.laneTimer += dt;
    if (idleState.laneTimer > 120) {
      idleState.laneTimer = 0;
      // Scan upcoming threats to steer out of the path dynamically
      var clearLanes = [0, 1, 2];
      obstacles.forEach(o => {
        if (o.depth > 0.4 && o.depth < 0.8) {
          clearLanes = clearLanes.filter(l => l !== o.lane);
        }
      });
      if (clearLanes.length > 0) {
        car.lane = clearLanes[Math.floor(Math.random() * clearLanes.length)];
      } else {
        car.lane = Math.floor(Math.random() * LANES);
      }
    }
  } else if (gameMode === 'cruise') {
    targetSpd = 1.1 + Math.sin(runTime * 0.01) * 0.15;
    speed += (targetSpd - speed) * 0.03 * dt;
    
    // Smooth input evaluations
    if (keys.left && car.lane > 0) { car.lane--; keys.left = false; }
    if (keys.right && car.lane < LANES - 1) { car.lane++; keys.right = false; }
  } else if (gameMode === 'rush') {
    targetSpd = 2.0 + (runTime * 0.001);
    speed += (targetSpd - speed) * 0.02 * dt;

    if (keys.left && car.lane > 0) { car.lane--; keys.left = false; }
    if (keys.right && car.lane < LANES - 1) { car.lane++; keys.right = false; }
  }

  // Smooth Interpolated Steer Transition Updates
  car.laneXTarget = laneToX(car.lane);
  var speedFactor = (gameMode === 'cruise' || gameMode === 'idle') ? 0.06 : 0.14; // Gradual slow glide versus racing speeds
  var diffX = car.laneXTarget - car.laneX;
  car.laneX += diffX * speedFactor * dt;
  car.wheelRotation = car.wheelRotation * 0.82 + (diffX * 42) * 0.18;

  // Environment Ticks
  scrollPos = (scrollPos + speed * dt * 0.02) % ROAD_SEGS_TOTAL;
  distance += speed * dt * 0.0003;

  // Obstacle Generation engine logic
  spawnInterval = gameMode === 'rush' ? 90 : 180;
  spawnTimer += dt;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnObstacle();
  }

  // Handle processing items array down
  for (var i = obstacles.length - 1; i >= 0; i--) {
    var o = obstacles[i];
    o.depth += speed * dt * 0.004 * (0.2 + o.depth * 2.5);

    // Collision Check boundaries
    if (!o.hit && !o.missed && o.depth > 0.78 && o.depth < 0.90) {
      var currentCarLanePosition = Math.round(car.laneX + 1);
      if (o.lane === currentCarLanePosition) {
        if (gameMode !== 'idle') {
          o.hit = true;
          triggerCrash();
        } else {
          // If in screen-saver attract mode, shift lane automatically to bypass
          car.lane = (car.lane + 1) % 3;
        }
      } else if (Math.abs(o.lane - currentCarLanePosition) <= 1) {
        o.missed = true;
        if (gameMode !== 'idle') triggerNearMiss();
      }
    }

    if (o.depth > 1.1) obstacles.splice(i, 1);
  }

  // Engine FX arrays ticks
  for (var pi = particles.length - 1; pi >= 0; pi--) {
    var p = particles[pi];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(pi, 1);
  }

  // Math updates for shake magnitudes
  if (shakeMag > 0.1) {
    shakeX = (Math.random() - 0.5) * shakeMag;
    shakeY = (Math.random() - 0.5) * shakeMag;
    shakeMag *= 0.88 * dt;
  } else { shakeX = 0; shakeY = 0; }

  signTimer -= dt;
  if (signTimer <= 0) { signTimer = 1200 + Math.random() * 800; showSign(); }
}

function triggerNearMiss() {
  combo++;
  var fl = document.getElementById('near-miss-flash');
  fl.textContent = 'NEAR MISS x' + combo;
  fl.style.opacity = '1';
  setTimeout(() => fl.style.opacity = '0', 800);
  shake(6);
  var rhw = project(0.85).roadHalfW;
  var targetDrawX = W / 2 + car.laneX * rhw * 0.65;
  burst(targetDrawX, H * 0.55, '#00ffe7');
}

function triggerCrash() {
  combo = 0;
  shake(18);
  var ov = document.getElementById('crash-overlay');
  ov.style.opacity = '1';
  setTimeout(() => ov.style.opacity = '0', 150);
  speed *= 0.5;
}

// Rendering graphics engine
function render() {
  ctx.save();
  ctx.clearRect(0, 0, W, H);
  if (shakeMag > 0.1) ctx.translate(shakeX, shakeY);

  var hy = H * H_FRAC;

  // Vector render passes layers layout structure
  drawSky(hy);
  drawStars(hy);
  drawSun(hy);
  drawCity(hy);
  drawRoad(hy);
  drawObstacles(hy);
  drawPlayerCar(hy);
  drawParticles();
  
  // Immersive Cockpit Overlay Pass
  drawDashboardLayout();

  ctx.restore();
}

function drawSky(hy) {
  var g = ctx.createLinearGradient(0, 0, 0, hy);
  g.addColorStop(0, '#0a0016');
  g.addColorStop(0.6, '#1a0033');
  g.addColorStop(1, '#560047');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, hy);
}

function drawStars(hy) {
  ctx.save();
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = s.alpha * (0.5 + Math.sin(runTime * 0.02 + i) * 0.5);
    ctx.fillRect(s.x * W, s.y * hy, s.size, s.size);
  }
  ctx.restore();
}

function drawSun(hy) {
  var cx = W * 0.5;
  var cy = hy * 0.8;
  var r = Math.min(W, H) * 0.18;
  
  ctx.save();
  var gradient = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
  gradient.addColorStop(0, '#fffb00');
  gradient.addColorStop(0.3, '#ff007c');
  gradient.addColorStop(1, '#3a0037');
  
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();
  
  ctx.fillStyle = gradient;
  ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

  // Digital Grid Cut Lines Line bars
  var sliceCount = 10;
  ctx.fillStyle = '#1a0033';
  for (var i = 0; i < sliceCount; i++) {
    var iy = cy - r + (i / sliceCount) * r * 2;
    var thickness = 2 + (i * 1.5);
    if (iy > cy - r * 0.2) {
      ctx.fillRect(cx - r, iy, r * 2, thickness);
    }
  }
  ctx.restore();
}

function drawCity(hy) {
  ctx.save();
  var count = 25;
  ctx.fillStyle = 'rgba(12, 2, 28, 0.9)';
  for (var i = 0; i < count; i++) {
    var w = W * 0.08;
    var h = hy * (0.3 + Math.abs(Math.sin(i * 9.7)) * 0.4);
    var x = (i * W * 0.045) - (w * 0.2);
    ctx.fillRect(x, hy - h, w, h);
    
    // Top roof edge outline styling accent lights lines
    ctx.fillStyle = '#ff007c';
    ctx.fillRect(x, hy - h, w, 1.5);
    ctx.fillStyle = 'rgba(12, 2, 28, 0.9)';
  }
  ctx.restore();
}

function drawRoad(hy) {
  var segments = [];
  var runningCurve = 0;
  
  for (var n = 0; n < NUM_DRAW_SEGS; n++) {
    var frac = n / NUM_DRAW_SEGS;
    var proj = project(frac);
    var idx = Math.floor(scrollPos + n * 0.6) % ROAD_SEGS_TOTAL;
    var seg = roadSegs[idx < 0 ? idx + ROAD_SEGS_TOTAL : idx];
    
    runningCurve += seg.curve * (1 - frac) * 0.35;
    var cx = W / 2 + (runningCurve * W * 0.4);
    segments.push({ alt: seg.alt, y: proj.y, left: cx - proj.roadHalfW, right: cx + proj.roadHalfW, w: proj.roadHalfW * 2 });
  }

  // Draw polygons backward floor panels layout sorting loops
  for (var i = segments.length - 1; i > 0; i--) {
    var curr = segments[i];
    var prev = segments[i - 1];

    ctx.fillStyle = curr.alt ? '#0d021f' : '#080014';
    ctx.beginPath();
    ctx.moveTo(prev.left, prev.y);
    ctx.lineTo(prev.right, prev.y);
    ctx.lineTo(curr.right, curr.y);
    ctx.lineTo(curr.left, curr.y);
    ctx.fill();

    // Side Neon Grid Trims
    ctx.fillStyle = curr.alt ? '#ff007c' : '#b24bff';
    ctx.fillRect(curr.left - 4, curr.y, 4, 2);
    ctx.fillRect(curr.right, curr.y, 4, 2);
    
    // Continuous light line vectors strip
    ctx.strokeStyle = '#00ffe7';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(prev.left, prev.y); ctx.lineTo(curr.left, curr.y);
    ctx.moveTo(prev.right, prev.y); ctx.lineTo(curr.right, curr.y);
    ctx.stroke();
  }
}

function drawObstacles(hy) {
  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    if (o.depth < 0.05 || o.depth > 0.95) continue;
    
    var proj = project(o.depth);
    var laneWidth = (proj.roadHalfW * 2) / LANES;
    // Track center of curve alignment dynamically to space coordinates evenly
    var targetRoadCenter = W / 2; 
    
    var ox = (W / 2) - proj.roadHalfW + (o.lane * laneWidth) + (laneWidth * 0.5);
    var size = 45 * proj.scale * (W / 1200);

    if(o.hit) ctx.globalAlpha = 0.3;
    
    // Tail lights glow pass
    ctx.fillStyle = o.color;
    rrect(ox - size*0.5, proj.y - size*0.4, size, size*0.4, 4);
    ctx.fill();
    
    // Windows mask frame accent
    ctx.fillStyle = '#080011';
    rrect(ox - size*0.4, proj.y - size*0.38, size*0.8, size*0.15, 2);
    ctx.fill();

    // Brake Lights Dots Indicators matrix
    ctx.fillStyle = '#ff0055';
    ctx.fillRect(ox - size * 0.45, proj.y - size * 0.2, size * 0.15, size * 0.08);
    ctx.fillRect(ox + size * 0.3, proj.y - size * 0.2, size * 0.15, size * 0.08);
    
    ctx.globalAlpha = 1.0;
  }
}

function drawParticles() {
  ctx.save();
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ── CUSTOM PERSPECTIVE VECTOR DASHBOARD ARCHITECTURE (Reference Image Aligned) ──
function drawDashboardLayout() {
  ctx.save();

  var dashTopY = H * 0.56; // Dynamic calculated perspective divide breaking point layout line
  var dashHeight = H - dashTopY;

  // Ground Base Ambient Internal cockpit Shadows mapping
  var shadowGrad = ctx.createLinearGradient(0, dashTopY - 40, 0, dashTopY);
  shadowGrad.addColorStop(0, 'rgba(0,0,0,0)');
  shadowGrad.addColorStop(1, 'rgba(10, 2, 22, 0.95)');
  ctx.fillStyle = shadowGrad;
  ctx.fillRect(0, dashTopY - 40, W, 40);

  // 1. Structural A-Pillars Side Framing Layout Bars
  ctx.fillStyle = '#08020f';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(W * 0.08, 0);
  ctx.lineTo(W * 0.02, dashTopY);
  ctx.lineTo(0, dashTopY);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(W, 0);
  ctx.lineTo(W * 0.92, 0);
  ctx.lineTo(W * 0.98, dashTopY);
  ctx.lineTo(W, dashTopY);
  ctx.fill();

  // 2. Continuous Main Plastic Casing Block structure
  var bodyGrad = ctx.createLinearGradient(0, dashTopY, 0, W);
  bodyGrad.addColorStop(0, '#1c0933');
  bodyGrad.addColorStop(0.15, '#120524');
  bodyGrad.addColorStop(1, '#05010a');
  ctx.fillStyle = bodyGrad;
  ctx.fillRect(0, dashTopY, W, dashHeight);

  // 3. Neon Magenta Seam Top Trim Bezel Strip Ring Wire line path
  ctx.strokeStyle = '#ff007c';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#ff007c';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(0, dashTopY);
  ctx.lineTo(W, dashTopY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // 4. Center Console Hood Unit Housing Block structure (Reference Image Center Box Pod)
  var podW = W * 0.38;
  var podH = dashHeight * 0.55;
  var podX = (W - podW) * 0.5;
  var podY = dashTopY + (dashHeight * 0.15);

  var podGrad = ctx.createLinearGradient(podX, podY, podX, podY + podH);
  podGrad.addColorStop(0, '#2b104a');
  podGrad.addColorStop(1, '#0b0314');
  ctx.fillStyle = podGrad;
  
  ctx.beginPath();
  ctx.moveTo(podX - 25, podY + podH);
  ctx.lineTo(podX, podY);
  ctx.lineTo(podX + podW, podY);
  ctx.lineTo(podX + podW + 25, podY + podH);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#9b4bff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Center console lens detail styling lines
  ctx.fillStyle = '#140724';
  rrect(podX + 15, podY + 12, podW - 30, podH - 24, 4);
  ctx.fill();

  // 5. LEFT TELEMETRY SCREEN (SYSTEM DETAILS VECTORS FRAME)
  var scW = W * 0.22;
  var scH = dashHeight * 0.58;
  var scY = dashTopY + (dashHeight * 0.12);
  var scLeftX = W * 0.08;

  ctx.fillStyle = '#03000a';
  rrect(scLeftX, scY, scW, scH, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0, 255, 231, 0.4)';
  ctx.stroke();

  // Draw System Values Text Content strings lines inside vectors frame graphics
  ctx.font = 'bold 11px "Share Tech Mono", monospace';
  ctx.fillStyle = '#00ffe7';
  ctx.textAlign = 'left';
  
  var activeSpeedNum = Math.round(speed * 62);
  ctx.fillText('SYS.STATUS: ONLINE', scLeftX + 12, scY + 22);
  ctx.fillText('SPEED: ' + activeSpeedNum + ' KM/H', scLeftX + 12, scY + 42);
  ctx.fillText('DIST: ' + distance.toFixed(2) + ' KM', scLeftX + 12, scY + 62);

  // Sound Wave or bar vectors progress row bar fills lines context
  ctx.fillStyle = 'rgba(0, 255, 231, 0.15)';
  ctx.fillRect(scLeftX + 12, scY + 76, scW - 24, 6);
  ctx.fillStyle = '#00ffe7';
  var fillPercent = Math.min(1.0, speed / 3.0);
  ctx.fillRect(scLeftX + 12, scY + 76, (scW - 24) * fillPercent, 6);

  // 6. RIGHT TELEMETRY SCREEN (RADIO MEDIA SYSTEM INTERFACE MODULE)
  var scRightX = W * 0.70;
  ctx.fillStyle = '#03000a';
  rrect(scRightX, scY, scW, scH, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255, 0, 124, 0.4)';
  ctx.stroke();

  ctx.fillStyle = '#ff007c';
  ctx.fillText('RADIO PUMPO PRO', scRightX + 12, scY + 22);
  
  ctx.font = '9px "Share Tech Mono", monospace';
  ctx.fillStyle = '#ffffff';
  var trackStringNameText = window.currentRadioTrackTitle || "TUNE IN TO SYSTEM";
  ctx.fillText(trackStringNameText.toUpperCase(), scRightX + 12, scY + 42);

  // Interactive Live Animated Eq Audio Waves Bars Bars Loops
  var barCount = 10;
  var startBarX = scRightX + 12;
  var barSpacing = (scW - 24) / barCount;
  ctx.fillStyle = '#ff007c';
  for (var b = 0; b < barCount; b++) {
    var ampHeight = 12 + Math.sin(runTime * 0.2 + (b * 0.8)) * 10 * (window.isRadioActivePlaying ? 1.2 : 0.15);
    ctx.fillRect(startBarX + (b * barSpacing), scY + scH - 24 - ampHeight, barSpacing - 3, ampHeight);
  }

  // Visual Button Frame Layout mapping coordinates context for tune button
  ctx.fillStyle = window.isRadioActivePlaying ? '#ff007c' : '#220014';
  rrect(scRightX + 12, scY + scH - 18, 65, 12, 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 7px "Share Tech Mono", monospace';
  ctx.fillText(window.isRadioActivePlaying ? "ON AIR" : "TUNE IN", scRightX + 18, scY + scH - 10);

  // 7. STEERING WHEEL HUD COMPONENT MODULE (Reference Image Geometric Perspective Offset Angle Wheel)
  var wheelRadius = Math.min(W, H) * 0.24;
  var wheelX = W * 0.5;
  var wheelY = H + (wheelRadius * 0.12) - (car.wheelRotation * 0.15); // Add structural motion reaction updates dynamically

  ctx.save();
  ctx.translate(wheelX, wheelY);
  ctx.rotate(car.wheelRotation * Math.PI / 180);

  // Outer Grip Body Ring Loop Rim structure shadows
  ctx.strokeStyle = '#0e041c';
  ctx.lineWidth = 26;
  ctx.beginPath();
  ctx.arc(0, 0, wheelRadius, 0, Math.PI * 2);
  ctx.stroke();

  // Inner Core Ring Outline Accent Frame path line
  ctx.strokeStyle = '#b24bff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, wheelRadius - 12, 0, Math.PI * 2);
  ctx.stroke();

  // Structural Steering Spokes Bars Configuration lines frames
  ctx.fillStyle = '#0e041c';
  ctx.fillRect(-wheelRadius, -10, wheelRadius * 2, 20); // Horizontal Main Frame Alignment bar structure
  ctx.fillRect(-15, 0, 30, wheelRadius); // Center base column branch line block

  // Wheel Hub Center Shell core capsule casing element block
  var centerHubGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 45);
  centerHubGrad.addColorStop(0, '#2d0d54');
  centerHubGrad.addColorStop(1, '#07010f');
  ctx.fillStyle = centerHubGrad;
  ctx.beginPath();
  ctx.arc(0, 0, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ff007c';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.restore();

  ctx.restore();
}

window.isRadioActivePlaying = false;

(function RADIO_ENGINE() {
  var FALLBACK_PLAYLIST = [
    { file: 'https://radiopumpo.github.io/songs/pumpofantastique.mp3', title: 'Fantastique Glide' },
    { file: 'https://radiopumpo.github.io/songs/pumpoelectrolatino.mp3', title: 'Tirate Un Pumpo' },
    { file: 'https://radiopumpo.github.io/songs/housepumpo.mp3', title: 'House Rhythm Pumpo' },
    { file: 'https://radiopumpo.github.io/songs/dnbpumpo.mp3', title: 'Neon Overdrive DNB' }
  ];
  
  var trackIdx = 0;
  var audioInstance = null;

  function toggleRadio() {
    if(!audioInstance) {
      audioInstance = new Audio();
      audioInstance.crossOrigin = "anonymous";
      audioInstance.addEventListener('ended', function() {
        trackIdx = (trackIdx + 1) % FALLBACK_PLAYLIST.length;
        playCurrentTrack();
      });
    }

    if(window.isRadioActivePlaying) {
      audioInstance.pause();
      window.isRadioActivePlaying = false;
      window.currentRadioTrackTitle = "Radio Static Muted";
    } else {
      window.isRadioActivePlaying = true;
      playCurrentTrack();
    }
  }

  function playCurrentTrack() {
    var item = FALLBACK_PLAYLIST[trackIdx];
    audioInstance.src = item.file;
    window.currentRadioTrackTitle = item.title;
    audioInstance.play().catch(function(err){
      console.log("Audio contexts trigger block safety handled safely: ", err);
    });
  }

  document.getElementById('btn-tune-hitbox').addEventListener('click', function(e) {
    e.stopPropagation();
    toggleRadio();
  });
})();

})();
